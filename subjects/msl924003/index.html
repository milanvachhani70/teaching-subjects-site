
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MSL924003 Interactive Teaching Deck</title>
  <style>
    :root {
      --ink: #0d2b45;
      --ink-soft: #274b63;
      --sky: #e9f5fb;
      --cream: #fff8ef;
      --teal: #0f8b8d;
      --gold: #f7b44c;
      --coral: #ef6f51;
      --panel: rgba(255, 255, 255, 0.82);
      --shadow: 0 24px 60px rgba(13, 43, 69, 0.18);
      --line: rgba(13, 43, 69, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(247, 180, 76, 0.28), transparent 28%),
        radial-gradient(circle at top right, rgba(15, 139, 141, 0.20), transparent 24%),
        linear-gradient(180deg, #f4fbff 0%, #fff8ef 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(13, 43, 69, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(13, 43, 69, 0.025) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
    }

    .deck-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: 20px 22px 24px;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 24px rgba(13, 43, 69, 0.08);
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 0.93rem;
      color: var(--ink-soft);
    }

    .top-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      font-size: 0.9rem;
      color: var(--ink-soft);
    }

    .slide-stage {
      display: grid;
      place-items: center;
    }

    .slide {
      width: min(100%, 1480px);
      height: min(calc(100vh - 180px), 840px);
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 22px;
      padding: 28px;
      border-radius: 34px;
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.80)),
        linear-gradient(135deg, rgba(15, 139, 141, 0.10), rgba(247, 180, 76, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      animation: slideIn 280ms ease;
    }

    .slide::after {
      content: "";
      position: absolute;
      right: -120px;
      bottom: -120px;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 139, 141, 0.12), transparent 72%);
      pointer-events: none;
    }

    .left-col,
    .right-col {
      min-height: 0;
      overflow: hidden;
    }

    .kicker {
      display: inline-flex;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(15, 139, 141, 0.10);
      color: var(--teal);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.84rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 3.4vw, 3.15rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 14px;
      font-size: 1.06rem;
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 60ch;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip {
      padding: 10px 13px;
      border-radius: 14px;
      background: rgba(247, 180, 76, 0.16);
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .sections {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .section-card {
      background: var(--panel);
      border: 1px solid rgba(13, 43, 69, 0.09);
      border-radius: 22px;
      padding: 18px 18px 16px;
      box-shadow: 0 10px 26px rgba(13, 43, 69, 0.06);
    }

    .section-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .section-card ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      color: var(--ink-soft);
      line-height: 1.45;
    }

    .formula-list li {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      font-size: 1.02rem;
    }

    .right-stack {
      display: grid;
      gap: 14px;
      grid-template-rows: auto auto;
    }

    .media-card,
    .meta-card,
    .figure-card {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(13, 43, 69, 0.09);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(13, 43, 69, 0.07);
    }

    .media-card {
      min-height: 260px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .svg-figure {
      width: 100%;
      height: auto;
      max-height: 360px;
    }

    .visual-stack {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .meta-grid {
      display: grid;
      gap: 12px;
    }

    .meta-card h4 {
      margin: 0 0 8px;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .meta-card p {
      margin: 0;
      line-height: 1.5;
      color: var(--ink);
    }

    .figure-card {
      border-left: 6px solid var(--teal);
    }

    .accent-gold { border-left-color: var(--gold); }
    .accent-coral { border-left-color: var(--coral); }
    .accent-teal { border-left-color: var(--teal); }

    .figure-title {
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .figure-body {
      line-height: 1.52;
      color: var(--ink);
    }

    .slide.compact {
      gap: 18px;
      padding: 24px;
    }

    .slide.compact h1 {
      font-size: clamp(1.84rem, 3vw, 2.7rem);
    }

    .slide.compact .subtitle,
    .slide.compact .meta-card p,
    .slide.compact .figure-body,
    .slide.compact .section-card ul {
      font-size: 0.95rem;
      line-height: 1.42;
    }

    .slide.compact .sections {
      gap: 12px;
      margin-top: 18px;
    }

    .slide.compact .section-card,
    .slide.compact .media-card,
    .slide.compact .meta-card,
    .slide.compact .figure-card {
      padding: 16px;
    }

    .slide.compact .media-card {
      min-height: 240px;
    }

    .slide.dense {
      gap: 16px;
      padding: 22px;
    }

    .slide.dense h1 {
      font-size: clamp(1.7rem, 2.8vw, 2.45rem);
    }

    .slide.dense .kicker {
      margin-bottom: 10px;
      padding: 8px 12px;
    }

    .slide.dense .subtitle,
    .slide.dense .meta-card p,
    .slide.dense .figure-body,
    .slide.dense .section-card ul,
    .slide.dense .chip {
      font-size: 0.9rem;
      line-height: 1.36;
    }

    .slide.dense .chips {
      margin-top: 14px;
      gap: 8px;
    }

    .slide.dense .sections {
      gap: 10px;
      margin-top: 16px;
    }

    .slide.dense .section-card,
    .slide.dense .media-card,
    .slide.dense .meta-card,
    .slide.dense .figure-card {
      padding: 14px;
    }

    .slide.dense .section-card h3,
    .slide.dense .meta-card h4,
    .slide.dense .figure-title {
      margin-bottom: 6px;
    }

    .slide.dense .media-card {
      min-height: 220px;
    }

    .footerbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(14px);
    }

    .progress-wrap {
      flex: 1;
      min-width: 180px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(13, 43, 69, 0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      border-radius: inherit;
      transition: width 220ms ease;
    }

    .progress-label {
      margin-top: 6px;
      font-size: 0.88rem;
      color: var(--ink-soft);
    }

    button,
    select {
      border: none;
      outline: none;
      font: inherit;
    }

    .nav-btn,
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--ink), #173a56);
      color: white;
      cursor: pointer;
      transition: transform 150ms ease, opacity 150ms ease, box-shadow 150ms ease;
      box-shadow: 0 8px 18px rgba(13, 43, 69, 0.18);
    }

    .nav-btn.secondary,
    .action-btn.secondary {
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border: 1px solid rgba(13, 43, 69, 0.12);
      box-shadow: none;
    }

    .nav-btn:hover,
    .action-btn:hover {
      transform: translateY(-1px);
    }

    .jump-select {
      padding: 11px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(13, 43, 69, 0.12);
      min-width: 220px;
      color: var(--ink);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 1200px) {
      .slide {
        grid-template-columns: 1fr;
        height: auto;
        max-height: none;
      }
      .sections {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .deck-shell {
        padding: 14px;
      }
      .topbar,
      .footerbar {
        flex-direction: column;
        align-items: stretch;
      }
      .top-controls,
      .actions {
        justify-content: stretch;
      }
      .jump-select,
      .nav-btn,
      .action-btn {
        width: 100%;
      }
      .slide {
        padding: 18px;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="deck-shell">
    <div class="topbar">
      <div class="brand-block">
        <div class="brand-title">MSL924003 Interactive HTML PPT</div>

      <div class="top-controls">
        <div class="pill" id="slideIndicator">Slide 1</div>
        <div class="pill" id="classIndicator">Class overview</div>
        <button class="action-btn secondary" id="fullscreenBtn" type="button">Full Screen</button>
      </div>
    </div>

    <main class="slide-stage" aria-live="polite">
      <section class="slide" id="slideRoot"></section>
    </main>

    <div class="footerbar">
      <div class="progress-wrap">
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel"></div>
      </div>
      <div class="actions">
        <label class="sr-only" for="jumpSelect">Jump to slide</label>
        <select id="jumpSelect" class="jump-select"></select>
        <button class="nav-btn secondary" id="prevBtn" type="button">Previous</button>
        <button class="nav-btn" id="nextBtn" type="button">Next Slide</button>
      </div>
    </div>
  </div>

"kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Quality system traceability\">\n      <rect x=\"70\" y=\"98\" width=\"110\" height=\"70\" rx=\"18\" fill=\"#eaf5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"255\" y=\"62\" width=\"110\" height=\"70\" rx=\"18\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"255\" y=\"152\" width=\"110\" height=\"70\" rx=\"18\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"440\" y=\"98\" width=\"110\" height=\"70\" rx=\"18\" fill=\"#fdf0ea\" stroke=\"#ef6f51\" stroke-width=\"4\"/>\n      <path d=\"M180 133 H255 M365 97 H440 M365 187 H440\" stroke=\"#0d2b45\" stroke-width=\"5\" marker-end=\"url(#qa)\"/>\n      <text x=\"92\" y=\"139\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">sample</text>\n      <text x=\"275\" y=\"103\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">method</text>\n      <text x=\"278\" y=\"193\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">record</text>\n      <text x=\"467\" y=\"139\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">trace</text>\n      <defs>\n        <marker id=\"qa\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#0d2b45\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Application</div>\n      <div class=\"figure-body\">Translate the concept directly into workplace decisions, documentation, or quality credibility.</div>\n    </div>\n    \n    </div>\n    ", "cue": "Link the concept directly to workplace credibility, safety, traceability, or decision-making.", "source": "MSL924003 laboratory skills PDF | lesson 15", "assessment": "Slide 100 of 100 | Application"}];
    let currentIndex = 0;

    const slideRoot = document.getElementById("slideRoot");
    const slideIndicator = document.getElementById("slideIndicator");
    const classIndicator = document.getElementById("classIndicator");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const jumpSelect = document.getElementById("jumpSelect");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    function renderSection(section) {
      const listClass = section.kind === "formula" ? "formula-list" : "";
      return `
        <article class="section-card ${listClass}">
          <h3>${section.heading}</h3>
          <ul>
            ${section.items.map(item => `<li>${item}</li>`).join("")}
          </ul>
        </article>
      `;
    }

    function renderSlide(index) {
      const slide = slides[index];
      const chips = [
        slide.assessment ? `Assessment: ${slide.assessment}` : "",
        slide.source ? `Source: ${slide.source}` : ""
      ].filter(Boolean);
      const densityScore =
        (slide.title?.length || 0) +
        (slide.subtitle?.length || 0) +
        slide.sections.reduce((total, section) => {
          return total + (section.heading?.length || 0) + section.items.reduce((itemTotal, item) => itemTotal + item.length, 0);
        }, 0);
      const densityClass = densityScore > 520 ? "dense" : densityScore > 360 ? "compact" : "";

      slideRoot.className = `slide ${densityClass}`.trim();

      slideRoot.innerHTML = `
        <div class="left-col">
          <div class="kicker">${slide.kicker}</div>
          <h1>${slide.title}</h1>
          <div class="subtitle">${slide.subtitle || ""}</div>
          ${chips.length ? `<div class="chips">${chips.map(chip => `<div class="chip">${chip}</div>`).join("")}</div>` : ""}
          <div class="sections">
            ${slide.sections.map(renderSection).join("")}
          </div>
        </div>
        <div class="right-col">
          <div class="right-stack">
            <div class="media-card">${slide.figureHtml || ""}</div>
            <div class="meta-grid">
              <div class="meta-card">
                <h4>Teacher Cue</h4>
                <p>${slide.cue || "Use this slide to pause, question, and check student understanding."}</p>
              </div>
              <div class="meta-card">
                <h4>Slide Outcome</h4>
                <p>${slide.assessment || "Concept reinforcement"} | Slide ${index + 1} of ${slides.length}</p>
              </div>
            </div>
          </div>
        </div>
      `;

      slideIndicator.textContent = `Slide ${index + 1} of ${slides.length}`;
      classIndicator.textContent = slide.kicker;
      progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
      progressLabel.textContent = `${Math.round(((index + 1) / slides.length) * 100)}% complete`;
      jumpSelect.value = String(index);
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === slides.length - 1;
    }

    function populateJumpMenu() {
      jumpSelect.innerHTML = slides
        .map((slide, index) => `<option value="${index}">${index + 1}. ${slide.title}</option>`)
        .join("");
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, index));
      renderSlide(currentIndex);
    }

    prevBtn.addEventListener("click", () => goTo(currentIndex - 1));
    nextBtn.addEventListener("click", () => goTo(currentIndex + 1));
    jumpSelect.addEventListener("change", (event) => goTo(Number(event.target.value)));

    document.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex + 1);
      }
      if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex - 1);
      }
      if (event.key.toLowerCase() === "f") {
        fullscreenBtn.click();
      }
    });

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    populateJumpMenu();
    renderSlide(currentIndex);
  </script>
