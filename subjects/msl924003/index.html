
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MSL924003 Interactive Slide Deck</title>
  <style>
    :root {
      --ink: #11273d;
      --ink-soft: #466076;
      --teal: #176f73;
      --gold: #d6a13c;
      --sage: #eaf4f1;
      --mist: #f3f8fb;
      --paper: rgba(255,255,255,0.88);
      --line: rgba(17,39,61,0.12);
      --shadow: 0 26px 60px rgba(17,39,61,0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(23,111,115,0.16), transparent 26%),
        radial-gradient(circle at right top, rgba(214,161,60,0.18), transparent 22%),
        linear-gradient(180deg, #f6fbff 0%, #fffaf2 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(17,39,61,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17,39,61,0.03) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: 18px;
    }

    .topbar,
    .footerbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
    }

    .brand-title {
      font-size: 1.04rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .brand-subtitle,
    .progress-label {
      color: var(--ink-soft);
      font-size: 0.92rem;
    }

    .top-controls,
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font-size: 0.9rem;
    }

    .stage {
      display: grid;
      place-items: center;
    }

    .slide {
      width: min(100%, 1500px);
      height: min(calc(100vh - 176px), 860px);
      display: grid;
      grid-template-columns: minmax(420px, 0.9fr) minmax(500px, 1.1fr);
      gap: 22px;
      padding: 24px;
      border-radius: 34px;
      background: linear-gradient(145deg, rgba(255,255,255,0.92), rgba(255,255,255,0.82));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.85);
      overflow: hidden;
    }

    .panel-left,
    .panel-right {
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .kicker {
      display: inline-flex;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(23,111,115,0.1);
      color: var(--teal);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.82rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.95rem, 3.2vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .summary {
      margin-top: 14px;
      color: var(--ink-soft);
      font-size: 1.05rem;
      line-height: 1.58;
    }

    .meta-row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meta-chip {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      font-size: 0.86rem;
      font-weight: 700;
      color: var(--ink-soft);
    }

    .info-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(17,39,61,0.06);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-soft);
    }

    .card.highlight {
      background: linear-gradient(145deg, rgba(234,244,241,0.9), rgba(255,255,255,0.92));
    }

    .card.soft {
      background: linear-gradient(145deg, rgba(243,248,251,0.95), rgba(255,255,255,0.92));
    }

    .card p {
      margin: 0;
      line-height: 1.62;
      color: var(--ink);
    }

    .body-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 10px;
      color: var(--ink);
      line-height: 1.55;
    }

    .image-frame {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    .frame-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.86);
      border: 1px solid var(--line);
    }

    .frame-top h3 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .frame-badge {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(23,111,115,0.1);
      color: var(--teal);
      font-weight: 800;
      font-size: 0.84rem;
    }

    .image-card {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .image-card img {
      max-width: 100%;
      max-height: 600px;
      border-radius: 18px;
      box-shadow: 0 18px 32px rgba(17,39,61,0.12);
      object-fit: contain;
    }

    .cue-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .caption-card {
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
    }

    .caption-card h3 {
      margin: 0 0 8px;
      font-size: 0.9rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .caption-card p {
      margin: 0;
      line-height: 1.55;
      color: var(--ink);
    }

    .progress-wrap { flex: 1; min-width: 190px; }
    .progress-bar { height: 10px; background: rgba(17,39,61,0.1); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--teal), var(--gold)); transition: width 180ms ease; }

    button, select { font: inherit; }
    .btn, .jump-select {
      border-radius: 16px;
      padding: 12px 16px;
      border: none;
    }
    .btn {
      cursor: pointer;
      background: linear-gradient(135deg, #18354d, #10273d);
      color: white;
    }
    .btn.secondary {
      background: rgba(255,255,255,0.92);
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .jump-select {
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--line);
      min-width: 250px;
    }

    @media (max-width: 1180px) {
      .slide {
        grid-template-columns: 1fr;
        height: auto;
        max-height: none;
      }
      .info-grid,
      .cue-grid {
        grid-template-columns: 1fr;
      }
      .image-card {
        min-height: 420px;
      }
    }

    @media (max-width: 760px) {
      .app { padding: 12px; }
      .topbar, .footerbar { flex-direction: column; align-items: stretch; }
      .top-controls, .actions { flex-direction: column; align-items: stretch; }
      .btn, .jump-select { width: 100%; }
      .slide { padding: 18px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="brand-title">MSL924003 | Laboratory Data And Technical Skills</div>
        <div class="brand-subtitle">Interactive HTML subject deck rebuilt from the supplied PDF and added to the teaching hub.</div>

    <main class="stage">
      <section class="slide" id="slideRoot"></section>

    <div class="footerbar">
      <div class="progress-wrap">

        <div class="progress-label" id="progressLabel"></div>
      </div>
      <div class="actions">
        <select id="jumpSelect" class="jump-select"></select>
        <button class="btn secondary" id="prevBtn" type="button">Previous</button>
        <button class="btn" id="nextBtn" type="button">Next Slide</button>
      </div>
    </div>
  </div>

  <script>
    const slides = [{"number": 1, "kicker": "COURSE OVERVIEW", "title": "The Modern Technician's Guide to Laboratory Data and Technical Skills", "summary": "Guide to Data", "body": ["Guide to Data", "and Lab Skills", "This course treats laboratory work as a", "connected system rather than a set of"], "role": "Topic", "teaching_prompt": "Introduce the main idea, then use one quick question to check whether students already recognise the concept.", "watch_for": "connected system rather than a set of", "visual_caption": "data displays, and quality checkpoints.", "image": "./assets/slide-001.jpg"}, {"number": 2, "kicker": "STUDY METHOD", "title": "How to Use This Deck for Independent Learning", "summary": "Work through the slides in order the first time, because later topics assume you already understand earlier ones. For example, graph interpretation depends on correct units, and quality documentation only makes sense if", "body": ["Work through the slides in order the first time, because later topics assume you already understand earlier ones", "For example, graph interpretation depends on correct units, and quality documentation only makes sense if you first understand how accurate data is produced", "On your second pass, pause after each worked example and try to explain the idea in your own words", "If you can"], "role": "Method", "teaching_prompt": "Turn the method into a repeatable routine and have students say the steps out loud in order.", "watch_for": "If you can", "visual_caption": "learning routine.", "image": "./assets/slide-002.jpg"}, {"number": 3, "kicker": "DATA LIFECYCLE", "title": "The Laboratory Data Lifecycle", "summary": "Laboratory data follows a lifecycle. First you measure something in the physical world.", "body": ["Laboratory data follows a lifecycle", "First you measure something in the physical world", "Next you analyze that information and organize it into useful numbers, tables, and graphs", "Then you monitor patterns over time so you can tell whether a process is stable or drifting"], "role": "Topic", "teaching_prompt": "Introduce the main idea, then use one quick question to check whether students already recognise the concept.", "watch_for": "Then you monitor patterns over time so you can tell whether a process is stable or drifting", "visual_caption": "Each phase feeds the next.", "image": "./assets/slide-003.jpg"}, {"number": 4, "kicker": "ROADMAP", "title": "What the 15 Lessons Build Toward", "summary": "The deck is organized so the mathematics becomes gradually more applied. We begin with the language of measurement, move into geometry and algebra, then use those tools in chemical calculations, data presentation, and pr", "body": ["The deck is organized so the mathematics becomes gradually more applied", "We begin with the language of measurement, move into geometry and algebra, then use those tools in chemical calculations, data presentation, and process monitoring", "By the final slides you will see that workplace quality assurance is not a separate topic", "It is the natural outcome of doing each technical step carefully and"], "role": "Topic", "teaching_prompt": "Introduce the main idea, then use one quick question to check whether students already recognise the concept.", "watch_for": "It is the natural outcome of doing each technical step carefully and", "visual_caption": "monitoring, and traceability.", "image": "./assets/slide-004.jpg"}, {"number": 5, "kicker": "PROFESSIONAL HABITS", "title": "Habits That Make Laboratory Work Reliable", "summary": "Reliable work is built from habits. Write the unit every time a number appears.", "body": ["Reliable work is built from habits", "Write the unit every time a number appears", "Keep the same decimal format inside a table when the instrument resolution is consistent", "Estimate carefully when reading an analog scale"], "role": "Topic", "teaching_prompt": "Introduce the main idea, then use one quick question to check whether students already recognise the concept.", "watch_for": "Estimate carefully when reading an analog scale", "visual_caption": "that reduce errors before they happen.", "image": "./assets/slide-005.jpg"}, {"number": 6, "kicker": "PHASE 1", "title": "Measure and Calculate: Turning Reality Into Numbers", "summary": "Phase 1 is about disciplined observation. The laboratory does not begin with equations.", "body": ["Phase 1 is about disciplined observation", "The laboratory does not begin with equations", "It begins with a physical quantity: a mass on a balance, a length on a ruler, a volume in a cylinder, or a temperature on a probe", "Each reading must include a number, a unit, and an appropriate level of precision"], "role": "Phase", "teaching_prompt": "Use this as a milestone slide to show where the class is in the bigger laboratory workflow.", "watch_for": "Each reading must include a number, a unit, and an appropriate level of precision", "visual_caption": "physical observations into values.", "image": "./assets/slide-006.jpg"}, {"number": 7, "kicker": "PHASE 2", "title": "Organize and Analyze: Making Sense of Raw Results", "summary": "Raw data is rarely persuasive on its own. A long list of readings may be correct but still difficult to interpret.", "body": ["Raw data is rarely persuasive on its own", "A long list of readings may be correct but still difficult to interpret", "Analysis helps a technician recognize patterns, compare values fairly, and explain what the results mean to another person", "Good organization is part of analysis"], "role": "Phase", "teaching_prompt": "Use this as a milestone slide to show where the class is in the bigger laboratory workflow.", "watch_for": "Good organization is part of analysis", "visual_caption": "understandable information.", "image": "./assets/slide-007.jpg"}, {"number": 8, "kicker": "PHASE 3", "title": "Visualize and Monitor: Seeing Change Over Time", "summary": "Monitoring matters because many laboratory and production systems change gradually. A single result may still sit within a target range while the overall process is slowly moving in the wrong direction.", "body": ["Monitoring matters because many laboratory and production systems change gradually", "A single result may still sit within a target range while the overall process is slowly moving in the wrong direction", "Visual tools help you notice that change early", "Graphs and control charts let technicians move from reaction to prevention"], "role": "Phase", "teaching_prompt": "Use this as a milestone slide to show where the class is in the bigger laboratory workflow.", "watch_for": "Graphs and control charts let technicians move from reaction to prevention", "visual_caption": "behavior, drift, and warning points.", "image": "./assets/slide-008.jpg"}, {"number": 9, "kicker": "PHASE 4", "title": "Document and Protect: Preserving Trust in the Result", "summary": "A laboratory result is only useful if it can be trusted later. That means the result must be traceable to the sample, the equipment, the method, the operator, and the date.", "body": ["A laboratory result is only useful if it can be trusted later", "That means the result must be traceable to the sample, the equipment, the method, the operator, and the date", "It must also be stored securely so unauthorized edits or access do not damage its credibility", "This final phase is what allows results to survive audits, reviews, client questions, and process investigations"], "role": "Phase", "teaching_prompt": "Use this as a milestone slide to show where the class is in the bigger laboratory workflow.", "watch_for": "This final phase is what allows results to survive audits, reviews, client questions, and process investigations", "visual_caption": "restricted access.", "image": "./assets/slide-009.jpg"}, {"number": 10, "kicker": "MATH LANGUAGE", "title": "How to Read Numbers, Symbols, and Units Like a Technician", "summary": "Students sometimes struggle because the lab uses several languages at once: plain English, measurement units, algebraic symbols, graph axes, and table headings. This deck constantly links those languages together so they", "body": ["Students sometimes struggle because the lab uses several languages at once: plain English, measurement units, algebraic symbols, graph axes, and table headings", "This deck constantly links those languages together so they stop feeling separate", "Whenever you see a formula, ask three questions: what each symbol means, what unit belongs with it, and how the", "relationship connects to the real object"], "role": "Topic", "teaching_prompt": "Introduce the main idea, then use one quick question to check whether students already recognise the concept.", "watch_for": "Check that every numerical value keeps the correct unit all the way through the working.", "visual_caption": "symbols, formulas, axes, and unit labels.", "image": "./assets/slide-010.jpg"}, {"number": 11, "kicker": "LESSON 1", "title": "Measurements and SI Units", "summary": "Scientific work depends on shared units. Without a standard system, two technicians could measure the same object correctly but report answers that are hard to compare or dangerously easy to misread.", "body": ["Scientific work depends on shared units", "Without a standard system, two technicians could measure the same object correctly but report answers that are hard to compare or dangerously easy to misread", "The SI system solves this by giving science a consistent measurement language", "In daily laboratory work, the most common units include metres for length, grams or kilograms for mass, seconds for time, and degrees Celsius or kelvin for temperature"], "role": "Lesson", "teaching_prompt": "Frame the lesson goal first, then use the visual as the anchor before diving into detail.", "watch_for": "Check that every numerical value keeps the correct unit all the way through the working.", "visual_caption": "Measurements and SI Units.", "image": "./assets/slide-011.jpg"}, {"number": 12, "kicker": "LESSON 1", "title": "Measurements and SI Units: Core Rules and Method", "summary": "A measurement is complete only when it includes a value and a unit. Writing '12.4' is incomplete, but writing '12.4 cm' tells the reader what was measured and at what scale.", "body": ["A measurement is complete only when it includes a value and a unit", "Writing '12.4' is incomplete, but writing '12.4 cm' tells the reader what was measured and at what scale", "The number of decimal places also matters", "If a balance reads to 0.01 g, recording extra decimal places creates false precision"], "role": "Method", "teaching_prompt": "Turn the method into a repeatable routine and have students say the steps out loud in order.", "watch_for": "Check that every numerical value keeps the correct unit all the way through the working.", "visual_caption": "that govern measurements and si units.", "image": "./assets/slide-012.jpg"}, {"number": 13, "kicker": "LESSON 1", "title": "Measurements and SI Units: Worked Example", "summary": "Suppose a digital caliper reads 24.6 mm. That number does not merely describe size; it also tells the reader the measurement was taken to the nearest 0.1 mm.", "body": ["Suppose a digital caliper reads 24.6 mm", "That number does not merely describe size; it also tells the reader the measurement was taken to the nearest 0.1 mm", "If you rewrite it as 24.600 mm without evidence, you are claiming a precision the tool did not provide", "The same logic applies to mass and temperature"], "role": "Worked Example", "teaching_prompt": "Model the sequence slowly, pause after each step, and ask students what comes next before revealing the answer.", "watch_for": "Check that every numerical value keeps the correct unit all the way through the working.", "visual_caption": "connect to the process.", "image": "./assets/slide-013.jpg"}, {"number": 14, "kicker": "LESSON 1", "title": "Measurements and SI Units: Reading and Interpreting the Result", "summary": "When reading an analog scale, estimate one extra digit beyond the smallest marked division. This keeps the reported value consistent with what a trained observer can reasonably judge.", "body": ["When reading an analog scale, estimate one extra digit beyond the smallest marked division", "This keeps the reported value consistent with what a trained observer can reasonably judge", "When reading a digital display, do not add your own extra digits", "The display has already done the estimating for you"], "role": "Interpretation", "teaching_prompt": "Focus less on calculation and more on meaning. Ask what the result tells a technician in practice.", "watch_for": "Check that every numerical value keeps the correct unit all the way through the working.", "visual_caption": "observation or data pattern.", "image": "./assets/slide-014.jpg"}, {"number": 15, "kicker": "LESSON 1", "title": "Measurements and SI Units: Common Mistakes and Quality Checks", "summary": "Most errors in this topic are preventable when the technician slows down long enough to check logic, units, and physical meaning before moving on. Use the checklist below as a practical stopping point.", "body": ["Most errors in this topic are preventable when the technician slows down long enough to check logic, units, and physical meaning before moving on", "Use the checklist below as a practical stopping point", "Check", "Always keep the unit attached to every"], "role": "Quality Check", "teaching_prompt": "Use this slide as a stop-and-check moment: ask students which error is easiest to make and how they would catch it.", "watch_for": "Students often rush here. Slow the pace and make them justify the rule, reading, or interpretation they choose.", "visual_caption": "measurements and si units.", "image": "./assets/slide-015.jpg"}, {"number": 16, "kicker": "LESSON 1", "title": "Measurements and SI Units: Workplace Use and Recap", "summary": "Accurate measurement sits behind sample preparation, equipment setup, storage conditions, and final reporting. Even a simple unit slip can affect product quality, test validity, or safety decisions.", "body": ["Accurate measurement sits behind sample preparation, equipment setup, storage conditions, and final reporting", "Even a simple unit slip can affect product quality, test validity, or safety decisions", "Technicians who build clean habits at the measurement stage make every later task easier, because conversions, calculations, and records all begin from data that is already trustworthy", "Recap: A technician becomes more reliable"], "role": "Application", "teaching_prompt": "Connect the concept to workplace decisions, reporting, or instrument use so the idea feels job-relevant.", "watch_for": "Check that every numerical value keeps the correct unit all the way through the working.", "visual_caption": "laboratory practice.", "image": "./assets/slide-016.jpg"}, {"number": 17, "kicker": "LESSON 2", "title": "Metric Conversions and Capacity", "summary": "Metric conversion does not change the real object. It only changes the size of the unit used to describe that object.", "body": ["Metric conversion does not change the real object", "It only changes the size of the unit used to describe that object", "This idea is essential because many student mistakes happen when the number changes and it feels as if the thing itself has changed", "The metric system is built around powers of ten, which makes conversions systematic rather than random"], "role": "Lesson", "teaching_prompt": "Frame the lesson goal first, then use the visual as the anchor before diving into detail.", "watch_for": "The metric system is built around powers of ten, which makes conversions systematic rather than random", "visual_caption": "Conversions and Capacity.", "image": "./assets/slide-017.jpg"}, {"number": 18, "kicker": "LESSON 2", "title": "Metric Conversions and Capacity: Core Rules and Method", "summary": "When the unit becomes smaller, the number becomes larger     let currentIndex = 0;

    const slideRoot = document.getElementById("slideRoot");
    const slideIndicator = document.getElementById("slideIndicator");
    const kickerIndicator = document.getElementById("kickerIndicator");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const jumpSelect = document.getElementById("jumpSelect");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    function render(index) {
      const slide = slides[index];
      slideRoot.innerHTML = `
        <div class="panel-left">
          <div class="kicker">${slide.kicker}</div>
          <h1>${slide.title}</h1>
          <div class="summary">${slide.summary}</div>
          <div class="meta-row">
            <div class="meta-chip">Slide ${slide.number} / ${slides.length}</div>
            <div class="meta-chip">${slide.role}</div>
            <div class="meta-chip">MSL924003</div>
          </div>
          <div class="info-grid">
            <article class="card highlight">
              <h3>Slide Focus</h3>
              <p>${slide.summary}</p>
            </article>
            <article class="card soft">
              <h3>Teaching Move</h3>
              <p>${slide.teaching_prompt}</p>
            </article>
            <article class="card">
              <h3>Key Points</h3>
              <ul class="body-list">
                ${slide.body.map(item => `<li>${item}</li>`).join("")}
              </ul>
            </article>
            <article class="card">
              <h3>Watch For</h3>
              <p>${slide.watch_for}</p>
            </article>
          </div>
        </div>
        <div class="panel-right">
          <div class="image-frame">
            <div class="frame-top">
              <div>
                <h3>Slide Visual</h3>
              </div>
              <div class="frame-badge">${slide.role}</div>
            </div>
            <div class="image-card">
              <img src="${slide.image}" alt="${slide.title}">
            </div>
            <div class="cue-grid">
              <div class="caption-card">
                <h3>Visual Cue</h3>
                <p>${slide.visual_caption || "Use the slide visual with the extracted notes to teach or revise the idea."}</p>
              </div>
              <div class="caption-card">
                <h3>Teaching Use</h3>
                <p>Use the original slide artwork on the right as the classroom anchor, then teach from the structured notes on the left.</p>
              </div>
            </div>
          </div>
        </div>
      `;

      slideIndicator.textContent = `Slide ${slide.number} of ${slides.length}`;
      kickerIndicator.textContent = slide.kicker;
      progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
      progressLabel.textContent = `${Math.round(((index + 1) / slides.length) * 100)}% complete`;
      jumpSelect.value = String(index);
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === slides.length - 1;
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, index));
      render(currentIndex);
    }

    jumpSelect.innerHTML = slides.map((slide, index) => (
      `<option value="${index}">${slide.number}. ${slide.title}</option>`
    )).join("");

    prevBtn.addEventListener("click", () => goTo(currentIndex - 1));
    nextBtn.addEventListener("click", () => goTo(currentIndex + 1));
    jumpSelect.addEventListener("change", (event) => goTo(Number(event.target.value)));

    document.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex + 1);
      }
      if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex - 1);
      }
      if (event.key.toLowerCase() === "f") {
        fullscreenBtn.click();
      }
    });

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    render(currentIndex);
  </script>
