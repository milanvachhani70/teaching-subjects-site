v class=\"figure-body\">A matrix is not treated like a single number. Every entry keeps its own position and meaning.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Matrices", "title": "Transpose Means Swap Rows With Columns", "subtitle": "The transpose of a matrix is formed by reflecting entries across the main diagonal so rows become columns.", "explanation": "The transpose of a matrix is formed by reflecting entries across the main diagonal so rows become columns. If A is m \u00d7 n, then A\u1d40 is n \u00d7 m. Entry in row 1, column 2 moves to row 2, column 1. The main points are: directly find the transpose of a given matrix.", "sections": [{"heading": "Rule", "items": ["If A is m \u00d7 n, then A\u1d40 is n \u00d7 m.", "Entry in row 1, column 2 moves to row 2, column 1."], "kind": "list"}, {"heading": "What To Learn", "items": ["directly find the transpose of a given matrix."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 250\" class=\"svg-figure\" aria-label=\"Matrices and determinants\">\n      <text x=\"86\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">[</text>\n      <text x=\"250\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">]</text>\n      <line x1=\"130\" y1=\"78\" x2=\"130\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"190\" y1=\"78\" x2=\"190\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"114\" x2=\"220\" y2=\"114\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"150\" x2=\"220\" y2=\"150\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <text x=\"112\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">a</text>\n      <text x=\"152\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">b</text>\n      <text x=\"202\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">c</text>\n      <text x=\"112\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">d</text>\n      <text x=\"152\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">e</text>\n      <text x=\"202\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">f</text>\n      <text x=\"112\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">g</text>\n      <text x=\"152\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">h</text>\n      <text x=\"202\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">i</text>\n      <path d=\"M330 85 C360 60, 420 60, 455 85\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M330 182 C360 150, 420 150, 455 182\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"348\" y=\"52\" fill=\"#0f8b8d\" font-size=\"20\">main diagonal</text>\n      <text x=\"350\" y=\"214\" fill=\"#ef6f51\" font-size=\"20\">cross products</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">Rows turn into columns. Columns turn into rows.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Matrices", "title": "Matrix Multiplication Uses Row-By-Column Products", "subtitle": "Matrix multiplication is not entry-by-entry. Each result entry comes from a row-dot-column combination.", "explanation": "Matrix multiplication is not entry-by-entry. Each result entry comes from a row-dot-column combination. Work through the idea in this order: Check that the inner dimensions match first. Multiply across the row and down the column. The main points are: multiply given matrices, so dimension checking is a good first written line.", "sections": [{"heading": "Method", "items": ["Check that the inner dimensions match first.", "Multiply across the row and down the column.", "Add those products to form one answer entry."], "kind": "list"}, {"heading": "What To Learn", "items": ["multiply given matrices, so dimension checking is a good first written line."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 250\" class=\"svg-figure\" aria-label=\"Matrices and determinants\">\n      <text x=\"86\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">[</text>\n      <text x=\"250\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">]</text>\n      <line x1=\"130\" y1=\"78\" x2=\"130\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"190\" y1=\"78\" x2=\"190\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"114\" x2=\"220\" y2=\"114\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"150\" x2=\"220\" y2=\"150\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <text x=\"112\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">a</text>\n      <text x=\"152\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">b</text>\n      <text x=\"202\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">c</text>\n      <text x=\"112\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">d</text>\n      <text x=\"152\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">e</text>\n      <text x=\"202\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">f</text>\n      <text x=\"112\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">g</text>\n      <text x=\"152\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">h</text>\n      <text x=\"202\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">i</text>\n      <path d=\"M330 85 C360 60, 420 60, 455 85\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M330 182 C360 150, 420 150, 455 182\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"348\" y=\"52\" fill=\"#0f8b8d\" font-size=\"20\">main diagonal</text>\n      <text x=\"350\" y=\"214\" fill=\"#ef6f51\" font-size=\"20\">cross products</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Common Error</div>\n      <div class=\"figure-body\">A common mistake is to try to multiply matching positions directly. Keep repeating row by column, not entry by entry.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Determinants", "title": "2x2 Determinants Use ad - bc", "subtitle": "For a 2x2 matrix, the determinant is the product of the main diagonal minus the product of the other diagonal.", "explanation": "For a 2x2 matrix, the determinant is the product of the main diagonal minus the product of the other diagonal. Key relationships to keep in mind are: det [[a, b], [c, d]] = ad - bc. The main points are: For a direct determinant problem, show both diagonal products before simplifying.", "sections": [{"heading": "Formula", "items": ["det [[a, b], [c, d]] = ad - bc"], "kind": "formula"}, {"heading": "What To Learn", "items": ["For a direct determinant problem, show both diagonal products before simplifying."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 250\" class=\"svg-figure\" aria-label=\"Matrices and determinants\">\n      <text x=\"86\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">[</text>\n      <text x=\"250\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">]</text>\n      <line x1=\"130\" y1=\"78\" x2=\"130\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"190\" y1=\"78\" x2=\"190\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"114\" x2=\"220\" y2=\"114\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"150\" x2=\"220\" y2=\"150\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <text x=\"112\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">a</text>\n      <text x=\"152\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">b</text>\n      <text x=\"202\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">c</text>\n      <text x=\"112\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">d</text>\n      <text x=\"152\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">e</text>\n      <text x=\"202\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">f</text>\n      <text x=\"112\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">g</text>\n      <text x=\"152\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">h</text>\n      <text x=\"202\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">i</text>\n      <path d=\"M330 85 C360 60, 420 60, 455 85\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M330 182 C360 150, 420 150, 455 182\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"348\" y=\"52\" fill=\"#0f8b8d\" font-size=\"20\">main diagonal</text>\n      <text x=\"350\" y=\"214\" fill=\"#ef6f51\" font-size=\"20\">cross products</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">The determinant is a single value, not another matrix. Make that distinction explicit.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Determinants", "title": "3x3 Determinants Need An Organised Expansion", "subtitle": "Students can solve by cofactor expansion or by the diagonal method if that is how the class has practised the skill.", "explanation": "Students can solve by cofactor expansion or by the diagonal method if that is how the class has practised the skill. Work through the idea in this order: Write the chosen row or column clearly. Keep signs organised. A neat line-by-line method matters more than speed here. Rushed arithmetic causes most determinant mistakes.", "sections": [{"heading": "Method Advice", "items": ["Write the chosen row or column clearly.", "Keep signs organised.", "Simplify each minor carefully before combining."], "kind": "list"}, {"heading": "Why It Matters", "items": ["A neat line-by-line method matters more than speed here.", "Rushed arithmetic causes most determinant mistakes."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 250\" class=\"svg-figure\" aria-label=\"Matrices and determinants\">\n      <text x=\"86\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">[</text>\n      <text x=\"250\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">]</text>\n      <line x1=\"130\" y1=\"78\" x2=\"130\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"190\" y1=\"78\" x2=\"190\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"114\" x2=\"220\" y2=\"114\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"150\" x2=\"220\" y2=\"150\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <text x=\"112\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">a</text>\n      <text x=\"152\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">b</text>\n      <text x=\"202\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">c</text>\n      <text x=\"112\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">d</text>\n      <text x=\"152\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">e</text>\n      <text x=\"202\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">f</text>\n      <text x=\"112\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">g</text>\n      <text x=\"152\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">h</text>\n      <text x=\"202\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">i</text>\n      <path d=\"M330 85 C360 60, 420 60, 455 85\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M330 182 C360 150, 420 150, 455 182\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"348\" y=\"52\" fill=\"#0f8b8d\" font-size=\"20\">main diagonal</text>\n      <text x=\"350\" y=\"214\" fill=\"#ef6f51\" font-size=\"20\">cross products</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">How To Think</div>\n      <div class=\"figure-body\">use a systematic layout every time. Messy determinant work is very hard to rescue.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Systems", "title": "Solving A Linear System With Matrix Thinking", "subtitle": "solve three simultaneous equations, which is where matrix structure becomes especially useful.", "explanation": "solve three simultaneous equations, which is where matrix structure becomes especially useful. Work through the idea in this order: Organise coefficients into a matrix or augmented matrix. Apply a consistent elimination strategy. Work through the idea in this order: A strong answer shows setup, elimination or matrix method, and a substitution check.", "sections": [{"heading": "Process", "items": ["Organise coefficients into a matrix or augmented matrix.", "Apply a consistent elimination strategy.", "Check the final x, y, and z values in the original equations."], "kind": "list"}, {"heading": "Presentation", "items": ["A strong answer shows setup, elimination or matrix method, and a substitution check."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 250\" class=\"svg-figure\" aria-label=\"Matrices and determinants\">\n      <text x=\"86\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">[</text>\n      <text x=\"250\" y=\"144\" fill=\"#0d2b45\" font-size=\"84\">]</text>\n      <line x1=\"130\" y1=\"78\" x2=\"130\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"190\" y1=\"78\" x2=\"190\" y2=\"188\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"114\" x2=\"220\" y2=\"114\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"100\" y1=\"150\" x2=\"220\" y2=\"150\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <text x=\"112\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">a</text>\n      <text x=\"152\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">b</text>\n      <text x=\"202\" y=\"103\" fill=\"#0d2b45\" font-size=\"20\">c</text>\n      <text x=\"112\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">d</text>\n      <text x=\"152\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">e</text>\n      <text x=\"202\" y=\"140\" fill=\"#0d2b45\" font-size=\"20\">f</text>\n      <text x=\"112\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">g</text>\n      <text x=\"152\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">h</text>\n      <text x=\"202\" y=\"176\" fill=\"#0d2b45\" font-size=\"20\">i</text>\n      <path d=\"M330 85 C360 60, 420 60, 455 85\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M330 182 C360 150, 420 150, 455 182\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"348\" y=\"52\" fill=\"#0f8b8d\" font-size=\"20\">main diagonal</text>\n      <text x=\"350\" y=\"214\" fill=\"#ef6f51\" font-size=\"20\">cross products</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">Even if students solve by elimination, the matrix layout helps them keep the coefficients aligned accurately.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Module Check", "title": "Matrix Revision Before Statistics", "subtitle": "The topic becomes secure when learners can preserve matrix shape, use the correct operation rule, and keep determinant work organised.", "explanation": "The topic becomes secure when learners can preserve matrix shape, use the correct operation rule, and keep determinant work organised. The main points are: Add and subtract only same-size matrices. Find a transpose correctly. Think about which error is more dangerous here: wrong arithmetic or wrong layout.", "sections": [{"heading": "Key Skills", "items": ["Add and subtract only same-size matrices.", "Find a transpose correctly.", "Explain row-by-column multiplication.", "Use ad - bc for 2x2 determinants.", "Set out a 3x3 method or linear-system method clearly."], "kind": "list"}, {"heading": "Think About This", "items": ["Think about which error is more dangerous here: wrong arithmetic or wrong layout."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"     function renderSection(section) {
      const listClass = section.kind === "formula" ? "formula-list" : "";
      return `
        <article class="section-card ${listClass}">
          <h3>${section.heading}</h3>
          <ul>
            ${section.items.map(item => `<li>${item}</li>`).join("")}
          </ul>
        </article>
      `;

    function renderSlide(index) {
      const slide = slides[index];
      const densityScore =
        (slide.title?.length || 0) +
        (slide.subtitle?.length || 0) +
        (slide.explanation?.length || 0) +
        slide.sections.reduce((total, section) => {
          return total + (section.heading?.length || 0) + section.items.reduce((itemTotal, item) => itemTotal + item.length, 0);
        }, 0);
      const densityClass = densityScore > 760 ? "dense" : densityScore > 560 ? "compact" : "";

      slideRoot.className = `slide ${densityClass}`.trim();
      slideRoot.innerHTML = `
        <div class="left-col">
          <div class="kicker">${slide.kicker}</div>
          <h1>${slide.title}</h1>
          <div class="subtitle">${slide.subtitle || ""}</div>
          <div class="explain-card">
            <div class="explain-label">Key Explanation</div>
            <div class="explain-copy">${slide.explanation || ""}</div>
          </div>
          <div class="sections">
            ${slide.sections.map(renderSection).join("")}
          </div>
        </div>
        <div class="right-col">
          <div class="right-stack">
            ${slide.figureHtml || ""}
          </div>
        </div>
      `;

      slideIndicator.textContent = `Slide ${index + 1} of ${slides.length}`;
      classIndicator.textContent = slide.kicker;
      progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
      progressLabel.textContent = `${Math.round(((index + 1) / slides.length) * 100)}% complete`;
      jumpSelect.value = String(index);
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === slides.length - 1;
    }

    function populateJumpMenu() {
      jumpSelect.innerHTML = slides
        .map((slide, index) => `<option value="${index}">${index + 1}. ${slide.title}</option>`)
        .join("");
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, index));
      renderSlide(currentIndex);
    }

    prevBtn.addEventListener("click", () => goTo(currentIndex - 1));
    nextBtn.addEventListener("click", () => goTo(currentIndex + 1));
    jumpSelect.addEventListener("change", (event) => goTo(Number(event.target.value)));

    document.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex + 1);
      }
      if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex - 1);
      }
      if (event.key.toLowerCase() === "f") {
        fullscreenBtn.click();
      }
    });

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    populateJumpMenu();
    renderSlide(currentIndex);
  </script>
</body>
</html>
