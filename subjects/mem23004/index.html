arge binary values and is common in technical systems because each hex digit matches four binary bits. A = 10, B = 11, C = 12, D = 13, E = 14, F = 15. Convert decimal to hex by repeated division by 16 or by grouping binary digits in fours. The main points are: Convert decimal 188 to hexadecimal. Convert decimal 921 to hexadecimal.", "sections": [{"heading": "Key Facts", "items": ["A = 10, B = 11, C = 12, D = 13, E = 14, F = 15.", "Convert decimal to hex by repeated division by 16 or by grouping binary digits in fours."], "kind": "list"}, {"heading": "What To Learn", "items": ["Convert decimal 188 to hexadecimal.", "Convert decimal 921 to hexadecimal."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 250\" class=\"svg-figure\" aria-label=\"Binary place value\">\n      <rect x=\"65\" y=\"92\" width=\"86\" height=\"86\" rx=\"18\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"170\" y=\"92\" width=\"86\" height=\"86\" rx=\"18\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"275\" y=\"92\" width=\"86\" height=\"86\" rx=\"18\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"380\" y=\"92\" width=\"86\" height=\"86\" rx=\"18\" fill=\"#fdf0ea\" stroke=\"#ef6f51\" stroke-width=\"4\"/>\n      <rect x=\"485\" y=\"92\" width=\"86\" height=\"86\" rx=\"18\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <text x=\"87\" y=\"80\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">16</text>\n      <text x=\"195\" y=\"80\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">8</text>\n      <text x=\"302\" y=\"80\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">4</text>\n      <text x=\"408\" y=\"80\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">2</text>\n      <text x=\"515\" y=\"80\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">1</text>\n      <text x=\"99\" y=\"146\" fill=\"#0d2b45\" font-size=\"36\" font-weight=\"700\">1</text>\n      <text x=\"204\" y=\"146\" fill=\"#0d2b45\" font-size=\"36\" font-weight=\"700\">0</text>\n      <text x=\"309\" y=\"146\" fill=\"#0d2b45\" font-size=\"36\" font-weight=\"700\">0</text>\n      <text x=\"414\" y=\"146\" fill=\"#0d2b45\" font-size=\"36\" font-weight=\"700\">1</text>\n      <text x=\"519\" y=\"146\" fill=\"#0d2b45\" font-size=\"36\" font-weight=\"700\">1</text>\n      <text x=\"205\" y=\"215\" fill=\"#0d2b45\" font-size=\"22\" font-weight=\"700\">10011\u2082 = 19\u2081\u2080</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">Make students write the remainder values in decimal first, then translate any remainder above 9 into the matching letter.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Module Check", "title": "Number Systems Checklist Before Moving On", "subtitle": "Students are ready for the next module when they can answer each of these task types without guessing.", "explanation": "Students are ready for the next module when they can answer each of these task types without guessing. The main points are: State the bases of decimal, binary, and hexadecimal. Convert binary to decimal using place values. Think about which method they trust more for checking: place value, decimal verification, or repeated division.", "sections": [{"heading": "Key Skills", "items": ["State the bases of decimal, binary, and hexadecimal.", "Convert binary to decimal using place values.", "Convert decimal to binary using repeated division.", "Add, subtract, multiply, and divide binary numbers with clear working."], "kind": "list"}, {"heading": "Think About This", "items": ["Think about which method they trust more for checking: place value, decimal verification, or repeated division."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Learning checklist\">\n      <rect x=\"122\" y=\"36\" width=\"376\" height=\"170\" rx=\"24\" fill=\"#ffffff\" stroke=\"#d6e4ee\" stroke-width=\"4\"/>\n      <line x1=\"168\" y1=\"88\" x2=\"446\" y2=\"88\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"128\" x2=\"446\" y2=\"128\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"168\" x2=\"446\" y2=\"168\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <circle cx=\"146\" cy=\"68\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"108\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"148\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"188\" r=\"9\" fill=\"#0f8b8d\"/>\n      <text x=\"188\" y=\"74\" fill=\"#0d2b45\" font-size=\"18\">pick the right method</text>\n      <text x=\"188\" y=\"114\" fill=\"#0d2b45\" font-size=\"18\">show working clearly</text>\n      <text x=\"188\" y=\"154\" fill=\"#0d2b45\" font-size=\"18\">check graph / unit / sign</text>\n      <text x=\"188\" y=\"194\" fill=\"#0d2b45\" font-size=\"18\">finish with interpretation</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Key Takeaway</div>\n      <div class=\"figure-body\">If students can explain the method out loud, they usually perform much better when the task numbers change.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Module 2", "title": "Exponential And Logarithmic Functions", "subtitle": "The next unit block moves from number systems into powers, logs, and graphing tasks that combine formulas with software.", "explanation": "The next unit block moves from number systems into powers, logs, and graphing tasks that combine formulas with software. The main ideas include base notation, exponential form, logarithm form, graphs, and an earthquake-energy application. Connect exponent form, log form, graphs, and a practical calculation in one coherent story.", "sections": [{"heading": "What To Learn", "items": ["include base notation, exponential form, logarithm form, graphs, and an earthquake-energy application."], "kind": "list"}, {"heading": "Learning Goal", "items": ["Connect exponent form, log form, graphs, and a practical calculation in one coherent story."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Exponential and logarithmic graphs\">\n      <line x1=\"90\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 210 C180 205, 240 195, 290 170 S410 95, 540 48\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M145 210 C170 150, 210 116, 290 92 S455 68, 540 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <text x=\"430\" y=\"62\" fill=\"#0f8b8d\" font-size=\"18\" font-weight=\"700\">y = 2^x</text>\n      <text x=\"390\" y=\"110\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">y = log\u2081\u2080x</text>\n      <text x=\"540\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"100\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Visual Meaning</div>\n      <div class=\"figure-body\">Make students say the relationship both ways: exponent form and logarithm form describe the same fact.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Logs And Exponents", "title": "In f(x) = b^x, The Base And Exponent Each Have A Role", "subtitle": "The base b is the repeated multiplier, and x tells us how many times that multiplier is applied.", "explanation": "The base b is the repeated multiplier, and x tells us how many times that multiplier is applied. If f(x) = 2^3, the base is 2 and the exponent is 3. The value means 2 \u00d7 2 \u00d7 2 = 8. Base = repeated factor. Exponent = how many times the factor is used.", "sections": [{"heading": "Interpretation", "items": ["If f(x) = 2^3, the base is 2 and the exponent is 3.", "The value means 2 \u00d7 2 \u00d7 2 = 8.", "This directly answers the idea behind and supports."], "kind": "list"}, {"heading": "Key Words", "items": ["Base = repeated factor.", "Exponent = how many times the factor is used."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Exponential and logarithmic graphs\">\n      <line x1=\"90\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 210 C180 205, 240 195, 290 170 S410 95, 540 48\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M145 210 C170 150, 210 116, 290 92 S455 68, 540 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <text x=\"430\" y=\"62\" fill=\"#0f8b8d\" font-size=\"18\" font-weight=\"700\">y = 2^x</text>\n      <text x=\"390\" y=\"110\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">y = log\u2081\u2080x</text>\n      <text x=\"540\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"100\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Student Language</div>\n      <div class=\"figure-body\">Students who can explain base and exponent in words usually cope much better with the later graph task.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Logs And Exponents", "title": "Graphing f(x) = 2^x Means Building A Table First", "subtitle": "Before students graph an exponential function, they should calculate a few anchor points and then sketch the growth pattern.", "explanation": "Before students graph an exponential function, they should calculate a few anchor points and then sketch the growth pattern. Key relationships to keep in mind are: x = -2, -1, 0, 1, 2, 3. 2^x = 1/4, 1/2, 1, 2, 4, 8. The curve passes through (0,1). It grows rapidly to the right and approaches 0 on the left without touching it.", "sections": [{"heading": "Useful Table", "items": ["x = -2, -1, 0, 1, 2, 3", "2^x = 1/4, 1/2, 1, 2, 4, 8"], "kind": "formula"}, {"heading": "What The Graph Shows", "items": ["The curve passes through (0,1).", "It grows rapidly to the right and approaches 0 on the left without touching it."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Exponential and logarithmic graphs\">\n      <line x1=\"90\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 210 C180 205, 240 195, 290 170 S410 95, 540 48\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M145 210 C170 150, 210 116, 290 92 S455 68, 540 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <text x=\"430\" y=\"62\" fill=\"#0f8b8d\" font-size=\"18\" font-weight=\"700\">y = 2^x</text>\n      <text x=\"390\" y=\"110\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">y = log\u2081\u2080x</text>\n      <text x=\"540\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"100\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Strategy</div>\n      <div class=\"figure-body\">never try to sketch from memory alone. A 5- or 6-point table gives both accuracy and confidence.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Logs And Exponents", "title": "Exponential Form And Logarithm Form Say The Same Thing", "subtitle": "If a^b = c, then the equivalent logarithm statement is log_a(c) = b.", "explanation": "If a^b = c, then the equivalent logarithm statement is log_a(c) = b. 8 = 2^3 becomes log\u2082(8) = 3. If y = 10^x, then x = log\u2081\u2080(y). The main points are: write 8 in exponential form with base 2. write 8 = 2^3 in logarithm form.", "sections": [{"heading": "Conversions", "items": ["8 = 2^3 becomes log\u2082(8) = 3.", "If y = 10^x, then x = log\u2081\u2080(y)."], "kind": "list"}, {"heading": "What To Learn", "items": ["write 8 in exponential form with base 2.", "write 8 = 2^3 in logarithm form."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Exponential and logarithmic graphs\">\n      <line x1=\"90\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 210 C180 205, 240 195, 290 170 S410 95, 540 48\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M145 210 C170 150, 210 116, 290 92 S455 68, 540 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <text x=\"430\" y=\"62\" fill=\"#0f8b8d\" font-size=\"18\" font-weight=\"700\">y = 2^x</text>\n      <text x=\"390\" y=\"110\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">y = log\u2081\u2080x</text>\n      <text x=\"540\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"100\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">Power form tells you the value. Log form Focus on the power needed to make the value.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Logs And Exponents", "title": "The Graph Of log\u2081\u2080(x) Is Only Defined For Positive x", "subtitle": "A logarithm graph rises slowly, crosses the x-axis at x = 1, and does not exist for x values less than or equal to zero.", "explanation": "A logarithm graph rises slowly, crosses the x-axis at x = 1, and does not exist for x values less than or equal to zero. Key relationships to keep in mind are: log\u2081\u2080(0.1) = -1. log\u2081\u2080(1) = 0. The main points are: plot the graph on ordinary axes and think about it on a log axis as well.", "sections": [{"heading": "Anchor Points", "items": ["log\u2081\u2080(0.1) = -1", "log\u2081\u2080(1) = 0", "log\u2081\u2080(10) = 1", "log\u2081\u2080(100) = 2"], "kind": "formula"}, {"heading": "What To Learn", "items": ["plot the graph on ordinary axes and think about it on a log axis as well."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Exponential and logarithmic graphs\">\n      <line x1=\"90\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 210 C180 205, 240 195, 290 170 S410 95, 540 48\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M145 210 C170 150, 210 116, 290 92 S455 68, 540 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <text x=\"430\" y=\"62\" fill=\"#0f8b8d\" font-size=\"18\" font-weight=\"700\">y = 2^x</text>\n      <text x=\"390\" y=\"110\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">y = log\u2081\u2080x</text>\n      <text x=\"540\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"100\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Key Idea</div>\n      <div class=\"figure-body\">The x = 1 crossing is the easiest checkpoint. If the student's graph misses that point, something is wrong.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Worked Example", "title": "Earthquake Magnitude task: Read The Formula Before Calculating", "subtitle": "This is not just a substitution exercise. It also uses scientific notation, correct formula use, and graph interpretation.", "explanation": "This is not just a substitution exercise. It also uses scientific notation, correct formula use, and graph interpretation. Work through the idea in this order: Identify E = 8 \u00d7 10^14 joules and the given reference value E\u2080. Substitute carefully into the magnitude formula. Create two columns in Excel: energy and magnitude. Use a scatter or line chart with labelled axes.", "sections": [{"heading": "Method", "items": ["Identify E = 8 \u00d7 10^14 joules and the given reference value E\u2080.", "Substitute carefully into the magnitude formula.", "Use log rules or calculator function correctly, then interpret the result as earthquake magnitude."], "kind": "list"}, {"heading": "Graphing", "items": ["Create two columns in Excel: energy and magnitude.", "Use a scatter or line chart with labelled axes.", "Explain what increasing energy does to the magnitude."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Exponential and logarithmic graphs\">\n      <line x1=\"90\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 210 C180 205, 240 195, 290 170 S410 95, 540 48\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M145 210 C170 150, 210 116, 290 92 S455 68, 540 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <text x=\"430\" y=\"62\" fill=\"#0f8b8d\" font-size=\"18\" font-weight=\"700\">y = 2^x</text>\n      <text x=\"390\" y=\"110\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">y = log\u2081\u2080x</text>\n      <text x=\"540\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"100\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Method Pattern</div>\n      <div class=\"figure-body\">separate the algebra step from the spreadsheet step so both are visible in the answer.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Software Skill", "title": "Excel Workflow For Exponential And Log Graphs", "subtitle": "A strong Excel answer is clean, labelled, and clearly linked to the function being studied.", "explanation": "A strong Excel answer is clean, labelled, and clearly linked to the function being studied. Work through the idea in this order: Build an x-column with sensible step values. Use formulas for y-values rather than typing them manually. A common mistake is to choose too few x-values. Some students paste a chart without explaining what the curve shows.", "sections": [{"heading": "Suggested Workflow", "items": ["Build an x-column with sensible step values.", "Use formulas for y-values rather than typing them manually.", "Insert a scatter plot or smooth line chart.", "Label both axes and the chart title."], "kind": "list"}, {"heading": "What s Should Watch", "items": ["A common mistake is to choose too few x-values.", "Some students paste a chart without explaining what the curve shows."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Software workflow\">\n      <rect x=\"65\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"253\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"440\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <path d=\"M180 124 H253 M368 124 H440\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#wfA)\"/>\n      <text x=\"95\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Excel</text>\n      <text x=\"281\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Desmos</text>\n      <text x=\"458\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Check</text>\n      <defs>\n        <marker id=\"wfA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Presentation</div>\n      <div class=\"figure-body\">A graph should support the mathematics, not replace it. Students still need a short interpretation below the chart.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Module Check", "title": "Logs And Exponentials: Most Common Student Errors", "subtitle": "This section produces mistakes when students mix up the role of the base, ignore graph domain restrictions, or type formulas into Excel without checking the shape.", "explanation": "This section produces mistakes when students mix up the role of the base, ignore graph domain restrictions, or type formulas into Excel without checking the shape. Treating the exponent as the base. Forgetting that log x needs positive x-values. Use value tables before graphing. Match each exponential sentence with its logarithm sentence.", "sections": [{"heading": "Watch For", "items": ["Treating the exponent as the base.", "Forgetting that log x needs positive x-values.", "Plotting too few points to show the curve properly.", "Giving a spreadsheet chart without any written interpretation."], "kind": "list"}, {"heading": "Fixes", "items": ["Use value tables before graphing.", "Match each exponential sentence with its logarithm sentence.", "Check the graph hits its anchor points."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Learning checklist\">\n      <rect x=\"122\" y=\"36\" width=\"376\" height=\"170\" rx=\"24\" fill=\"#ffffff\" stroke=\"#d6e4ee\" stroke-width=\"4\"/>\n      <line x1=\"168\" y1=\"88\" x2=\"446\" y2=\"88\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"128\" x2=\"446\" y2=\"128\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"168\" x2=\"446\" y2=\"168\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <circle cx=\"146\" cy=\"68\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"108\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"148\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"188\" r=\"9\" fill=\"#0f8b8d\"/>\n      <text x=\"188\" y=\"74\" fill=\"#0d2b45\" font-size=\"18\">pick the right method</text>\n      <text x=\"188\" y=\"114\" fill=\"#0d2b45\" font-size=\"18\">show working clearly</text>\n      <text x=\"188\" y=\"154\" fill=\"#0d2b45\" font-size=\"18\">check graph / unit / sign</text>\n      <text x=\"188\" y=\"194\" fill=\"#0d2b45\" font-size=\"18\">finish with interpretation</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Quick Check</div>\n      <div class=\"figure-body\">If students can explain both the shape and the algebra, they are ready to move into trigonometry.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Module 3", "title": "Trigonometry And Sinusoidal Graphs", "subtitle": "The trigonometry block moves from right-triangle thinking into graphs of sin, cos, tan, and transformed sinusoidal functions.", "explanation": "The trigonometry block moves from right-triangle thinking into graphs of sin, cos, tan, and transformed sinusoidal functions. The main ideas include angle-based height, basic trig graphs, Desmos plotting, and transformed sine waves. Connect triangle ratios, unit-circle graphs, and transformed sine functions in one topic family.", "sections": [{"heading": "What To Learn", "items": ["include angle-based height, basic trig graphs, Desmos plotting, and transformed sine waves."], "kind": "list"}, {"heading": "Learning Goal", "items": ["Connect triangle ratios, unit-circle graphs, and transformed sine functions in one topic family."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Visual Meaning</div>\n      <div class=\"figure-body\">A common mistake is to think triangle trig and sine graphs are unrelated. Keep linking both to angle and periodic behaviour.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Trigonometry", "title": "Right-Triangle Ratios Give Direct Engineering Measurements", "subtitle": "Sine, cosine, and tangent connect an angle to side lengths in a right triangle.", "explanation": "Sine, cosine, and tangent connect an angle to side lengths in a right triangle. Key relationships to keep in mind are: sin \u03b8 = opposite / hypotenuse. cos \u03b8 = adjacent / hypotenuse. When height is unknown and an angle is given, tangent is often the quickest route. This matters immediately for the building-height task in.", "sections": [{"heading": "Core Ratios", "items": ["sin \u03b8 = opposite / hypotenuse", "cos \u03b8 = adjacent / hypotenuse", "tan \u03b8 = opposite / adjacent"], "kind": "formula"}, {"heading": "Why It Matters", "items": ["When height is unknown and an angle is given, tangent is often the quickest route.", "This matters immediately for the building-height task in."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">Students remember ratios better when you keep linking the words opposite, adjacent, and hypotenuse back to the marked triangle.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Worked Example", "title": "Finding Building Height From A 45\u00b0 Angle", "subtitle": "Use an angle to calculate height, so the setup diagram matters as much as the arithmetic.", "explanation": "Use an angle to calculate height, so the setup diagram matters as much as the arithmetic. Work through the idea in this order: Sketch the right triangle with the building height as the opposite side. Use tan 45\u00b0 = opposite / adjacent. Work through the idea in this order: Label the angle, known side, unknown side, and trig ratio before substituting numbers.", "sections": [{"heading": "Method", "items": ["Sketch the right triangle with the building height as the opposite side.", "Use tan 45\u00b0 = opposite / adjacent.", "Since tan 45\u00b0 = 1, the height matches the horizontal distance if the setup distance is known."], "kind": "list"}, {"heading": "Presentation", "items": ["Label the angle, known side, unknown side, and trig ratio before substituting numbers."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Visual Clue</div>\n      <div class=\"figure-body\">A clear labelled triangle often earns confidence even before the arithmetic is complete.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Trig Graphs", "title": "sin x And cos x Repeat With A Regular Period", "subtitle": "The sine and cosine graphs are periodic, smooth, and bounded between -1 and 1.", "explanation": "The sine and cosine graphs are periodic, smooth, and bounded between -1 and 1. The main points are: Amplitude 1 for the basic graphs. Period 360\u00b0 in degree mode. The main points are: draw sin and cos over a stated interval.", "sections": [{"heading": "Key Features", "items": ["Amplitude 1 for the basic graphs.", "Period 360\u00b0 in degree mode.", "sin 0 = 0 while cos 0 = 1."], "kind": "list"}, {"heading": "What To Learn", "items": ["draw sin and cos over a stated interval."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Graph Shape</div>\n      <div class=\"figure-body\">mark the quarter-turn values first: 0\u00b0, 90\u00b0, 180\u00b0, 270\u00b0, 360\u00b0.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Trig Graphs", "title": "tan x Has Vertical Asymptotes And A Different Shape", "subtitle": "Unlike sine and cosine, tangent is unbounded and breaks at odd multiples of 90\u00b0 because division by zero is not allowed.", "explanation": "Unlike sine and cosine, tangent is unbounded and breaks at odd multiples of 90\u00b0 because division by zero is not allowed. The main points are: tan x = sin x / cos x. When cos x = 0, tan x is undefined. The main points are: plot sin, cos, and tan together in Desmos.", "sections": [{"heading": "Important Feature", "items": ["tan x = sin x / cos x", "When cos x = 0, tan x is undefined.", "That creates vertical asymptotes at 90\u00b0, 270\u00b0, and so on."], "kind": "list"}, {"heading": "What To Learn", "items": ["plot sin, cos, and tan together in Desmos."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Watch For</div>\n      <div class=\"figure-body\">A common mistake is to draw tangent as a smooth wave. Keep pointing out the breaks and asymptotes.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Software Skill", "title": "Using Desmos Well For Trig Graphs", "subtitle": "Desmos is valuable when students use it to compare graph behaviour, not just to produce a screenshot.", "explanation": "Desmos is valuable when students use it to compare graph behaviour, not just to produce a screenshot. Work through the idea in this order: Enter y = sin x, y = cos x, and y = tan x separately. Adjust the window so one full period is visible. Work through the idea in this order: A strong solution names what each graph is doing. Mention where sin and cos start differently and why tan breaks.", "sections": [{"heading": "Workflow", "items": ["Enter y = sin x, y = cos x, and y = tan x separately.", "Adjust the window so one full period is visible.", "Use the graph to identify intercepts, peaks, and tangent asymptotes."], "kind": "list"}, {"heading": "Presentation", "items": ["A strong solution names what each graph is doing.", "Mention where sin and cos start differently and why tan breaks."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Software workflow\">\n      <rect x=\"65\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"253\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"440\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <path d=\"M180 124 H253 M368 124 H440\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#wfA)\"/>\n      <text x=\"95\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Excel</text>\n      <text x=\"281\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Desmos</text>\n      <text x=\"458\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Check</text>\n      <defs>\n        <marker id=\"wfA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Digital Skill</div>\n      <div class=\"figure-body\">The graph image should be followed by 1-2 lines of interpretation. That is what turns software output into evidence of understanding.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Transformed Sine Waves", "title": "y = A sin(B(x + C)) + D Has Four Features Students Must State", "subtitle": "identify amplitude, period, phase shift, and vertical shift from the general sine form.", "explanation": "identify amplitude, period, phase shift, and vertical shift from the general sine form. Key relationships to keep in mind are: Amplitude = |A|. Period = 360/B when angles are in degrees. Key relationships to keep in mind are: Changes inside the bracket affect horizontal behaviour. Changes outside the sine affect height and vertical position.", "sections": [{"heading": "Feature Map", "items": ["Amplitude = |A|", "Period = 360/B when angles are in degrees", "Phase shift comes from C inside the bracket", "Vertical shift = D"], "kind": "formula"}, {"heading": "Reading The Formula", "items": ["Changes inside the bracket affect horizontal behaviour.", "Changes outside the sine affect height and vertical position."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">Outside changes height. Inside changes horizontal timing. +D moves the whole graph up or down.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Worked Example", "title": "Reading : Amplitude, Period, Phase Shift, Vertical Shift", "subtitle": "For y = A sin(B(x + C)) + D, students must identify the graphical effect before they start plotting.", "explanation": "For y = A sin(B(x + C)) + D, students must identify the graphical effect before they start plotting. A = 10 gives amplitude 10. B = 90 gives period 360/90 = 4\u00b0 if degree-based scaling is used in the formula interpretation. Create a table of x-values and y-values first. Then build the chart and label the feature values beside it.", "sections": [{"heading": "Given Values", "items": ["A = 10 gives amplitude 10.", "B = 90 gives period 360/90 = 4\u00b0 if degree-based scaling is used in the formula interpretation.", "C shifts the graph horizontally.", "D = 1.5 shifts the graph up by 1.5."], "kind": "list"}, {"heading": "Graphing", "items": ["Create a table of x-values and y-values first.", "Then build the chart and label the feature values beside it."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Focus</div>\n      <div class=\"figure-body\">A common mistake is to mix phase shift direction. Make them write the horizontal shift in words before graphing.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Module Check", "title": "Trigonometry Revision Before Sequences", "subtitle": "The topic becomes secure when learners can select the right ratio, sketch the key trig graphs, and read transformed sine features correctly.", "explanation": "The topic becomes secure when learners can select the right ratio, sketch the key trig graphs, and read transformed sine features correctly. The main points are: Choose sine, cosine, or tangent from a labelled triangle. Sketch sin and cos with correct starting values. Think about which graph feature is easiest to miss when rushing: start point, period, or asymptote.", "sections": [{"heading": "Key Skills", "items": ["Choose sine, cosine, or tangent from a labelled triangle.", "Sketch sin and cos with correct starting values.", "Explain why tan has asymptotes.", "Identify amplitude, period, shift, and vertical movement from a sine formula."], "kind": "list"}, {"heading": "Think About This", "items": ["Think about which graph feature is easiest to miss when rushing: start point, period, or asymptote."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Learning checklist\">\n      <rect x=\"122\" y=\"36\" width=\"376\" height=\"170\" rx=\"24\" fill=\"#ffffff\" stroke=\"#d6e4ee\" stroke-width=\"4\"/>\n      <line x1=\"168\" y1=\"88\" x2=\"446\" y2=\"88\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"128\" x2=\"446\" y2=\"128\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"168\" x2=\"446\" y2=\"168\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <circle cx=\"146\" cy=\"68\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"108\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"148\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"188\" r=\"9\" fill=\"#0f8b8d\"/>\n      <text x=\"188\" y=\"74\" fill=\"#0d2b45\" font-size=\"18\">pick the right method</text>\n      <text x=\"188\" y=\"114\" fill=\"#0d2b45\" font-size=\"18\">show working clearly</text>\n      <text x=\"188\" y=\"154\" fill=\"#0d2b45\" font-size=\"18\">check graph / unit / sign</text>\n      <text x=\"188\" y=\"194\" fill=\"#0d2b45\" font-size=\"18\">finish with interpretation</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Key Takeaway</div>\n      <div class=\"figure-body\">When students can explain graph features in words, their Excel and Desmos answers improve immediately.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Module 4", "title": "Sequences, Series, And Arithmetic Progression", "subtitle": "The sequence block in the unit concentrates on arithmetic progression and the classic sum of the first 100 natural numbers.", "explanation": "The sequence block in the unit concentrates on arithmetic progression and the classic sum of the first 100 natural numbers. The main ideas include arithmetic progression, common difference, next terms, and the sum of the first 100 natural numbers. Recognise a constant difference quickly and use the arithmetic-sequence rule with confidence.", "sections": [{"heading": "What To Learn", "items": ["include arithmetic progression, common difference, next terms, and the sum of the first 100 natural numbers."], "kind": "list"}, {"heading": "Learning Goal", "items": ["Recognise a constant difference quickly and use the arithmetic-sequence rule with confidence."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Arithmetic sequence\">\n      <rect x=\"78\" y=\"138\" width=\"68\" height=\"52\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"178\" y=\"118\" width=\"68\" height=\"72\" rx=\"12\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"278\" y=\"98\" width=\"68\" height=\"92\" rx=\"12\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"378\" y=\"78\" width=\"68\" height=\"112\" rx=\"12\" fill=\"#fdf0ea\" stroke=\"#ef6f51\" stroke-width=\"4\"/>\n      <rect x=\"478\" y=\"58\" width=\"68\" height=\"132\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <text x=\"96\" y=\"125\" fill=\"#0d2b45\" font-size=\"18\">2</text>\n      <text x=\"196\" y=\"105\" fill=\"#0d2b45\" font-size=\"18\">5</text>\n      <text x=\"296\" y=\"85\" fill=\"#0d2b45\" font-size=\"18\">8</text>\n      <text x=\"392\" y=\"65\" fill=\"#0d2b45\" font-size=\"18\">11</text>\n      <text x=\"492\" y=\"45\" fill=\"#0d2b45\" font-size=\"18\">14</text>\n      <path d=\"M146 88 H178 M246 88 H278 M346 88 H378 M446 88 H478\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#seqA)\"/>\n      <text x=\"160\" y=\"78\" fill=\"#ef6f51\" font-size=\"16\">+3</text>\n      <defs>\n        <marker id=\"seqA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Visual Meaning</div>\n      <div class=\"figure-body\">Keep asking one simple task: does the change between terms stay constant?</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Sequences", "title": "Arithmetic Progression Means Equal Change From One Term To The Next", "subtitle": "A list of numbers is an arithmetic progression when the difference between consecutive terms stays constant.", "explanation": "A list of numbers is an arithmetic progression when the difference between consecutive terms stays constant. The main points are: 4, 9, 14, 19, 24 is arithmetic because the difference is +5. 48, 45, 42, 39 is arithmetic because the difference is -3. The main points are: Define arithmetic progression clearly. Judge whether a sequence is arithmetic and find the common difference.", "sections": [{"heading": "Examples", "items": ["4, 9, 14, 19, 24 is arithmetic because the difference is +5.", "48, 45, 42, 39 is arithmetic because the difference is -3.", "2, 4, 8, 16 is not arithmetic because the differences keep changing."], "kind": "list"}, {"heading": "What To Learn", "items": ["Define arithmetic progression clearly.", "Judge whether a sequence is arithmetic and find the common difference."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Arithmetic sequence\">\n      <rect x=\"78\" y=\"138\" width=\"68\" height=\"52\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"178\" y=\"118\" width=\"68\" height=\"72\" rx=\"12\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"278\" y=\"98\" width=\"68\" height=\"92\" rx=\"12\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"378\" y=\"78\" width=\"68\" height=\"112\" rx=\"12\" fill=\"#fdf0ea\" stroke=\"#ef6f51\" stroke-width=\"4\"/>\n      <rect x=\"478\" y=\"58\" width=\"68\" height=\"132\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <text x=\"96\" y=\"125\" fill=\"#0d2b45\" font-size=\"18\">2</text>\n      <text x=\"196\" y=\"105\" fill=\"#0d2b45\" font-size=\"18\">5</text>\n      <text x=\"296\" y=\"85\" fill=\"#0d2b45\" font-size=\"18\">8</text>\n      <text x=\"392\" y=\"65\" fill=\"#0d2b45\" font-size=\"18\">11</text>\n      <text x=\"492\" y=\"45\" fill=\"#0d2b45\" font-size=\"18\">14</text>\n      <path d=\"M146 88 H178 M246 88 H278 M346 88 H378 M446 88 H478\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#seqA)\"/>\n      <text x=\"160\" y=\"78\" fill=\"#ef6f51\" font-size=\"16\">+3</text>\n      <defs>\n        <marker id=\"seqA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Try It</div>\n      <div class=\"figure-body\">Subtract neighbouring terms. If the difference changes, it is not arithmetic.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Worked Example", "title": "Finding The Next Terms In An Arithmetic Sequence", "subtitle": "checks whether students can continue a pattern once they know the common difference.", "explanation": "This example checks whether students can continue a pattern once they know the common difference. 2, 5, 8, 11, 14 has common difference +3. The next three terms are 17, 20, 23. write the difference above or below the sequence before extending it. That simple mark helps prevent copying errors.", "sections": [{"heading": "Example", "items": ["2, 5, 8, 11, 14 has common difference +3.", "The next three terms are 17, 20, 23."], "kind": "list"}, {"heading": "Remember", "items": ["write the difference above or below the sequence before extending it.", "That simple mark helps prevent copying errors."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Arithmetic sequence\">\n      <rect x=\"78\" y=\"138\" width=\"68\" height=\"52\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"178\" y=\"118\" width=\"68\" height=\"72\" rx=\"12\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"278\" y=\"98\" width=\"68\" height=\"92\" rx=\"12\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"378\" y=\"78\" width=\"68\" height=\"112\" rx=\"12\" fill=\"#fdf0ea\" stroke=\"#ef6f51\" stroke-width=\"4\"/>\n      <rect x=\"478\" y=\"58\" width=\"68\" height=\"132\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <text x=\"96\" y=\"125\" fill=\"#0d2b45\" font-size=\"18\">2</text>\n      <text x=\"196\" y=\"105\" fill=\"#0d2b45\" font-size=\"18\">5</text>\n      <text x=\"296\" y=\"85\" fill=\"#0d2b45\" font-size=\"18\">8</text>\n      <text x=\"392\" y=\"65\" fill=\"#0d2b45\" font-size=\"18\">11</text>\n      <text x=\"492\" y=\"45\" fill=\"#0d2b45\" font-size=\"18\">14</text>\n      <path d=\"M146 88 H178 M246 88 H278 M346 88 H378 M446 88 H478\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#seqA)\"/>\n      <text x=\"160\" y=\"78\" fill=\"#ef6f51\" font-size=\"16\">+3</text>\n      <defs>\n        <marker id=\"seqA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Method Pattern</div>\n      <div class=\"figure-body\">Write the common difference first. Then extend the sequence. Students who skip that step make more avoidable mistakes.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Series", "title": "Sum Of The First 100 Natural Numbers", "subtitle": "is a classic series task and a good chance to introduce a compact formula rather than manual addition.", "explanation": "is a classic series task and a good chance to introduce a compact formula rather than manual addition. Key relationships to keep in mind are: 1 + 2 + 3 +... + n = n(n + 1)/2. For n = 100, the sum is 100 \u00d7 101 / 2 = 5050. Students can also pair terms from the ends: 1+100, 2+99, 3+98, all making 101.", "sections": [{"heading": "Formula", "items": ["1 + 2 + 3 +... + n = n(n + 1)/2", "For n = 100, the sum is 100 \u00d7 101 / 2 = 5050"], "kind": "formula"}, {"heading": "Key Idea", "items": ["Students can also pair terms from the ends: 1+100, 2+99, 3+98, all making 101."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Arithmetic sequence\">\n      <rect x=\"78\" y=\"138\" width=\"68\" height=\"52\" rx=\"12\" fill=\"#e9f st.", "The resultant goes from the very first tail to the very last head."], "kind": "list"}, {"heading": "Numerical Rule", "items": ["Add horizontal components together.", "Add vertical components together.", "Then interpret the resultant direction."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Vector addition\">\n      <line x1=\"70\" y1=\"220\" x2=\"310\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"90\" y1=\"240\" x2=\"90\" y2=\"40\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M90 220 L220 220\" stroke=\"#0f8b8d\" stroke-width=\"6\" marker-end=\"url(#vecA)\"/>\n      <path d=\"M220 220 L220 120\" stroke=\"#f7b44c\" stroke-width=\"6\" marker-end=\"url(#vecB)\"/>\n      <path d=\"M90 220 L220 120\" stroke=\"#ef6f51\" stroke-width=\"6\" marker-end=\"url(#vecC)\"/>\n      <text x=\"132\" y=\"208\" fill=\"#0f8b8d\" font-size=\"18\">east</text>\n      <text x=\"228\" y=\"168\" fill=\"#f7b44c\" font-size=\"18\">north</text>\n      <text x=\"148\" y=\"154\" fill=\"#ef6f51\" font-size=\"18\">resultant</text>\n      <defs>\n        <marker id=\"vecA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#0f8b8d\"/>\n        </marker>\n        <marker id=\"vecB\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#f7b44c\"/>\n        </marker>\n        <marker id=\"vecC\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n      <line x1=\"390\" y1=\"220\" x2=\"570\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"410\" y1=\"240\" x2=\"410\" y2=\"60\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <rect x=\"435\ s.", "sections": [{"heading": "What To Learn", "items": ["include complex basics, operations, and quadrant location."], "kind": "list"}, {"heading": "Learning Goal", "items": ["Treat complex numbers as structured pairs of real and imaginary parts, not as mysterious symbols."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Complex plane\">\n      <line x1=\"80\" y1=\"210\" x2=\"560\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"320\" y1=\"40\" x2=\"320\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <circle cx=\"420\" cy=\"120\" r=\"10\" fill=\"#ef6f51\"/>\n      <path d=\"M320 210 L420 120\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M320 120 H420\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <path d=\"M420 210 V120\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <text x=\"438\" y=\"124\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">-5 + 3i</text>\n      <text x=\"544\" y=\"235\" fill=\"#0d2b45\" font-size=\"16\">real</text>\n      <text x=\"330\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">imaginary</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Visual Meaning</div>\n      <div class=\"figure-body\">Keep the real part and imaginary part visible in separate colours or columns. That makes every operation easier to track.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Complex Numbers", "title": "The Imaginary Unit Creates A New Number Direction", "subtitle": "A complex number is written as a + bi, where a is the real part and b is the imaginary coefficient.", "explanation": "A complex number is written as a + bi, where a is the real part and b is the imaginary coefficient. i is defined so that i\u00b2 = -1. A complex number combines a real axis move and an imaginary axis move. Real part = horizontal position. Imaginary part = vertical position on the Argand plane.", "sections": [{"heading": "Foundations", "items": ["i is defined so that i\u00b2 = -1.", "A complex number combines a real axis move and an imaginary axis move.", "This is the background for and."], "kind": "list"}, {"heading": "Teaching Language", "items": ["Real part = horizontal position.", "Imaginary part = vertical position on the Argand plane."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Complex plane\">\n      <line x1=\"80\" y1=\"210\" x2=\"560\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"320\" y1=\"40\" x2=\"320\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <circle cx=\"420\" cy=\"120\" r=\"10\" fill=\"#ef6f51\"/>\n      <path d=\"M320 210 L420 120\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M320 120 H420\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <path d=\"M420 210 V120\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <text x=\"438\" y=\"124\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">-5 + 3i</text>\n      <text x=\"544\" y=\"235\" fill=\"#0d2b45\" font-size=\"16\">real</text>\n      <text x=\"330\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">imaginary</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">Treat a + bi like a coordinate: real first, imaginary second.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Complex Operations", "title": "Addition And Subtraction Work By Matching Like Parts", "subtitle": "To add or subtract complex numbers, combine real parts with real parts and imaginary parts with imaginary parts.", "explanation": "To add or subtract complex numbers, combine real parts with real parts and imaginary parts with imaginary parts. Key relationships to keep in mind are: (a + bi) + (c + di) = (a + c) + (b + d)i. (a + bi) - (c + di) = (a - c) + (b - d)i. The main points are: are direct operation task, so neat layout matters more than speed.", "sections": [{"heading": "Rule", "items": ["(a + bi) + (c + di) = (a + c) + (b + d)i", "(a + bi) - (c + di) = (a - c) + (b - d)i"], "kind": "formula"}, {"heading": "What To Learn", "items": ["are direct operation task, so neat layout matters more than speed."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Complex plane\">\n      <line x1=\"80\" y1=\"210\" x2=\"560\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"320\" y1=\"40\" x2=\"320\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <circle cx=\"420\" cy=\"120\" r=\"10\" fill=\"#ef6f51\"/>\n      <path d=\"M320 210 L420 120\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M320 120 H420\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <path d=\"M420 210 V120\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <text x=\"438\" y=\"124\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">-5 + 3i</text>\n      <text x=\"544\" y=\"235\" fill=\"#0d2b45\" font-size=\"16\">real</text>\n      <text x=\"330\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">imaginary</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Remember</div>\n      <div class=\"figure-body\">Write answers in standard form a + bi even when the imaginary coefficient is negative.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Complex Operations", "title": "Multiplication And Division Need i\u00b2 = -1", "subtitle": "Complex multiplication expands like algebra, while division is simplified by multiplying by the conjugate.", "explanation": "Complex multiplication expands like algebra, while division is simplified by multiplying by the conjugate. Expand brackets normally. Replace every i\u00b2 with -1. Multiply top and bottom by the conjugate of the denominator. That turns the denominator into a real number and lets you simplify cleanly.", "sections": [{"heading": "Multiplication", "items": ["Expand brackets normally.", "Replace every i\u00b2 with -1.", "Collect real and imaginary parts."], "kind": "list"}, {"heading": "Division", "items": ["Multiply top and bottom by the conjugate of the denominator.", "That turns the denominator into a real number and lets you simplify cleanly."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Complex plane\">\n      <line x1=\"80\" y1=\"210\" x2=\"560\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"320\" y1=\"40\" x2=\"320\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <circle cx=\"420\" cy=\"120\" r=\"10\" fill=\"#ef6f51\"/>\n      <path d=\"M320 210 L420 120\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M320 120 H420\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <path d=\"M420 210 V120\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <text x=\"438\" y=\"124\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">-5 + 3i</text>\n      <text x=\"544\" y=\"235\" fill=\"#0d2b45\" font-size=\"16\">real</text>\n      <text x=\"330\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">imaginary</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">How To Think</div>\n      <div class=\"figure-body\">Students lose marks by stopping before simplifying i\u00b2. Train them to circle every i\u00b2 and replace it immediately.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Argand Plane", "title": "Locating A Complex Number On The Plane Explains", "subtitle": "The real part determines left-right movement, and the imaginary part determines up-down movement.", "explanation": "The real part determines left-right movement, and the imaginary part determines up-down movement. 5 + 3i moves 5 units left and 3 units up. That places the point in Quadrant II.", "sections": [{"heading": "Example", "items": ["5 + 3i moves 5 units left and 3 units up.", "That places the point in Quadrant II."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Complex plane\">\n      <line x1=\"80\" y1=\"210\" x2=\"560\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"320\" y1=\"40\" x2=\"320\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <circle cx=\"420\" cy=\"120\" r=\"10\" fill=\"#ef6f51\"/>\n      <path d=\"M320 210 L420 120\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M320 120 H420\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <path d=\"M420 210 V120\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <text x=\"438\" y=\"124\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">-5 + 3i</text>\n      <text x=\"544\" y=\"235\" fill=\"#0d2b45\" font-size=\"16\">real</text>\n      <text x=\"330\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">imaginary</text>\n    </svg>\n    \n      </div>\n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Simple Rule</div>\n      <div class=\"figure-body\">Negative real means left. Positive imaginary means up. Left plus up lands in Quadrant II.</div>\n    </div>\n    \n    </div>\n    "}, {"kicker": "Module Check", "title": "Complex Number Revision: Form, Operations, Graphing", "subtitle": "Be able to switch between symbolic operations and Argand-plane interpretation with confidence.", "explanation": "Be able to switch between symbolic operations and Argand-plane interpretation with confidence. The main points are: State the meaning of a + bi. Add and subtract like parts correctly. Explain why -5 + 3i is not in Quadrant III.", "sections": [{"heading": "Key Skills", "items": ["State the meaning of a + bi.", "Add and subtract like parts correctly.", "Use i\u00b2 = -1 in multiplication.", "Use the conjugate in division.", "Locate a complex point on the Argand plane."], "kind": "list"}, {"heading": "Think About This", "items": ["Explain why -5 + 3i is not in Quadrant III."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      <div class=\"media-card\">\n        \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Learning checklist\">\n      <rect x=\"122\" y=\"36\" width=\"376\" height=\"170\" rx=\"24\" fill=\"#ffffff\" stroke=\"#d6e4ee\" stroke-width=\"4\"/>\n      <line x1=\"168\" y1=\"88\" x2=\"446\" y2=\"88\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"128\" x2=\"446\" y2=\"128\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"168\" x2=\"446\" y2=\"168\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <circle cx=\"146\" cy=\"68\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"108\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"148\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"188\" r=\"9\" fill=\"#0f8b8d\"/>\n      <text x=\"188\" y=\"74\" fill=\"#0d2b45\" font-size=\"18\">pick the right method</text>\n      <text x=\"188\" y=\"114\" fill=\"#0d2b45\" font-size=\"18\">show working clearly</text>\n      <text x=\"188\" y=\"154\" fill=\"#0d2b45\" font-size=\"18\">check graph / unit / sign</text>\n      <text x=\"188\" y=\"194\" fill=\"#0d2b45\" font-size=\"18\">finish with interpretation</text>\n    </svg>\n    \n      </div>\n      \n
