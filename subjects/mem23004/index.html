
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MEM23004 Interactive Teaching Deck</title>
  <style>
    :root {
      --ink: #0d2b45;
      --ink-soft: #274b63;
      --sky: #e9f5fb;
      --cream: #fff8ef;
      --teal: #0f8b8d;
      --gold: #f7b44c;
      --coral: #ef6f51;
      --panel: rgba(255, 255, 255, 0.82);
      --shadow: 0 24px 60px rgba(13, 43, 69, 0.18);
      --line: rgba(13, 43, 69, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(247, 180, 76, 0.28), transparent 28%),
        radial-gradient(circle at top right, rgba(15, 139, 141, 0.20), transparent 24%),
        linear-gradient(180deg, #f4fbff 0%, #fff8ef 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(13, 43, 69, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(13, 43, 69, 0.025) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
    }

    .deck-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: 20px 22px 24px;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 24px rgba(13, 43, 69, 0.08);
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 0.93rem;
      color: var(--ink-soft);
    }

    .top-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      font-size: 0.9rem;
      color: var(--ink-soft);
    }

    .slide-stage {
      display: grid;
      place-items: center;
    }

    .slide {
      width: min(100%, 1480px);
      height: min(calc(100vh - 180px), 840px);
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
      padding: 26px;
      border-radius: 34px;
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.80)),
        linear-gradient(135deg, rgba(15, 139, 141, 0.10), rgba(247, 180, 76, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      animation: slideIn 280ms ease;
    }

    .slide::after {
      content: "";
      position: absolute;
      right: -120px;
      bottom: -120px;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 139, 141, 0.12), transparent 72%);
      pointer-events: none;
    }

    .left-col,
    .right-col {
      min-height: 0;
      overflow: hidden;
    }

    .kicker {
      display: inline-flex;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(15, 139, 141, 0.10);
      color: var(--teal);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.84rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.92rem, 3.15vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 14px;
      font-size: 1.02rem;
      line-height: 1.5;
      color: var(--ink-soft);
      max-width: 60ch;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip {
      padding: 10px 13px;
      border-radius: 14px;
      background: rgba(247, 180, 76, 0.16);
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .sections {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .section-card {
      background: var(--panel);
      border: 1px solid rgba(13, 43, 69, 0.09);
      border-radius: 22px;
      padding: 18px 18px 16px;
      box-shadow: 0 10px 26px rgba(13, 43, 69, 0.06);
    }

    .section-card h3 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      letter-spacing: 0.01em;
    }

    .section-card ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      color: var(--ink-soft);
      line-height: 1.42;
    }

    .formula-list li {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      font-size: 1rem;
    }

    .right-stack {
      display: grid;
      gap: 14px;
      grid-template-rows: auto auto;
    }

    .media-card,
    .meta-card,
    .figure-card {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(13, 43, 69, 0.09);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(13, 43, 69, 0.07);
    }

    .media-card {
      min-height: 255px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .svg-figure {
      width: 100%;
      height: auto;
      max-height: 340px;
    }

    .visual-stack {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .meta-grid {
      display: grid;
      gap: 12px;
    }

    .meta-card h4 {
      margin: 0 0 8px;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .meta-card p {
      margin: 0;
      line-height: 1.48;
      color: var(--ink);
    }

    .figure-card {
      border-left: 6px solid var(--teal);
    }

    .accent-gold { border-left-color: var(--gold); }
    .accent-coral { border-left-color: var(--coral); }
    .accent-teal { border-left-color: var(--teal); }

    .figure-title {
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .figure-body {
      line-height: 1.5;
      color: var(--ink);
    }

    .slide.compact {
      gap: 18px;
      padding: 24px;
    }

    .slide.compact h1 {
      font-size: clamp(1.76rem, 2.9vw, 2.55rem);
    }

    .slide.compact .subtitle,
    .slide.compact .meta-card p,
    .slide.compact .figure-body,
    .slide.compact .section-card ul {
      font-size: 0.94rem;
      line-height: 1.38;
    }

    .slide.compact .sections {
      gap: 12px;
      margin-top: 18px;
    }

    .slide.compact .section-card,
    .slide.compact .media-card,
    .slide.compact .meta-card,
    .slide.compact .figure-card {
      padding: 16px;
    }

    .slide.compact .media-card {
      min-height: 235px;
    }

    .slide.dense {
      gap: 16px;
      padding: 22px;
    }

    .slide.dense h1 {
      font-size: clamp(1.62rem, 2.6vw, 2.3rem);
    }

    .slide.dense .kicker {
      margin-bottom: 10px;
      padding: 8px 12px;
    }

    .slide.dense .subtitle,
    .slide.dense .meta-card p,
    .slide.dense .figure-body,
    .slide.dense .section-card ul,
    .slide.dense .chip {
      font-size: 0.89rem;
      line-height: 1.34;
    }

    .slide.dense .chips {
      margin-top: 14px;
      gap: 8px;
    }

    .slide.dense .sections {
      gap: 10px;
      margin-top: 16px;
    }

    .slide.dense .section-card,
    .slide.dense .media-card,
    .slide.dense .meta-card,
    .slide.dense .figure-card {
      padding: 14px;
    }

    .slide.dense .media-card {
      min-height: 220px;
    }

    .footerbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(14px);
    }

    .progress-wrap {
      flex: 1;
      min-width: 180px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(13, 43, 69, 0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      border-radius: inherit;
      transition: width 220ms ease;
    }

    .progress-label {
      margin-top: 6px;
      font-size: 0.88rem;
      color: var(--ink-soft);
    }

    button,
    select {
      border: none;
      outline: none;
      font: inherit;
    }

    .nav-btn,
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--ink), #173a56);
      color: white;
      cursor: pointer;
      transition: transform 150ms ease, opacity 150ms ease, box-shadow 150ms ease;
      box-shadow: 0 8px 18px rgba(13, 43, 69, 0.18);
    }

    .nav-btn.secondary,
    .action-btn.secondary {
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border: 1px solid rgba(13, 43, 69, 0.12);
      box-shadow: none;
    }

    .nav-btn:hover,
    .action-btn:hover {
      transform: translateY(-1px);
    }

    .jump-select {
      padding: 11px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(13, 43, 69, 0.12);
      min-width: 220px;
      color: var(--ink);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 1200px) {
      .slide {
        grid-template-columns: 1fr;
        height: auto;
        max-height: none;
      }

      .sections {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .deck-shell {
        padding: 14px;
      }

      .topbar,
      .footerbar {
        flex-direction: column;
        align-items: stretch;
      }

      .top-controls,
      .actions {
        justify-content: stretch;
      }

      .jump-select,
      .nav-btn,
      .action-btn {
        width: 100%;
      }

      .slide {
        padding: 18px;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="deck-shell">
    <div class="topbar">
      <div class="brand-block">
        <div class="brand-title">MEM23004A Interactive HTML PPT</div>
        <div class="brand-subtitle">Assessment-led teaching deck built from the student pack and unit scope</div>

      <div class="top-controls">
        <div class="pill" id="slideIndicator">Slide 1</div>
        <div class="pill" id="classIndicator">Class overview</div>
        <button class="action-btn secondary" id="fullscreenBtn" type="button">Full Screen</button>
      </div>
    </div>

    <main class="slide-stage" aria-live="polite">
      <section class="slide" id="slideRoot"></section>
    </main>

    <div class="footerbar">
      <div class="progress-wrap">
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel"></div>
      </div>
      <div class="actions">
        <label class="sr-only" for="jumpSelect">Jump to slide</label>
        <select id="jumpSelect" class="jump-select"></select>
        <button class="nav-btn secondary" id="prevBtn" type="button">Previous</button>
        <button class="nav-btn" id="nextBtn" type="button">Next Slide</button>
      </div>
    </div>
  </div>

h / unit / sign</text>\n      <text x=\"188\" y=\"194\" fill=\"#0d2b45\" font-size=\"18\">finish with interpretation</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Ready To Advance</div>\n      <div class=\"figure-body\">If students can explain the method out loud, they usually perform much better when the question numbers change.</div>\n    </div>\n    \n    </div>\n    ", "cue": "Use this as a quick oral recap before starting logarithms.", "source": "MEM23004A_Student pack.docx", "assessment": "Q1-Q13 revision"}, {"kicker": "Module 2", "title": "Exponential And Logarithmic Functions", "subtitle": "The next student-pack block moves from number systems into powers, logs, and graphing tasks that combine formulas with software.", "sections": [{"heading": "Assessment Links", "items": ["Q14-Q19 cover base notation, exponential form, logarithm form, graphs, and an earthquake-energy application."], "kind": "list"}, {"heading": "Teaching Goal", "items": ["Students should connect exponent form, log form, graphs, and a practical calculation in one coherent story."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Exponential and logarithmic graphs\">\n      <line x1=\"90\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 210 C180 205, 240 195, 290 170 S410 95, 540 48\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M145 210 C170 150, 210 116, 290 92 S455 68, 540 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <text x=\"430\" y=\"62\" fill=\"#0f8b8d\" font-size=\"18\" font-weight=\"700\">y = 2^x</text>\n      <text x=\"390\" y=\"110\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">y = log\u2081\u2080x</text>\n      <text x=\"540\ \">y = log\u2081\u2080x</text>\n      <text x=\"540\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"100\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Memory Anchor</div>\n      <div class=\"figure-body\">Power form tells you the value. Log form asks for the power needed to make the value.</div>\n    </div>\n    \n    </div>\n    ", "cue": "A matching-pairs exercise works well here because students see the two notations side by side.", "source": "Log and exp.pdf + MEM23004A_Student pack.docx", "assessment": "Q16-Q17"}, {"kicker": "Logs And Exponents", "title": "The Graph Of log\u2081\u2080(x) Is Only Defined For Positive x", "subtitle": "A logarithm graph rises slowly, crosses the x-axis at x = 1, and does not exist for x values less than or equal to zero.", "sections": [{"heading": "Anchor Points", "items": ["log\u2081\u2080(0.1) = -1", "log\u2081\u2080(1) = 0", "log\u2081\u2080(10) = 1", "log\u2081\u2080(100) = 2"], "kind": "formula"}, {"heading": "Assessment Link", "items": ["Q18 asks students to plot the graph on ordinary axes and think about it on a log axis as well."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Exponential and logarithmic graphs\">\n      <line x1=\"90\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"40\" x2=\"120\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 210 C180 205, 240 195, 290 170 S410 95, 540 48\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M145 210 C170 150, 210 116, 290 92 S455 68, 540 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <text x=\"430\" y=\"62\" fill=\"#0f8b8d\" font-size=\"18\" font-weight=\"700\">y = 2^x</text>\n      <text x=\"390\" y=\"110\" fill=\"#ef6f5 , "title": "Right-Triangle Ratios Give Direct Engineering Measurements", "subtitle": "Sine, cosine, and tangent connect an angle to side lengths in a right triangle.", "sections": [{"heading": "Core Ratios", "items": ["sin \u03b8 = opposite / hypotenuse", "cos \u03b8 = adjacent / hypotenuse", "tan \u03b8 = opposite / adjacent"], "kind": "formula"}, {"heading": "Teaching Use", "items": ["When height is unknown and an angle is given, tangent is often the quickest route.", "This matters immediately for the building-height question in Q20."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Teacher Cue</div>\n      <div class=\"figure-body\">Students remember ratios better when you keep linking the words opposite, adjacent, and hypotenuse back to the marked triangle.</div>\n    </div>\n    \n    </div>\n    ", "cue": "This is a good slide for drawing the triangle again on the board with the angle marked clearly.", "source": "Trigonometry_Short_Course_Tutorial_Lauren_Johnson.pdf + MEM23004A_Student pack.docx", "assessment": "Q20"}, {"kicker": "Worked Example", "title": "Finding Building Height From A 45\u00b0 Angle", "subtitle": "Q20 asks students to use an angle to calculate height, so the setup diagram matters as much as the arithmetic.", "sections": [{"heading": "Method", "items": ["Sketch the right triangle with the building height as the opposite side.", "Use tan 45\u00b0 = opposite / adjacent.", "Since tan 45\u00b0 = 1, the height matches the horizontal distance if the setup distance is known."], "kind": "list"}, {"heading": "Presentation Tip", "items": ["Students should label the angle, known side, unknown side, and trig ratio before substituting numbers."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Assessment Cue</div>\n      <div class=\"figure-body\">A clear labelled triangle often earns confidence even before the arithmetic is complete.</div>\n    </div>\n    \n    </div>\n    ", "cue": "If students are unsure which ratio to choose, ask which sides are known and unknown first.", "source": "trignometry1.pdf + MEM23004A_Student pack.docx", "assessment": "Q20"}, {"kicker": "Trig Graphs", "title": "sin x And cos x Repeat With A Regular Period", "subtitle": "The sine and cosine graphs are periodic, smooth, and bounded between -1 and 1.", "sections": [{"heading": "Key Features", "items": ["Amplitude 1 for the basic graphs.", "Period 360\u00b0 in degree mode.", "sin 0 = 0 while cos 0 = 1."], "kind": "list"}, {"heading": "Assessment Link", "items": ["Q21 asks students to draw sin and cos over a stated interval."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Graph Anchor</div>\n      <div class=\"figure-body\">Students should mark the quarter-turn values first: 0\u00b0, 90\u00b0, 180\u00b0, 270\u00b0, 360\u00b0.</div>\n    </div>\n    \n    </div>\n    ", "cue": "Use this slide to emphasise the repeating pattern, not just isolated points.", "source": "trignometry.pdf + MEM23004A_Student pack.docx", "assessment": "Q21"}, {"kicker": "Trig Graphs", "title": "tan x Has Vertical Asymptotes And A Different Shape", "subtitle": "Unlike sine and cosine, tangent is unbounded and breaks at odd multiples of 90\u00b0 because division by zero is not allowed.", "sections": [{"heading": "Important Feature", "items": ["tan x = sin x / cos x", "When cos x = 0, tan x is undefined.", "That creates vertical asymptotes at 90\u00b0, 270\u00b0, and so on."], "kind": "list"}, {"heading": "Assessment Link", "items": ["Q22 asks students to plot sin, cos, and tan together in Desmos."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Teacher Warning</div>\n      <div class=\"figure-body\">Students often draw tangent as a smooth wave. Keep pointing out the breaks and asymptotes.</div>\n    </div>\n    \n    </div>\n    ", "cue": "Comparing the three graphs side by side is very helpful before students open Desmos.", "source": "trignometry.pdf + MEM23004A_Student pack.docx", "assessment": "Q22"}, {"kicker": "Software Skill", "title": "Using Desmos Well For Q22", "subtitle": "Desmos is valuable when students use it to compare graph behaviour, not just to produce a screenshot.", "sections": [{"heading": "Workflow", "items": ["Enter y = sin x, y = cos x, and y = tan x separately.", "Adjust the window so one full period is visible.", "Use the graph to identify intercepts, peaks, and tangent asymptotes."], "kind": "list"}, {"heading": "Strong Answer", "items": ["A good answer names what each graph is doing.", "Students should mention where sin and cos start differently and why tan breaks."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Software workflow\">\n      <rect x=\"65\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"253\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"440\" y=\"90\" width=\"115\" height=\"68\" rx=\"18\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <path d=\"M180 124 H253 M368 124 H440\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#wfA)\"/>\n      <text x=\"95\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Excel</text>\n      <text x=\"281\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Desmos</text>\n      <text x=\"458\" y=\"131\" fill=\"#0d2b45\" font-size=\"20\" font-weight=\"700\">Check</text>\n      <defs>\n        <marker id=\"wfA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Digital Standard</div>\n      <div class=\"figure-body\">The graph image should be followed by 1-2 lines of interpretation. That is what turns software output into evidence of understanding.</div>\n    </div>\n    \n    </div>\n    ", "cue": "A live Desmos demonstration can save a lot of confusion before students submit Q22.", "source": "MEM23004A_Student pack.docx", "assessment": "Q22"}, {"kicker": "Transformed Sine Waves", "title": "y = A sin(B(x + C)) + D Has Four Features Students Must State", "subtitle": "Q23 asks students to identify amplitude, period, phase shift, and vertical shift from the general sine form.", "sections": [{"heading": "Feature Map", "items": ["Amplitude = |A|", "Period = 360/B when angles are in degrees", "Phase shift comes from C inside the bracket", "Vertical shift = D"], "kind": "formula"}, {"heading": "Reading The Formula", "items": ["Changes inside the bracket affect horizontal behaviour.", "Changes outside the sine affect height and vertical position."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Memory Anchor</div>\n      <div class=\"figure-body\">Outside changes height. Inside changes horizontal timing. +D moves the whole graph up or down.</div>\n    </div>\n    \n    </div>\n    ", "cue": "Students usually need this read aloud several times before it becomes intuitive.", "source": "Trigonometry_Short_Course_Tutorial_Lauren_Johnson.pdf + MEM23004A_Student pack.docx", "assessment": "Q23"}, {"kicker": "Worked Example", "title": "Reading Q23: Amplitude, Period, Phase Shift, Vertical Shift", "subtitle": "For y = A sin(B(x + C)) + D, students must identify the graphical effect before they start plotting.", "sections": [{"heading": "Given Values", "items": ["A = 10 gives amplitude 10.", "B = 90 gives period 360/90 = 4\u00b0 if degree-based scaling is used in the formula interpretation.", "C shifts the graph horizontally.", "D = 1.5 shifts the graph up by 1.5."], "kind": "list"}, {"heading": "Excel Advice", "items": ["Create a table of x-values and y-values first.", "Then build the chart and label the feature values beside it."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Trigonometry overview\">\n      <polygon points=\"90,205 90,80 360,205\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <rect x=\"90\" y=\"180\" width=\"22\" height=\"22\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"106\" y=\"190\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">\u03b8</text>\n      <text x=\"195\" y=\"226\" fill=\"#0d2b45\" font-size=\"18\">adjacent</text>\n      <text x=\"54\" y=\"155\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 54,155)\">opposite</text>\n      <text x=\"214\" y=\"128\" fill=\"#ef6f51\" font-size=\"18\" transform=\"rotate(-25 214,128)\">hypotenuse</text>\n      <line x1=\"430\" y1=\"220\" x2=\"585\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"450\" y1=\"55\" x2=\"450\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M450 138 C470 75, 490 75, 510 138 S550 201, 570 138\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"474\" y=\"76\" fill=\"#0d2b45\" font-size=\"16\">sin x</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Q23 Focus</div>\n      <div class=\"figure-body\">Students often mix phase shift direction. Make them write the horizontal shift in words before graphing.</div>\n    </div>\n    \n    </div>\n    ", "cue": "This is a strong moment to compare the algebraic change to the graph movement visually.", "source": "MEM23004A_Student pack.docx", "assessment": "Q23"}, {"kicker": "Module Check", "title": "Trigonometry Revision Before Sequences", "subtitle": "Students are ready to move on when they can select the right ratio, sketch the key trig graphs, and read transformed sine features correctly.", "sections": [{"heading": "Readiness Checks", "items": ["Choose sine, cosine, or tangent from a labelled triangle.", "Sketch sin and cos with correct starting values.", "Explain why tan has asymptotes.", "Identify amplitude, period, shift, and vertical movement from a sine formula."], "kind": "list"}, {"heading": "Teacher Prompt", "items": ["Ask students which graph feature is easiest to miss when rushing: start point, period, or asymptote."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Assessment readiness\">\n      <rect x=\"122\" y=\"36\" width=\"376\" height=\"170\" rx=\"24\" fill=\"#ffffff\" stroke=\"#d6e4ee\" stroke-width=\"4\"/>\n      <line x1=\"168\" y1=\"88\" x2=\"446\" y2=\"88\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"128\" x2=\"446\" y2=\"128\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"168\" x2=\"446\" y2=\"168\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <circle cx=\"146\" cy=\"68\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"108\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"148\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"188\" r=\"9\" fill=\"#0f8b8d\"/>\n      <text x=\"188\" y=\"74\" fill=\"#0d2b45\" font-size=\"18\">pick the right method</text>\n      <text x=\"188\" y=\"114\" fill=\"#0d2b45\" font-size=\"18\">show working clearly</text>\n      <text x=\"188\" y=\"154\" fill=\"#0d2b45\" font-size=\"18\">check graph / unit / sign</text>\n      <text x=\"188\" y=\"194\" fill=\"#0d2b45\" font-size=\"18\">finish with interpretation</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Ready To Advance</div>\n      <div class=\"figure-body\">When students can explain graph features in words, their Excel and Desmos answers improve immediately.</div>\n    </div>\n    \n    </div>\n    ", "cue": "Use this as a short verbal recap before moving to sequences.", "source": "MEM23004A_Student pack.docx", "assessment": "Q20-Q23 revision"}, {"kicker": "Module 4", "title": "Sequences, Series, And Arithmetic Progression", "subtitle": "The sequence block in the student pack concentrates on arithmetic progression and the classic sum of the first 100 natural numbers.", "sections": [{"heading": "Assessment Links", "items": ["Q24-Q29 cover arithmetic progression, common difference, next terms, and the sum of the first 100 natural numbers."], "kind": "list"}, {"heading": "Teaching Goal", "items": ["Students should recognise a constant difference quickly and use the arithmetic-sequence rule with confidence."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Arithmetic sequence\">\n      <rect x=\"78\" y=\"138\" width=\"68\" height=\"52\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"178\" y=\"118\" width=\"68\" height=\"72\" rx=\"12\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"278\" y=\"98\" width=\"68\" height=\"92\" rx=\"12\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"378\" y=\"78\" width=\"68\" height=\"112\" rx=\"12\" fill=\"#fdf0ea\" stroke=\"#ef6f51\" stroke-width=\"4\"/>\n      <rect x=\"478\" y=\"58\" width=\"68\" height=\"132\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <text x=\"96\" y=\"125\" fill=\"#0d2b45\" font-size=\"18\">2</text>\n      <text x=\"196\" y=\"105\" fill=\"#0d2b45\" font-size=\"18\">5</text>\n      <text x=\"296\" y=\"85\" fill=\"#0d2b45\" font-size=\"18\">8</text>\n      <text x=\"392\" y=\"65\" fill=\"#0d2b45\" font-size=\"18\">11</text>\n      <text x=\"492\" y=\"45\" fill=\"#0d2b45\" font-size=\"18\">14</text>\n      <path d=\"M146 88 H178 M246 88 H278 M346 88 H378 M446 88 H478\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#seqA)\"/>\n      <text x=\"160\" y=\"78\" fill=\"#ef6f51\" font-size=\"16\">+3</text>\n      <defs>\n        <marker id=\"seqA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Focus</div>\n      <div class=\"figure-body\">Keep asking one simple question: does the change between terms stay constant?</div>\n    </div>\n    \n    </div>\n    ", "cue": "This module is easier for students when you keep the language of 'same difference each time' consistent.", "source": "Sequence.pdf + Sequence1.pdf + MEM23004A_Student pack.docx", "assessment": "Q24-Q29"}, {"kicker": "Sequences", "title": "Arithmetic Progression Means Equal Change From One Term To The Next", "subtitle": "A list of numbers is an arithmetic progression when the difference between consecutive terms stays constant.", "sections": [{"heading": "Examples", "items": ["4, 9, 14, 19, 24 is arithmetic because the difference is +5.", "48, 45, 42, 39 is arithmetic because the difference is -3.", "2, 4, 8, 16 is not arithmetic because the differences keep changing."], "kind": "list"}, {"heading": "Assessment Links", "items": ["Q24 asks what arithmetic progression means.", "Q25-Q27 ask students to judge sequences and find the common difference."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Arithmetic sequence\">\n      <rect x=\"78\" y=\"138\" width=\"68\" height=\"52\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"178\" y=\"118\" width=\"68\" height=\"72\" rx=\"12\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/> that step make more avoidable mistakes.</div>\n    </div>\n    \n    </div>\n    ", "cue": "This slide works well as a 30-second oral check before students write.", "source": "Sequence.pdf + MEM23004A_Student pack.docx", "assessment": "Q28"}, {"kicker": "Series", "title": "Sum Of The First 100 Natural Numbers", "subtitle": "Q29 is a classic series question and a good chance to introduce a compact formula rather than manual addition.", "sections": [{"heading": "Formula", "items": ["1 + 2 + 3 + ... + n = n(n + 1)/2", "For n = 100, the sum is 100 \u00d7 101 / 2 = 5050"], "kind": "formula"}, {"heading": "Teaching Point", "items": ["Students can also pair terms from the ends: 1+100, 2+99, 3+98, all making 101."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Arithmetic sequence\">\n      <rect x=\"78\" y=\"138\" width=\"68\" height=\"52\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"178\" y=\"118\" width=\"68\" height=\"72\" rx=\"12\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"4\"/>\n      <rect x=\"278\" y=\"98\" width=\"68\" height=\"92\" rx=\"12\" fill=\"#eef7f3\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <rect x=\"378\" y=\"78\" width=\"68\" height=\"112\" rx=\"12\" fill=\"#fdf0ea\" stroke=\"#ef6f51\" stroke-width=\"4\"/>\n      <rect x=\"478\" y=\"58\" width=\"68\" height=\"132\" rx=\"12\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <text x=\"96\" y=\"125\" fill=\"#0d2b45\" font-size=\"18\">2</text>\n      <text x=\"196\" y=\"105\" fill=\"#0d2b45\" font-size=\"18\">5</text>\n      <text x=\"296\" y=\"85\" fill=\"#0d2b45\" font-size=\"18\">8</text>\n      <text x=\"392\" y=\"65\" fill=\"#0d2b45\" font-size=\"18\">11</text>\n      <text x=\"492\" y=\"45\" fill=\"#0d2b45\" font-size=\"18\">14</text>\n      <path d=\"M146 88 H178 M246 88 H278 M346 88 H378 M446 88 H478\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#seqA)\"/>\n      <text x=\"160\" y=\"78\" fill=\"#ef6f51\" font-size=\"16\">+3</text>\n      <defs>\n        <marker id=\"seqA\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0 0 L12 6 L0 12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Nice Explanation</div>\n      <div class=\"figure-body\">Showing both the formula and the pairing pattern helps students see why the answer is 5050, not just memorise it.</div>\n    </div>\n    \n    </div>\n    ", "cue": "Use the pairing pattern first, then reveal the formula. That makes the rule feel less arbitrary.", "source": "Sequence1.pdf + MEM23004A_Student pack.docx", "assessment": "Q29"}, {"kicker": "Module Check", "title": "Sequence Skills Students Need To Retain", "subtitle": "Before leaving this module, students should recognise arithmetic progression quickly and justify each answer using difference language or a series formula.", "sections": [{"heading": "Must-Know Skills", "items": ["Define arithmetic progression clearly.", "Find or verify the common difference.", "Continue a sequence correctly.", "Use n(n + 1)/2 for the sum of the first n natural numbers."], "kind": "list"}, {"heading": "Teacher Prompt", "items": ["Ask students to explain why a doubling pattern is not arithmetic even though it is still a sequence."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Assessment readiness\">\n      <rect x=\"122\" y=\"36\" width=\"376\" height=\"170\" rx=\"24\" fill=\"#ffffff\" stroke=\"#d6e4ee\" stroke-width=\"4\"/>\n      <line x1=\"168\" y1=\"88\" x2=\"446\" y2=\"88\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"128\" x2=\"446\" y2=\"128\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"168 st"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Complex plane\">\n      <line x1=\"80\" y1=\"210\" x2=\"560\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"320\" y1=\"40\" x2=\"320\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <circle cx=\"420\" cy=\"120\" r=\"10\" fill=\"#ef6f51\"/>\n      <path d=\"M320 210 L420 120\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <path d=\"M320 120 H420\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <path d=\"M420 210 V120\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <text x=\"438\" y=\"124\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">-5 + 3i</text>\n      <text x=\"544\" y=\"235\" fill=\"#0d2b45\" font-size=\"16\">real</text>\n      <text x=\"330\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">imaginary</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Teacher Cue</div>\n      <div class=\"figure-body\">Write answers in standard form a + bi even when the imaginary coefficient is negative.</div>\n    </div>\n    \n    </div>\n    ", "cue": "This is a good slide for vertical-column working because it keeps the like parts visually separated.", "source": "complex1.pdf + MEM23004A_Student pack.docx", "assessment": "Q36-Q37"}, {"kicker": "Complex Operations", "title": "Multiplication And Division Need i\u00b2 = -1", "subtitle": "Complex multiplication expands like algebra, while division is simplified by multiplying by the conjugate.", "sections": [{"heading": "Multiplication", "items": ["Expand brackets normally.", "Replace every i\u00b2 with -1.", "Collect real and imaginary parts."], "kind": "list"}, {"heading": "Division", "items": ["Multiply top and bottom by the conjugate of the denominator.", "That turns the denominator into a real number and lets you simplify cleanly."], "kind": "li =\"8 8\"/>\n      <line x1=\"370\" y1=\"220\" x2=\"370\" y2=\"108\" stroke=\"#f7b44c\" stroke-width=\"4\" stroke-dasharray=\"8 8\"/>\n      <text x=\"306\" y=\"66\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">mean</text>\n      <text x=\"246\" y=\"100\" fill=\"#8a5d00\" font-size=\"18\">-1\u03c3</text>\n      <text x=\"373\" y=\"100\" fill=\"#8a5d00\" font-size=\"18\">+1\u03c3</text>\n      <rect x=\"84\" y=\"52\" width=\"115\" height=\"40\" rx=\"14\" fill=\"#fff4df\" stroke=\"#f7b44c\" stroke-width=\"3\"/>\n      <text x=\"101\" y=\"78\" fill=\"#0d2b45\" font-size=\"18\">probability</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Teacher Cue</div>\n      <div class=\"figure-body\">Unit conversion matters here. If students leave the standard deviation in grams while the mean is in kilograms, the probability work will collapse.</div>\n    </div>\n    \n    </div>\n    ", "cue": "This is an excellent slide for reinforcing careful unit consistency before any probability tool is used.", "source": "probability.pdf + MEM23004A_Student pack.docx", "assessment": "Q50"}, {"kicker": "Worked Example", "title": "Underweight Cement Bags: How To Explain The Result", "subtitle": "A strong Q50 answer includes not just the probability value, but what that value means for quality control.", "sections": [{"heading": "Answer Structure", "items": ["State the probability or percentage of bags under 20 kg.", "Explain whether that proportion seems acceptable or concerning in a production setting.", "Connect the result back to mean and spread."], "kind": "list"}, {"heading": "Quality Lens", "items": ["A small shift in mean can change underweight probability a lot.", "That is why process monitoring matters."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Statistics and probability\">\n      <line x1=\"70\" y1=\"220\" x2= opriately.", "Interpret a normal-distribution probability in plain language."], "kind": "list"}, {"heading": "Teacher Prompt", "items": ["Ask which statistic is most affected by an extreme outlier."], "kind": "list"}], "figureHtml": "\n    <div class=\"visual-stack\">\n      \n    <svg viewBox=\"0 0 620 240\" class=\"svg-figure\" aria-label=\"Assessment readiness\">\n      <rect x=\"122\" y=\"36\" width=\"376\" height=\"170\" rx=\"24\" fill=\"#ffffff\" stroke=\"#d6e4ee\" stroke-width=\"4\"/>\n      <line x1=\"168\" y1=\"88\" x2=\"446\" y2=\"88\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"128\" x2=\"446\" y2=\"128\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <line x1=\"168\" y1=\"168\" x2=\"446\" y2=\"168\" stroke=\"#d6e4ee\" stroke-width=\"3\"/>\n      <circle cx=\"146\" cy=\"68\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"108\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"148\" r=\"9\" fill=\"#0f8b8d\"/><circle cx=\"146\" cy=\"188\" r=\"9\" fill=\"#0f8b8d\"/>\n      <text x=\"188\" y=\"74\" fill=\"#0d2b45\" font-size=\"18\">pick the right method</text>\n      <text x=\"188\" y=\"114\" fill=\"#0d2b45\" font-size=\"18\">show working clearly</text>\n      <text x=\"188\" y=\"154\" fill=\"#0d2b45\" font-size=\"18\">check graph / unit / sign</text>\n      <text x=\"188\" y=\"194\" fill=\"#0d2b45\" font-size=\"18\">finish with interpretation</text>\n    </svg>\n    \n      \n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Ready To Advance</div>\n      <div class=\"figure-body\">The final probability answers improve most when students explain the meaning of the number, not just the number itself.</div>\n    </div>\n    \n    </div>\n    ", "cue": "Use this as a transition into the final polynomial and revision block.", "source": "MEM23004A_Student pack.docx", "assessment": "Q46-Q50 revision"}, {"kicker": "Module 9", "title": "Polynomials, Binomials, And Final Graphing", "subtitle": "The student pack     const slideRoot = document.getElementById("slideRoot");
    const slideIndicator = document.getElementById("slideIndicator");
    const classIndicator = document.getElementById("classIndicator");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const jumpSelect = document.getElementById("jumpSelect");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    function renderSection(section) {
      const listClass = section.kind === "formula" ? "formula-list" : "";
      return `
        <article class="section-card ${listClass}">
          <h3>${section.heading}</h3>
          <ul>
            ${section.items.map(item => `<li>${item}</li>`).join("")}
          </ul>
        </article>
      `;
    }

    function renderSlide(index) {
      const slide = slides[index];
      const chips = [
        slide.assessment ? `Assessment: ${slide.assessment}` : "",
        slide.source ? `Source: ${slide.source}` : ""
      ].filter(Boolean);
      const densityScore =
        (slide.title?.length || 0) +
        (slide.subtitle?.length || 0) +
        slide.sections.reduce((total, section) => {
          return total + (section.heading?.length || 0) + section.items.reduce((itemTotal, item) => itemTotal + item.length, 0);
        }, 0);
      const densityClass = densityScore > 580 ? "dense" : densityScore > 400 ? "compact" : "";

      slideRoot.className = `slide ${densityClass}`.trim();
      slideRoot.innerHTML = `
        <div class="left-col">
          <div class="kicker">${slide.kicker}</div>
          <h1>${slide.title}</h1>
          <div class="subtitle">${slide.subtitle || ""}</div>
          ${chips.length ? `<div class="chips">${chips.map(chip => `<div class="chip">${chip}</div>`).join("")}</div>` : ""}
          <div class="sections">
            ${slide.sections.map(renderSection).join("")}
          </div>
        </div>
        <div class="right-col">
          <div class="right-stack">
            <div class="media-card">${slide.figureHtml || ""}</div>
            <div class="meta-grid">
              <div class="meta-card">
                <h4>Teaching Cue</h4>
                <p>${slide.cue || "Use this slide to pause, question, and check student understanding."}</p>
              </div>
              <div class="meta-card">
                <h4>Slide Outcome</h4>
                <p>${slide.assessment || "Concept reinforcement"} | Slide ${index + 1} of ${slides.length}</p>
              </div>
            </div>
          </div>
        </div>
      `;

      slideIndicator.textContent = `Slide ${index + 1} of ${slides.length}`;
      classIndicator.textContent = slide.kicker;
      progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
      progressLabel.textContent = `${Math.round(((index + 1) / slides.length) * 100)}% complete`;
      jumpSelect.value = String(index);
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === slides.length - 1;
    }

    function populateJumpMenu() {
      jumpSelect.innerHTML = slides
        .map((slide, index) => `<option value="${index}">${index + 1}. ${slide.title}</option>`)
        .join("");
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, index));
      renderSlide(currentIndex);
    }

    prevBtn.addEventListener("click", () => goTo(currentIndex - 1));
    nextBtn.addEventListener("click", () => goTo(currentIndex + 1));
    jumpSelect.addEventListener("change", (event) => goTo(Number(event.target.value)));

    document.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex + 1);
      }
      if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex - 1);
      }
      if (event.key.toLowerCase() === "f") {
        fullscreenBtn.click();
      }
    });

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    populateJumpMenu();
    renderSlide(currentIndex);
  </script>
</body>
</html>
