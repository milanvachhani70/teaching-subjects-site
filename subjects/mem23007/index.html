" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"75\" y=\"160\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Moment M(x)</text>\n      <line x1=\"110\" y1=\"195\" x2=\"520\" y2=\"195\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 195 C190 145, 255 145, 320 195 S450 245, 500 195\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"75\" y=\"235\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Shear V(x) = M'(x)</text>\n      <text x=\"335\" y=\"160\" fill=\"#ef6f51\" font-size=\"16\">Differentiate once</text>\n      <text x=\"335\" y=\"235\" fill=\"#0f8b8d\" font-size=\"16\">Differentiate again for load</text>\n    </svg>\n    ", "cue": "Keep the examples practical: beams, material usage, waiting times, and shape properties.", "source": "Whole source pack", "assessment": "Case study + applied questions"}, {"kicker": "Class 1", "title": "Derivatives And Engineering Rate Of Change", "subtitle": "Today’s target: students can pick the correct differentiation rule and use it in an engineering setting.", "sections": [{"heading": "Class target", "items": ["Understand what a derivative represents.", "Apply chain, product, and quotient rules correctly.", "Connect derivatives to beam shear and load questions."], "kind": "list"}, {"heading": "Assessment focus", "items": ["Q1 beam calculus", "Q2 chain rule", "Q3 quotient rule", "Q4 product rule / multiple choice"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 220\" class=\"svg-figure\" aria-label=\"Derivative flow\">\n      <rect x=\"40\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e9f5fb\"/>\n      <rect x=\"235\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#fff2de\"/>\n      <rect x=\"430\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e7f7f4\"/>\n      <text x=\"75\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f(x)</text>\n      <text x=\"265\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f'(x)</text>\n      <text x=\"457\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f''(x)</text>\n      <text x=\"60\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">shape / output</text>\n      <text x=\"255\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">slope / rate</text>\n      <text x=\"450\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">curvature / test</text>\n      <path d=\"M190 110 H235\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <path d=\"M385 110 H430\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <defs>\n        <marker id=\"arrowHead\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0,0 L12,6 L0,12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    ", "cue": "Tell students this class unlocks the first four assessment questions.", "source": "Derivative handouts + assessment pack", "assessment": "Q1-Q4"}, {"kicker": "Meaning First", "title": "What A Derivative Represents", "subtitle": "A derivative measures how one quantity changes when another quantity changes.", "sections": [{"heading": "In plain words", "items": ["The derivative is the slope of the tangent.", "It is also the instantaneous rate of change.", "Positive derivative means increasing; negative derivative means decreasing."], "kind": "list"}, {"heading": "Engineering examples", "items": ["Displacement -> velocity", "Velocity -> acceleration", "Bending moment -> shear force"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Student language</div>\n      <div class=\"figure-body\">If f(x) is the output, then f'(x) tells us what the function is doing right now.</div>\n    </div>\n    ", "cue": "Keep the wording simple before symbols. Students often remember the meaning better than the formal definition.", "source": "The_derivative.pdf", "assessment": "Conceptual readiness"}, {"kicker": "Notation", "title": "Different Ways Teachers And Textbooks Write Derivatives", "subtitle": "Students should be comfortable with all of these forms.", "sections": [{"heading": "Common notation", "items": ["f'(x)", "y'", "dy/dx", "d/dx [f(x)]"], "kind": "formula"}, {"heading": "Why it matters", "items": ["Assessment questions switch notation.", "Engineering texts often prefer dy/dx or dM/dx.", "Multiple symbols can describe the same operation."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Mini check</div>\n      <div class=\"figure-body\">Ask: if M is a bending moment function, what does dM/dx mean physically?</div>\n    </div>\n    ", "cue": "Bridge from generic y notation to engineering notation like M(x), V(x), and w(x).", "source": "The_derivative.pdf + MEM23007A_Asessment.docx", "assessment": "Q1-Q4"}, {"kicker": "Rule 1", "title": "Power Rule", "subtitle": "This is the fastest way to differentiate algebraic powers.", "sections": [{"heading": "Rule", "items": ["d/dx (x^n) = n x^(n-1)", "Example: d/dx (x^5) = 5x^4", "Example: d/dx (x^(-2)) = -2x^(-3)"], "kind": "formula"}, {"heading": "Common error", "items": ["Students often reduce the power but forget to multiply by the old power first."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Memory trick</div>\n      <div class=\"figure-body\">Bring the power down, then reduce the power by 1.</div>\n    </div>\n    ", "cue": "Use one polynomial example and one negative power example.", "source": "calculus_cheat_sheet_derivatives.pdf", "assessment": "Foundational skill"}, {"kicker": "Rule 2", "title": "Trig, Exponential, And Log Rules", "subtitle": "Students need these ready before composite functions become manageable.", "sections": [{"heading": "Must-know derivatives", "items": ["d/dx (sin x) = cos x", "d/dx (cos x) = -sin x", "d/dx (e^x) = e^x", "d/dx (ln x) = 1/x"], "kind": "formula"}, {"heading": "Applied reminder", "items": ["ln x appears in Beam B.", "sin x and cos x appear in several assessment questions.", "e^x appears in both differentiation and integration questions."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Teaching note</div>\n      <div class=\"figure-body\">Students who memorise the small core list feel much less overwhelmed by mixed questions.</div>\n    </div>\n    ", "cue": "Drill these orally before moving into chain or product rule.", "source": "common_derivatives_integrals.pdf + calculus cheat sheet", "assessment": "Q1, Q2, Q4, Q11"}, {"kicker": "Rule 3", "title": "Chain Rule", "subtitle": "Use the chain rule when one function is inside another function.", "sections": [{"heading": "Rule pattern", "items": ["If y = f(g(x)), then y' = f'(g(x)) · g'(x)", "Outer function first, inner derivative second."], "kind": "formula"}, {"heading": "Where students slip", "items": ["They differentiate the outer function but forget the inner derivative.", "They change cos to -sin but stop too early."], "kind": "list"}, {"heading": "Signal words", "items": ["cos(tan x)", "sin(3x)", "e^(2x)", "√(x - 1)"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 220\" class=\"svg-figure\" aria-label=\"Derivative flow\">\n      <rect x=\"40\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e9f5fb\"/>\n      <rect x=\"235\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#fff2de\"/>\n      <rect x=\"430\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e7f7f4\"/>\n      <text x=\"75\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f(x)</text>\n      <text x=\"265\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f'(x)</text>\n      <text x=\"457\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f''(x)</text>\n      <text x=\"60\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">shape / output</text>\n      <text x=\"255\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">slope / rate</text>\n      <text x=\"450\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">curvature / test</text>\n      <path d=\"M190 110 H235\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <path d=\"M385 110 H430\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <defs>\n        <marker id=\"arrowHead\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0,0 L12,6 L0,12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    ", "cue": "Make students say out loud: outer function, inner function, multiply by inner derivative.", "source": "The_derivative.pdf + calculus rules handout", "assessment": "Q2"}, {"kicker": "Rule 4", "title": "Product Rule", "subtitle": "Use the product rule when two variable expressions are multiplied.", "sections": [{"heading": "Rule", "items": ["(uv)' = u'v + uv'"], "kind": "formula"}, {"heading": "Example template", "items": ["For y = e^x sin x", "u = e^x, v = sin x", "u' = e^x, v' = cos x", "So y' = e^x sin x + e^x cos x = e^x(sin x + cos x)"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Memory phrase</div>\n      <div class=\"figure-body\">First times derivative of second, plus second times derivative of first.</div>\n    </div>\n    ", "cue": "Point out that Q4 is exactly this structure.", "source": "calculus_03_Rules_for_Finding_Derivatives.pdf", "assessment": "Q4"}, {"kicker": "Rule 5", "title": "Quotient Rule", "subtitle": "Use the quotient rule when one variable expression is divided by another.", "sections": [{"heading": "Rule", "items": ["(u/v)' = (v·u' - u·v') / v²"], "kind": "formula"}, {"heading": "Why students lose marks", "items": ["The denominator must be squared.", "The order matters: v·u' - u·v', not the other way around."], "kind": "list"}, {"heading": "Assessment match", "items": ["Q3 uses this structure with x / (1 + tan x)."], "kind": "list"}], "image": "assets/image4.png", "cue": "Write u and v explicitly before differentiating. It reduces panic and algebra mistakes.", "source": "The_derivative.pdf + assessment image", "assessment": "Q3"}, {"kicker": "Assessment Q2", "title": "Worked Example: Differentiate y = cos(tan x)", "subtitle": "This is a direct chain rule question.", "sections": [{"heading": "Step 1", "items": ["Outer function: cos(□)", "Inner function: tan x"], "kind": "list"}, {"heading": "Step 2", "items": ["Derivative of cos(□) is -sin(□)", "Derivative of tan x is sec²x"], "kind": "list"}, {"heading": "Answer", "items": ["dy/dx = -sin(tan x) · sec²x"], "kind": "formula"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Exam habit</div>\n      <div class=\"figure-body\">Always leave chain rule answers as a product unless there is a very clear simplification.</div>\n    </div>\n    ", "cue": "Ask students to identify outer and inner functions before you reveal the derivative.", "source": "MEM23007A_Asessment.docx", "assessment": "Q2"}, {"kicker": "Assessment Q3", "title": "Worked Example: Differentiate x / (1 + tan x)", "subtitle": "This is a textbook quotient rule question.", "sections": [{"heading": "Set up", "items": ["u = x so u' = 1", "v = 1 + tan x so v' = sec²x"], "kind": "list"}, {"heading": "Apply quotient rule", "items": ["y' = [ (1 + tan x)(1) - x(sec²x) ] / (1 + tan x)²"], "kind": "formula"}, {"heading": "Final answer", "items": ["y' = (1 + tan x - x sec²x) / (1 + tan x)²"], "kind": "formula"}], "image": "assets/image4.png", "cue": "Have students box the numerator and denominator separately before simplification.", "source": "Assessment pack", "assessment": "Q3"}, {"kicker": "Assessment Q4", "title": "Worked Example: Differentiate e^x sin x", "subtitle": "This question rewards students who can spot a product quickly.", "sections": [{"heading": "Method", "items": ["Use product rule with u = e^x and v = sin x.", "u' = e^x and v' = cos x."], "kind": "list"}, {"heading": "Expansion", "items": ["d/dx (e^x sin x) = e^x sin x + e^x cos x"], "kind": "formula"}, {"heading": "Best multiple-choice form", "items": ["e^x (sin x + cos x)"], "kind": "formula"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Teacher note</div>\n      <div class=\"figure-body\">Students often choose the option that only includes one term. Stress that both terms must appear.</div>\n    </div>\n    ", "cue": "This is a good moment to ask why a product does not behave like ordinary multiplication when differentiating.", "source": "Assessment pack", "assessment": "Q4"}, {"kicker": "Error Check", "title": "The Derivative Mistakes Students Make Most Often", "subtitle": "Normalising mistakes helps students recover faster.", "sections": [{"heading": "Frequent mistakes", "items": ["Forgetting the negative sign on d/dx(cos x)", "Forgetting sec²x for d/dx(tan x)", "Using product rule when quotient rule is required", "Dropping brackets in the denominator", "Stopping the chain rule too early"], "kind": "list"}, {"heading": "Repair strategy", "items": ["Name the rule first.", "Write the derivative structure before substituting values.", "Simplify only after the full derivative is on the page."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Classroom prompt</div>\n      <div class=\"figure-body\">Which error do you think costs the most marks: wrong rule, missing term, or algebra sign?</div>\n    </div>\n    ", "cue": "Invite students to choose the error they personally find hardest.", "source": "Derivative references + teaching experience mapping", "assessment": "Q2-Q4"}, {"kicker": "Engineering Link", "title": "Beam Vocabulary Before We Differentiate", "subtitle": "Q1 makes more sense when students know what each function means physically.", "sections": [{"heading": "Key words", "items": ["Bending moment M(x): turning effect inside the beam", "Shear force V(x): internal force tendency to slide one part past another", "Load w(x): distributed load intensity along the beam"], "kind": "list"}, {"heading": "Important relationship", "items": ["Moment -> differentiate -> shear", "Shear -> differentiate -> load"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Moment shear load relationship\">\n      <defs>\n        <linearGradient id=\"beamGrad\" x1=\"0\" x2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#0f8b8d\"/>\n          <stop offset=\"100%\" stop-color=\"#f7b44c\"/>\n        </linearGradient>\n      </defs>\n      <rect x=\"60\" y=\"45\" width=\"500\" height=\"30\" rx=\"10\" fill=\"url(#beamGrad)\" opacity=\"0.85\"/>\n      <text x=\"75\" y=\"35\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Beam / span</text>\n      <line x1=\"110\" y1=\"120\" x2=\"520\" y2=\"120\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 120 C180 70, 240 170, 300 120 S420 70, 500 120\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"75\" y=\"160\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Moment M(x)</text>\n      <line x1=\"110\" y1=\"195\" x2=\"520\" y2=\"195\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 195 C190 145, 255 145, 320 195 S450 245, 500 195\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"75\" y=\"235\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Shear V(x) = M'(x)</text>\n      <text x=\"335\" y=\"160\" fill=\"#ef6f51\" font-size=\"16\">Differentiate once</text>\n      <text x=\"335\" y=\"235\" fill=\"#0f8b8d\" font-size=\"16\">Differentiate again for load</text>\n    </svg>\n    ", "cue": "Tell students that calculus converts one engineering description into another.", "source": "Assessment Q1 + structural calculus context", "assessment": "Q1"}, {"kicker": "Engineering Link", "title": "Moment, Shear, And Load Relationship", "subtitle": "For Q1, the main calculus tool is repeated differentiation.", "sections": [{"heading": "Relationship chain", "items": ["V(x) = dM/dx", "w(x) = dV/dx = d²M/dx²"], "kind": "formula"}, {"heading": "Sign convention note", "items": ["Different textbooks may include a minus sign in the load relation depending on beam sign convention.", "In class, make the convention explicit and stay consistent."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Moment shear load relationship\">\n      <defs>\n        <linearGradient id=\"beamGrad\" x1=\"0\" x2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#0f8b8d\"/>\n          <stop offset=\"100%\" stop-color=\"#f7b44c\"/>\n        </linearGradient>\n      </defs>\n      <rect x=\"60\" y=\"45\" width=\"500\" height=\"30\" rx=\"10\" fill=\"url(#beamGrad)\" opacity=\"0.85\"/>\n      <text x=\"75\" y=\"35\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Beam / span</text>\n      <line x1=\"110\" y1=\"120\" x2=\"520\" y2=\"120\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 120 C180 70, 240 170, 300 120 S420 70, 500 120\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"75\" y=\"160\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Moment M(x)</text>\n      <line x1=\"110\" y1=\"195\" x2=\"520\" y2=\"195\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M120 195 C190 145, 255 145, 320 195 S450 245, 500 195\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <text x=\"75\" y=\"235\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Shear V(x) = M'(x)</text>\n      <text x=\"335\" y=\"160\" fill=\"#ef6f51\" font-size=\"16\">Differentiate once</text>\n      <text x=\"335\" y=\"235\" fill=\"#0f8b8d\" font-size=\"16\">Differentiate again for load</text>\n    </svg>\n    ", "cue": "Say clearly: in this assessment, the key skill is differentiating the given moment equation correctly.", "source": "Assessment pack + engineering convention note", "assessment": "Q1"}, {"kicker": "Assessment Q1", "title": "Question Visual: Beam A And Beam B", "subtitle": "Use the original assessment image so students recognise the question immediately.", "sections": [{"heading": "Teacher focus", "items": ["Students should identify M(x) first.", "Then differentiate once for shear and again for load.", "Beam A also asks for the point of maximum bending moment."], "kind": "list"}], "image": "assets/image3.png", "cue": "Pause here and ask students what the question is actually asking before you solve it.", "source": "Assessment image", "assessment": "Q1"}, {"kicker": "Assessment Q1A", "title": "Beam A: From Moment To Shear", "subtitle": "Beam A is given as M(x) = 3x/2 + 2 cos x.", "sections": [{"heading": "Differentiate once", "items": ["V(x) = dM/dx", "d/dx (3x/2) = 3/2", "d/dx (2 cos x) = -2 sin x", "So V(x) = 3/2 - 2 sin x"], "kind": "formula"}, {"heading": "Differentiate again", "items": ["w(x) = dV/dx = -2 cos x", "If your beam convention uses w = -dV/dx, the sign flips."], "kind": "formula"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Assessment language</div>\n      <div class=\"figure-body\">Students must explain what each derivative means, not only write the algebra.</div>\n    </div>\n    ", "cue": "Use this to remind students that trigonometric derivatives matter in engineering contexts too.", "source": "Assessment image + derivative rules", "assessment": "Q1"}, {"kicker": "Assessment Q1A", "title": "Beam A: Point Of Maximum Bending Moment", "subtitle": "A maximum moment occurs where the first derivative is zero and the second derivative confirms the type.", "sections": [{"heading": "Critical point", "items": ["Set V(x) = 0", "3/2 - 2 sin x = 0", "sin x = 3/4", "x = sin^(-1)(3/4) ≈ 0.848 rad within the principal interval"], "kind": "formula"}, {"heading": "Second derivative test", "items": ["M''(x) = -2 cos x", "At x ≈ 0.848, cos x > 0 so M''(x) < 0", "Therefore the moment is locally maximum there."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Turning point graph\">\n      <line x1=\"80\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"35\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M150 70 C240 170, 350 170, 470 70\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <circle cx=\"310\" cy=\"160\" r=\"10\" fill=\"#ef6f51\"/>\n      <text x=\"325\" y=\"158\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">turning point</text>\n      <text x=\"505\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"90\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n      <text x=\"150\" y=\"40\" fill=\"#0d2b45\" font-size=\"16\">f'(x) changes sign here</text>\n    </svg>\n    ", "cue": "If students ask about more solutions, explain periodic functions and then restrict to the beam domain supplied in the problem.", "source": "Assessment pack", "assessment": "Q1"}, {"kicker": "Assessment Q1B", "title": "Beam B: Load Distribution From The Moment Equation", "subtitle": "Beam B is given as M(x) = 4 ln x + 7 sin x - 3e^x.", "sections": [{"heading": "Differentiate once", "items": ["V(x) = 4/x + 7 cos x - 3e^x"], "kind": "formula"}, {"heading": "Differentiate again", "items": ["w(x) = -4/x² - 7 sin x - 3e^x"], "kind": "formula"}, {"heading": "Why this question is powerful", "items": ["It mixes log, trig, and exponential derivatives in one engineering problem."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Revision note</div>\n      <div class=\"figure-body\">Beam B is a great final revision problem because it forces students to combine three standard derivative rules accurately.</div>\n    </div>\n    ", "cue": "Students often forget d/dx(ln x) = 1/x. Emphasise that point.", "source": "Assessment pack", "assessment": "Q1"}, {"kicker": "Class 1 Check", "title": "Exit Check For Class 1", "subtitle": "If students can answer these quickly, they are ready for the next lesson.", "sections": [{"heading": "Ask students to do without notes", "items": ["Differentiate cos(tan x).", "Differentiate e^x sin x.", "State the quotient rule.", "Explain how M(x), V(x), and w(x) are connected."], "kind": "list"}, {"heading": "Success signal", "items": ["They choose the right rule without hesitation.", "They can explain the beam derivatives in words."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Homework idea</div>\n      <div class=\"figure-body\">Have students create one example each for chain, product, and quotient rule and swap with a partner next class.</div>\n    </div>\n    ", "cue": "Use this as a 5-minute retrieval practice task.", "source": "Class 1 summary", "assessment": "Q1-Q4 readiness"}, {"kicker": "Class 2", "title": "Maxima, Minima, And Optimisation", "subtitle": "Today’s target: students can find turning points, classify them, and solve practical optimisation problems.", "sections": [{"heading": "Assessment focus", "items": ["Q5 local maxima/minima conditions", "Q6 second derivative test", "Q7 and Q8 concept checks", "Q9 and Q10 optimisation"], "kind": "list"}, {"heading": "Class promise", "items": ["We will connect curve shape to design decisions such as maximum area."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Turning point graph\">\n      <line x1=\"80\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"35\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M150 70 C240 170, 350 170, 470 70\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <circle cx=\"310\" cy=\"160\" r=\"10\" fill=\"#ef6f51\"/>\n      <text x=\"325\" y=\"158\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">turning point</text>\n      <text x=\"505\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"90\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n      <text x=\"150\" y=\"40\" fill=\"#0d2b45\" font-size=\"16\">f'(x) changes sign here</text>\n    </svg>\n    ", "cue": "Frame this class as decision-making with calculus, not just more derivatives.", "source": "Max/min references + assessment pack", "assessment": "Q5-Q10"}, {"kicker": "Turning Points", "title": "What Local Maxima And Minima Mean", "subtitle": "A turning point is where the graph changes direction.", "sections": [{"heading": "Definitions", "items": ["Local maximum: nearby values are lower.", "Local minimum: nearby values are higher.", "Turning points are often found where f'(x) = 0."], "kind": "list"}, {"heading": "Graph behaviour", "items": ["Increasing then decreasing -> local maximum", "Decreasing then increasing -> local minimum"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Turning point graph\">\n      <line x1=\"80\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"35\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M150 70 C240 170, 350 170, 470 70\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <circle cx=\"310\" cy=\"160\" r=\"10\" fill=\"#ef6f51\"/>\n      <text x=\"325\" y=\"158\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">turning point</text>\n      <text x=\"505\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"90\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n      <text x=\"150\" y=\"40\" fill=\"#0d2b45\" font-size=\"16\">f'(x) changes sign here</text>\n    </svg>\n    ", "cue": "Use your hand to trace an increasing-decreasing motion. Physical gesture helps many learners.", "source": "PlymouthUniversity_MathsandStats_maxima_and_minima.pdf", "assessment": "Q5-Q8"}, {"kicker": "First Derivative Test", "title": "Using The First Derivative Test", "subtitle": "This test uses the sign of f'(x) around a critical point.", "sections": [{"heading": "Method", "items": ["Find critical points from f'(x) = 0.", "Test the sign of f'(x) on each side.", "Positive to negative -> maximum.", "Negative to positive -> minimum."], "kind": "list"}, {"heading": "Strength", "items": ["It works even when the second derivative is awkward or zero."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Sign language</div>\n      <div class=\"figure-body\">Think of f'(x) as traffic direction: right/up is positive, left/down is negative.</div>\n    </div>\n    ", "cue": "Draw a quick sign line on the board.", "source": "Plymouth maxima/minima notes", "assessment": "Q5, Q8"}, {"kicker": "Second Derivative Test", "title": "Using The Second Derivative Test", "subtitle": "This test is fast when the second derivative is easy to compute.", "sections": [{"heading": "Method", "items": ["Find c where f'(c) = 0.", "Evaluate f''(c).", "If f''(c) > 0, local minimum.", "If f''(c) < 0, local maximum."], "kind": "list"}, {"heading": "Limitation", "items": ["If f''(c) = 0, the test is inconclusive."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 220\" class=\"svg-figure\" aria-label=\"Derivative flow\">\n      <rect x=\"40\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e9f5fb\"/>\n      <rect x=\"235\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#fff2de\"/>\n      <rect x=\"430\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e7f7f4\"/>\n      <text x=\"75\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f(x)</text>\n      <text x=\"265\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f'(x)</text>\n      <text x=\"457\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f''(x)</text>\n      <text x=\"60\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">shape / output</text>\n      <text x=\"255\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">slope / rate</text>\n      <text x=\"450\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">curvature / test</text>\n      <path d=\"M190 110 H235\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <path d=\"M385 110 H430\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <defs>\n        <marker id=\"arrowHead\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0,0 L12,6 L0,12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    ", "cue": "Students often confuse the sign meanings. Repeat: positive second derivative opens up, negative opens down.", "source": "mc-ty-maxmin-2009-1.pdf", "assessment": "Q5, Q6, Q8"}, {"kicker": "Assessment Q5", "title": "What Is The Condition For Local Maxima And Minima?", "subtitle": "This is a theory question, so students need a sentence answer as well as the symbolic condition.", "sections": [{"heading": "Strong answer", "items": ["A local maximum or minimum occurs at a critical point where f'(x) = 0 or is undefined, and the function changes behaviour there.", "The point can then be classified using the first derivative test or the second derivative test."], "kind": "list"}, {"heading": "Short exam version", "items": ["Necessary condition: f'(c) = 0.", "Classification: use sign change or second derivative."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Teacher note</div>\n      <div class=\"figure-body\">Encourage students to write one full sentence. It makes the answer look complete and confident.</div>\n    </div>\n    ", "cue": "Model a full-sentence response, not only a formula.", "source": "Assessment pack", "assessment": "Q5"}, {"kicker": "Assessment Q6", "title": "Worked Example Setup: f(x) = x^3 - 6x^2 + 9x + 15", "subtitle": "Use the second derivative test exactly as requested in the question.", "sections": [{"heading": "First derivative", "items": ["f'(x) = 3x² - 12x + 9", "Factor: f'(x) = 3(x - 1)(x - 3)", "Critical points: x = 1 and x = 3"], "kind": "formula"}, {"heading": "Second derivative", "items": ["f''(x) = 6x - 12"], "kind": "formula"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 220\" class=\"svg-figure\" aria-label=\"Derivative flow\">\n      <rect x=\"40\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e9f5fb\"/>\n      <rect x=\"235\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#fff2de\"/>\n      <rect x=\"430\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e7f7f4\"/>\n      <text x=\"75\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f(x)</text>\n      <text x=\"265\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f'(x)</text>\n      <text x=\"457\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f''(x)</text>\n      <text x=\"60\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">shape / output</text>\n      <text x=\"255\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">slope / rate</text>\n      <text x=\"450\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">curvature / test</text>\n      <path d=\"M190 110 H235\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <path d=\"M385 110 H430\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <defs>\n        <marker id=\"arrowHead\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0,0 L12,6 L0,12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    ", "cue": "Pause before the classification and ask students what they predict from the graph shape.", "source": "Assessment pack", "assessment": "Q6"}, {"kicker": "Assessment Q6", "title": "Worked Example Solution: Classify And Evaluate", "subtitle": "Now apply the second derivative test and calculate the function values.", "sections": [{"heading": "At x = 1", "items": ["f''(1) = -6 < 0, so x = 1 is a local maximum.", "f(1) = 1 - 6 + 9 + 15 = 19"], "kind": "list"}, {"heading": "At x = 3", "items": ["f''(3) = 6 > 0, so x = 3 is a local minimum.", "f(3) = 27 - 54 + 9? Stop and correct the middle term carefully.", "Actually f(3) = 27 - 54 + 27 + 15 = 15"], "kind": "list"}, {"heading": "Final answer", "items": ["Local maximum at (1, 19)", "Local minimum at (3, 15)"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Turning point graph\">\n      <line x1=\"80\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"35\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M150 70 C240 170, 350 170, 470 70\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <circle cx=\"310\" cy=\"160\" r=\"10\" fill=\"#ef6f51\"/>\n      <text x=\"325\" y=\"158\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">turning point</text>\n      <text x=\"505\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"90\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n      <text x=\"150\" y=\"40\" fill=\"#0d2b45\" font-size=\"16\">f'(x) changes sign here</text>\n    </svg>\n    ", "cue": "Use this slide to model self-correction. Students benefit from seeing arithmetic checked, not hidden.", "source": "Assessment pack", "assessment": "Q6"}, {"kicker": "Assessment Q7", "title": "True Or False: Local Maxima And Minima Are Turning Points", "subtitle": "This is a concept check disguised as a quick question.", "sections": [{"heading": "Answer", "items": ["True.", "Local maxima and local minima are turning points because the graph changes direction there."], "kind": "list"}, {"heading": "Useful caution", "items": ["Not every stationary point is a turning point.", "A stationary point of inflection can have f'(x) = 0 without being a max or min."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Extension</div>\n      <div class=\"figure-body\">Use y = x^3 as a counterexample for the idea that every critical point is a turning point.</div>\n    </div>\n    ", "cue": "This is a good place to distinguish turning points from all stationary points.", "source": "Assessment pack", "assessment": "Q7"}, {"kicker": "Assessment Q8", "title": "Which Tests Help Find Local Maximum And Minimum?", "subtitle": "Students should recognise both standard tests immediately.", "sections": [{"heading": "Correct choices", "items": ["First Derivative Test", "Second Derivative Test"], "kind": "list"}, {"heading": "Why the distractors are wrong", "items": ["Euler's Formula is not a turning point test.", "A t-test is a statistics tool, not a calculus classification method."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Exam strategy</div>\n      <div class=\"figure-body\">In multiple choice, first eliminate the obviously unrelated options.</div>\n    </div>\n    ", "cue": "Let students justify why the wrong answers are wrong.", "source": "Assessment pack", "assessment": "Q8"}, {"kicker": "Assessment Q9", "title": "Find The Maxima Of (x - 1)(x - 2)^2: Setup", "subtitle": "This is an optimisation-style polynomial question.", "sections": [{"heading": "Expand or differentiate as a product", "items": ["f(x) = (x - 1)(x - 2)²", "Expanded form: x³ - 5x² + 8x - 4"], "kind": "list"}, {"heading": "First derivative", "items": ["f'(x) = 3x² - 10x + 8", "Factor: f'(x) = (3x - 4)(x - 2)", "Critical points: x = 4/3 and x = 2"], "kind": "formula"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Turning point graph\">\n      <line x1=\"80\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"35\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M150 70 C240 170, 350 170, 470 70\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <circle cx=\"310\" cy=\"160\" r=\"10\" fill=\"#ef6f51\"/>\n      <text x=\"325\" y=\"158\" fill=\"#ef6f51\" font-size=\"18\" font-weight=\"700\">turning point</text>\n      <text x=\"505\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n      <text x=\"90\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">y</text>\n      <text x=\"150\" y=\"40\" fill=\"#0d2b45\" font-size=\"16\">f'(x) changes sign here</text>\n    </svg>\n    ", "cue": "If your class is weaker algebraically, stay in product form longer before expanding.", "source": "Assessment pack + max/min practice sheets", "assessment": "Q9"}, {"kicker": "Assessment Q9", "title": "Find The Maxima Of (x - 1)(x - 2)^2: Solution", "subtitle": "Classify the critical points and compute the function value at the maximum.", "sections": [{"heading": "Second derivative", "items": ["f''(x) = 6x - 10", "f''(4/3) = -2 < 0 so x = 4/3 is a local maximum", "f''(2) = 2 > 0 so x = 2 is a local minimum"], "kind": "list"}, {"heading": "Value at the maximum", "items": ["f(4/3) = (1/3)(-2/3)² = 4/27"], "kind": "formula"}, {"heading": "Final answer", "items": ["Maximum value = 4/27"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Assessment style</div>\n      <div class=\"figure-body\">If the question asks for the value at the maximum, students must substitute back into the original function.</div>\n    </div>\n    ", "cue": "Highlight the difference between x-value of the maximum and the maximum function value.", "source": "Assessment pack", "assessment": "Q9"}, {"kicker": "Optimisation", "title": "A Reliable Optimisation Workflow", "subtitle": "Students need a repeatable method they can use under time pressure.", "sections": [{"heading": "Step-by-step", "items": ["Define the quantity to optimise.", "Write one variable in terms of the other using the constraint.", "Build a single-variable objective function.", "Differentiate and find critical points.", "Use a test to confirm max or min.", "Interpret the answer in context and units."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Phrase to remember</div>\n      <div class=\"figure-body\">Constraint first, objective second, derivative third, interpretation last.</div>\n    </div>\n    ", "cue": "Put this workflow on the board again for Q10.", "source": "Optimisation references", "assessment": "Q9-Q10"}, {"kicker": "Assessment Q10", "title": "Rectangle With Perimeter 100 cm: Setup", "subtitle": "This is a classic maximum area problem and a strong introduction to engineering optimisation.", "sections": [{"heading": "Constraint", "items": ["Perimeter = 100", "2L + 2W = 100", "So L + W = 50 and W = 50 - L"], "kind": "list"}, {"heading": "Objective", "items": ["Area A = LW", "A(L) = L(50 - L) = 50L - L²"], "kind": "formula"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Rectangle optimisation\">\n      <rect x=\"120\" y=\"60\" width=\"300\" height=\"150\" rx=\"8\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"225\" x2=\"420\" y2=\"225\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"105\" y1=\"60\" x2=\"105\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <text x=\"240\" y=\"245\" fill=\"#0d2b45\" font-size=\"18\">length = x</text>\n      <text x=\"30\" y=\"145\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 30,145)\">width = 50 - x</text>\n      <text x=\"455\" y=\"110\" fill=\"#ef6f51\" font-size=\"22\" font-weight=\"700\">A(x) = x(50 - x)</text>\n      <text x=\"455\" y=\"145\" fill=\"#0d2b45\" font-size=\"18\">Max area happens at</text>\n      <text x=\"455\" y=\"175\" fill=\"#0f8b8d\" font-size=\"28\" font-weight=\"700\">x = 25 cm</text>\n    </svg>\n    ", "cue": "Keep naming the pieces: perimeter gives the constraint, area gives the objective.", "source": "Assessment pack", "assessment": "Q10"}, {"kicker": "Assessment Q10", "title": "Rectangle With Perimeter 100 cm: Solution", "subtitle": "Differentiate the area function and classify the result.", "sections": [{"heading": "Derivative", "items": ["A'(L) = 50 - 2L", "Set A'(L) = 0 -> 50 - 2L = 0 -> L = 25"], "kind": "formula"}, {"heading": "Confirm maximum", "items": ["A''(L) = -2 < 0, so the area is maximum.", "W = 50 - 25 = 25"], "kind": "list"}, {"heading": "Final answer", "items": ["The rectangle with maximum area is a square: 25 cm by 25 cm."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Rectangle optimisation\">\n      <rect x=\"120\" y=\"60\" width=\"300\" height=\"150\" rx=\"8\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"4\"/>\n      <line x1=\"120\" y1=\"225\" x2=\"420\" y2=\"225\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"105\" y1=\"60\" x2=\"105\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <text x=\"240\" y=\"245\" fill=\"#0d2b45\" font-size=\"18\">length = x</text>\n      <text x=\"30\" y=\"145\" fill=\"#0d2b45\" font-size=\"18\" transform=\"rotate(-90 30,145)\">width = 50 - x</text>\n      <text x=\"455\" y=\"110\" fill=\"#ef6f51\" font-size=\"22\" font-weight=\"700\">A(x) = x(50 - x)</text>\n      <text x=\"455\" y=\"145\" fill=\"#0d2b45\" font-size=\"18\">Max area happens at</text>\n      <text x=\"455\" y=\"175\" fill=\"#0f8b8d\" font-size=\"28\" font-weight=\"700\">x = 25 cm</text>\n    </svg>\n    ", "cue": "This is a nice moment to ask why symmetry makes the answer feel reasonable even before calculus confirms it.", "source": "Assessment pack", "assessment": "Q10"}, {"kicker": "Applied Thinking", "title": "Where Engineers Use Maxima And Minima", "subtitle": "Optimisation is everywhere once students know what to look for.", "sections": [{"heading": "Examples", "items": ["Choose dimensions for strength with minimum material.", "Maximise output while limiting cost or size.", "Find peak temperature or pressure points.", "Locate highest bending moment or stress concentration."], "kind": "list"}, {"heading": "Assessment transfer", "items": ["Even when the context changes, the workflow stays the same."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Bridge to project work</div>\n      <div class=\"figure-body\">These real-life examples can feed directly into the 15-20 slide case study presentation task.</div>\n    </div>\n    ", "cue": "Tell students the project is really asking them to explain these kinds of applications in plain language.", "source": "Case study brief + applied calculus framing", "assessment": "Project support"}, {"kicker": "Class 2 Check", "title": "Exit Check For Class 2", "subtitle": "Students should now be able to classify turning points with confidence.", "sections": [{"heading": "Quick questions", "items": ["What does f''(c) < 0 tell you?", "What is the local maximum of x^3 - 6x^2 + 9x + 15?", "Why is the maximum-area rectangle a square here?"], "kind": "list"}, {"heading": "Success signal", "items": ["Students explain the logic, not just the answer."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Homework idea</div>\n      <div class=\"figure-body\">Give one turning-point question and one optimisation question for short homework.</div>\n    </div>\n    ", "cue": "Use a 3-minute pair discussion so students verbalise the process.", "source": "Class 2 summary", "assessment": "Q5-Q10 readiness"}, {"kicker": "Class 3", "title": "Integration, Area, And Moment Of Inertia", "subtitle": "Today’s target: students can integrate confidently and use integration in geometric and engineering applications.", "sections": [{"heading": "Assessment focus", "items": ["Q11 and Q12 basic integrals", "Q13 integration by parts style thinking", "Q14 and Q15 areas under curves", "Q17 moment of inertia"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Absolute value area graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"260\" y1=\"30\" x2=\"260\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M90 160 L260 220 L430 80\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <path d=\"M90 160 L260 220 L430 80 L430 220 L90 220 Z\" fill=\"#f7b44c\" opacity=\"0.18\"/>\n      <line x1=\"145\" y1=\"220\" x2=\"145\" y2=\"120\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"430\" y1=\"220\" x2=\"430\" y2=\"80\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"135\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -6</text>\n      <text x=\"245\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -4</text>\n      <text x=\"420\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 0</text>\n    </svg>\n    ", "cue": "Frame this class as the reverse story of differentiation plus practical accumulation problems.", "source": "Integration and area references + Moment_Inertia.pdf", "assessment": "Q11-Q17"}, {"kicker": "Integration Basics", "title": "What Integration Means", "subtitle": "An integral accumulates infinitely many small pieces.", "sections": [{"heading": "Key idea", "items": ["Differentiation measures change.", "Integration accumulates change.", "An antiderivative reverses differentiation."], "kind": "list"}, {"heading": "Physical meaning", "items": ["Area under a curve", "Total accumulated quantity", "Geometric property built from thin strips"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Student phrase</div>\n      <div class=\"figure-body\">Integrals add up tiny slices.</div>\n    </div>\n    ", "cue": "Use hand motions for slicing and accumulating. It lands well with visual learners.", "source": "13_1_basics_integration + C7_AreasbyIntegration", "assessment": "Q11-Q17"}, {"kicker": "Integration Basics", "title": "Common Antiderivatives Students Must Know", "subtitle": "These rules carry a large part of the assessment load.", "sections": [{"heading": "Core rules", "items": ["∫ x^n dx = x^(n+1)/(n+1) + C", "∫ e^(ax) dx = e^(ax)/a + C", "∫ sin x dx = -cos x + C", "∫ cos x dx = sin x + C", "∫ 1/x dx = ln|x| + C"], "kind": "formula"}, {"heading": "One reminder", "items": ["Do not forget + C on indefinite integrals."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Memory support</div>\n      <div class=\"figure-body\">Students often remember the derivative first. Ask them to reverse it mentally.</div>\n    </div>\n    ", "cue": "Have students say which derivative each integral undoes.", "source": "common_derivatives_integrals.pdf", "assessment": "Q11-Q13"}, {"kicker": "Definite Integrals", "title": "Indefinite Vs Definite Integrals", "subtitle": "Students need to recognise whether the task asks for a family of antiderivatives or a final number.", "sections": [{"heading": "Indefinite integral", "items": ["No limits", "Answer includes + C", "Represents a family of antiderivatives"], "kind": "list"}, {"heading": "Definite integral", "items": ["Has limits, such as ∫ from a to b", "Answer is usually a number", "Use the antiderivative, then substitute upper minus lower"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Teacher note</div>\n      <div class=\"figure-body\">A lot of integration errors come from students mixing these two question types.</div>\n    </div>\n    ", "cue": "Write both forms side by side and ask students what changes in the answer format.", "source": "Basic integration handouts", "assessment": "Q11, Q12, Q14, Q15"}, {"kicker": "Assessment Q11", "title": "Find The Integral Of e^(3x)", "subtitle": "This is the standard exponential antiderivative pattern.", "sections": [{"heading": "Rule", "items": ["∫ e^(ax) dx = e^(ax)/a + C"], "kind": "formula"}, {"heading": "Apply here", "items": ["∫ e^(3x) dx = e^(3x)/3 + C"], "kind": "formula"}, {"heading": "Final answer", "items": ["(1/3)e^(3x) + C"], "kind": "formula"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Common mistake</div>\n      <div class=\"figure-body\">Students often forget to divide by the coefficient of x in the exponent.</div>\n    </div>\n    ", "cue": "Link back to chain rule in reverse.", "source": "Assessment pack", "assessment": "Q11"}, {"kicker": "Assessment Q12", "title": "Evaluate ∫ from 2 to 3 of (x + 1) dx", "subtitle": "This is a clean definite integral with polynomial terms.", "sections": [{"heading": "Antiderivative", "items": ["∫ (x + 1) dx = x²/2 + x"], "kind": "formula"}, {"heading": "Substitute limits", "items": ["[x²/2 + x] from 2 to 3", "(9/2 + 3) - (2 + 2)", "15/2 - 4 = 7/2"], "kind": "formula"}, {"heading": "Final answer", "items": ["7/2"], "kind": "list"}], "image": "assets/image5.png", "cue": "This is a good slide to reinforce upper minus lower and the habit of using brackets.", "source": "Assessment image", "assessment": "Q12"}, {"kicker": "Technique", "title": "Integration By Parts", "subtitle": "Use this when the integrand is a product and direct substitution does not help.", "sections": [{"heading": "Formula", "items": ["∫ u dv = uv - ∫ v du"], "kind": "formula"}, {"heading": "When it is useful", "items": ["A polynomial times a log function", "A polynomial times an exponential or trig function"], "kind": "list"}, {"heading": "Choice hint", "items": ["A common strategy is to choose u as the part that becomes simpler when differentiated."], "kind": "list"}], "image": "assets/image6.png", "cue": "Teach students to pick u deliberately rather than randomly.", "source": "Integration references + assessment image", "assessment": "Q13 support"}, {"kicker": "Assessment Style Example", "title": "Worked Example: ∫ x ln(x) dx", "subtitle": "This mirrors the integration by parts style hinted in the assessment pack.", "sections": [{"heading": "Choose parts", "items": ["u = ln x -> du = (1/x) dx", "dv = x dx -> v = x²/2"], "kind": "list"}, {"heading": "Apply the formula", "items": ["∫ x ln x dx = (x²/2)ln x - ∫ (x²/2)(1/x) dx", "= (x²/2)ln x - (1/2)∫ x dx", "= (x²/2)ln x - x²/4 + C"], "kind": "formula"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Revision link</div>\n      <div class=\"figure-body\">This is a useful worked example even if the exact Q13 image is incomplete in the source file.</div>\n    </div>\n    ", "cue": "This is a nice place to show how calculus methods transfer even when a question image is missing.", "source": "Assessment hint image + integration by parts note", "assessment": "Q13 preparation"}, {"kicker": "Area By Integration", "title": "Turning A Graph Into An Area Problem", "subtitle": "Students need to know when a graph must be split into separate regions.", "sections": [{"heading": "General rule", "items": ["Area under a curve from a to b is ∫ from a to b of y dx when y ≥ 0.", "If the curve changes sign or has an absolute value, split the interval."], "kind": "list"}, {"heading": "Teacher prompt", "items": ["Ask first: where does the graph cross the x-axis or change formula?"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Absolute value area graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"260\" y1=\"30\" x2=\"260\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M90 160 L260 220 L430 80\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <path d=\"M90 160 L260 220 L430 80 L430 220 L90 220 Z\" fill=\"#f7b44c\" opacity=\"0.18\"/>\n      <line x1=\"145\" y1=\"220\" x2=\"145\" y2=\"120\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"430\" y1=\"220\" x2=\"430\" y2=\"80\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"135\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -6</text>\n      <text x=\"245\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -4</text>\n      <text x=\"420\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 0</text>\n    </svg>\n    ", "cue": "This slide sets up Q14 perfectly.", "source": "C7_AreasbyIntegration + mc-ty-areas-2009-1.pdf", "assessment": "Q14-Q15"}, {"kicker": "Assessment Q14", "title": "Sketch y = |x + 4| And Find The Bounded Area", "subtitle": "The key idea is to split at the turning point x = -4.", "sections": [{"heading": "Piecewise view", "items": ["For x < -4, |x + 4| = -(x + 4)", "For x ≥ -4, |x + 4| = x + 4"], "kind": "list"}, {"heading": "Split the area", "items": ["Area = ∫ from -6 to -4 of -(x + 4) dx + ∫ from -4 to 0 of (x + 4) dx"], "kind": "formula"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Absolute value area graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"260\" y1=\"30\" x2=\"260\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M90 160 L260 220 L430 80\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <path d=\"M90 160 L260 220 L430 80 L430 220 L90 220 Z\" fill=\"#f7b44c\" opacity=\"0.18\"/>\n      <line x1=\"145\" y1=\"220\" x2=\"145\" y2=\"120\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"430\" y1=\"220\" x2=\"430\" y2=\"80\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"135\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -6</text>\n      <text x=\"245\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -4</text>\n      <text x=\"420\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 0</text>\n    </svg>\n    ", "cue": "Students often forget to split the interval. Ask them where the V-shape changes direction.", "source": "Assessment pack", "assessment": "Q14"}, {"kicker": "Assessment Q14", "title": "Area Result For y = |x + 4| From x = -6 To x = 0", "subtitle": "You can solve it with integrals or recognise the two triangular regions.", "sections": [{"heading": "Left triangle", "items": ["Base = 2 and height = 2", "Area = 1/2 × 2 × 2 = 2"], "kind": "list"}, {"heading": "Right triangle", "items": ["Base = 4 and height = 4", "Area = 1/2 × 4 × 4 = 8"], "kind": "list"}, {"heading": "Final answer", "items": ["Total area = 2 + 8 = 10 square units"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Absolute value area graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"260\" y1=\"30\" x2=\"260\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M90 160 L260 220 L430 80\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <path d=\"M90 160 L260 220 L430 80 L430 220 L90 220 Z\" fill=\"#f7b44c\" opacity=\"0.18\"/>\n      <line x1=\"145\" y1=\"220\" x2=\"145\" y2=\"120\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"430\" y1=\"220\" x2=\"430\" y2=\"80\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"135\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -6</text>\n      <text x=\"245\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -4</text>\n      <text x=\"420\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 0</text>\n    </svg>\n    ", "cue": "Show both the geometry shortcut and the integral method. It builds flexible thinking.", "source": "Assessment pack", "assessment": "Q14"}, {"kicker": "Assessment Q15", "title": "Sketch y = √(x - 1) On [1, 5]", "subtitle": "This is a smooth increasing curve starting at x = 1.", "sections": [{"heading": "Graph features", "items": ["Starts at (1, 0)", "Increases gradually", "Concave down"], "kind": "list"}, {"heading": "Area setup", "items": ["Area = ∫ from 1 to 5 of √(x - 1) dx"], "kind": "formula"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Square root graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"40\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M150 220 C190 180, 240 145, 330 110 S470 75, 520 65\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M150 220 C190 180, 240 145, 330 110 S470 75, 520 65 L520 220 Z\" fill=\"#0f8b8d\" opacity=\"0.14\"/>\n      <line x1=\"150\" y1=\"220\" x2=\"150\" y2=\"40\" stroke=\"#ef6f51\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"520\" y1=\"220\" x2=\"520\" y2=\"40\" stroke=\"#ef6f51\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"140\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 1</text>\n      <text x=\"510\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 5</text>\n    </svg>\n    ", "cue": "Have students note the horizontal shift by 1 before integrating.", "source": "Assessment pack", "assessment": "Q15"}, {"kicker": "Assessment Q15", "title": "Area Under y = √(x - 1) From x = 1 To x = 5", "subtitle": "A substitution view or direct recognition both work here.", "sections": [{"heading": "Antiderivative", "items": ["∫ √(x - 1) dx = (2/3)(x - 1)^(3/2) + C"], "kind": "formula"}, {"heading": "Substitute limits", "items": ["(2/3)(5 - 1)^(3/2) - (2/3)(1 - 1)^(3/2)", "= (2/3)(4)^(3/2)", "= (2/3)(8) = 16/3"], "kind": "formula"}, {"heading": "Final answer", "items": ["Area = 16/3 square units"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Square root graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"40\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M150 220 C190 180, 240 145, 330 110 S470 75, 520 65\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M150 220 C190 180, 240 145, 330 110 S470 75, 520 65 L520 220 Z\" fill=\"#0f8b8d\" opacity=\"0.14\"/>\n      <line x1=\"150\" y1=\"220\" x2=\"150\" y2=\"40\" stroke=\"#ef6f51\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"520\" y1=\"220\" x2=\"520\" y2=\"40\" stroke=\"#ef6f51\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"140\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 1</text>\n      <text x=\"510\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 5</text>\n    </svg>\n    ", "cue": "Remind students that a horizontal shift stays inside the brackets through the integration.", "source": "Assessment pack", "assessment": "Q15"}, {"kicker": "Engineering Application", "title": "Moment Of Inertia: Why This Topic Matters", "subtitle": "In structures, the second moment of area measures how a cross-section resists bending.", "sections": [{"heading": "Plain meaning", "items": ["A larger moment of inertia usually means greater bending resistance about that axis.", "It depends on how area is distributed away from the axis."], "kind": "list"}, {"heading": "Why calculus appears", "items": ["We treat the shape as many thin strips and sum their contributions."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 280\" class=\"svg-figure\" aria-label=\"Triangle moment of inertia\">\n      <line x1=\"90\" y1=\"240\" x2=\"530\" y2=\"240\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <polygon points=\"170,240 450,240 310,70\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <line x1=\"250\" y1=\"150\" x2=\"370\" y2=\"150\" stroke=\"#ef6f51\" stroke-width=\"3\" stroke-dasharray=\"8 6\"/>\n      <text x=\"455\" y=\"245\" fill=\"#0d2b45\" font-size=\"18\">base b = 1 m</text>\n      <text x=\"320\" y=\"60\" fill=\"#0d2b45\" font-size=\"18\">height h = 2 m</text>\n      <text x=\"110\" y=\"115\" fill=\"#ef6f51\" font-size=\"18\">thin strip</text>\n      <text x=\"95\" y=\"260\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Horizontal axis</text>\n      <text x=\"365\" y=\"155\" fill=\"#ef6f51\" font-size=\"16\">width changes with y</text>\n    </svg>\n    ", "cue": "Students often mix mass moment and area moment. Keep reminding them this is a cross-section property.", "source": "Moment_Inertia.pdf", "assessment": "Q17"}, {"kicker": "Engineering Application", "title": "Set Up The Triangle Using Thin Horizontal Strips", "subtitle": "This is the natural calculus model for the upright triangle in the assessment.", "sections": [{"heading": "Geometry idea", "items": ["Take a thin strip at height y with thickness dy.", "Its distance from the horizontal base axis is y.", "Its contribution is dI = y² dA."], "kind": "list"}, {"heading": "Area of the strip", "items": ["dA = width(y) · dy", "The width decreases linearly from b at the base to 0 at the top."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 280\" class=\"svg-figure\" aria-label=\"Triangle moment of inertia\">\n      <line x1=\"90\" y1=\"240\" x2=\"530\" y2=\"240\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <polygon points=\"170,240 450,240 310,70\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <line x1=\"250\" y1=\"150\" x2=\"370\" y2=\"150\" stroke=\"#ef6f51\" stroke-width=\"3\" stroke-dasharray=\"8 6\"/>\n      <text x=\"455\" y=\"245\" fill=\"#0d2b45\" font-size=\"18\">base b = 1 m</text>\n      <text x=\"320\" y=\"60\" fill=\"#0d2b45\" font-size=\"18\">height h = 2 m</text>\n      <text x=\"110\" y=\"115\" fill=\"#ef6f51\" font-size=\"18\">thin strip</text>\n      <text x=\"95\" y=\"260\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Horizontal axis</text>\n      <text x=\"365\" y=\"155\" fill=\"#ef6f51\" font-size=\"16\">width changes with y</text>\n    </svg>\n    ", "cue": "Spend time on the geometry first. Many students find the strip-width relation harder than the calculus step.", "source": "Moment_Inertia.pdf", "assessment": "Q17"}, {"kicker": "Assessment Q17", "title": "Derive Iₓ For An Upright Triangle About The Base Axis", "subtitle": "This is the cleanest interpretation of the question if the horizontal axis is the base.", "sections": [{"heading": "Width as a function of y", "items": ["width(y) = b(1 - y/h)"], "kind": "formula"}, {"heading": "Integral", "items": ["Iₓ = ∫ y² · width(y) dy from 0 to h", "Iₓ = b ∫ from 0 to h [ y² - y³/h ] dy", "Iₓ = b [ y³/3 - y⁴/(4h) ] from 0 to h", "Iₓ = bh³(1/3 - 1/4) = bh³/12"], "kind": "formula"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 280\" class=\"svg-figure\" aria-label=\"Triangle moment of inertia\">\n      <line x1=\"90\" y1=\"240\" x2=\"530\" y2=\"240\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <polygon points=\"170,240 450,240 310,70\" fill=\"#e9f5fb\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <line x1=\"250\" y1=\"150\" x2=\"370\" y2=\"150\" stroke=\"#ef6f51\" stroke-width=\"3\" stroke-dasharray=\"8 6\"/>\n      <text x=\"455\" y=\"245\" fill=\"#0d2b45\" font-size=\"18\">base b = 1 m</text>\n      <text x=\"320\" y=\"60\" fill=\"#0d2b45\" font-size=\"18\">height h = 2 m</text>\n      <text x=\"110\" y=\"115\" fill=\"#ef6f51\" font-size=\"18\">thin strip</text>\n      <text x=\"95\" y=\"260\" fill=\"#0d2b45\" font-size=\"18\" font-weight=\"700\">Horizontal axis</text>\n      <text x=\"365\" y=\"155\" fill=\"#ef6f51\" font-size=\"16\">width changes with y</text>\n    </svg>\n    ", "cue": "Tell students to write the strip expression dI = y² dA every time. It anchors the method.", "source": "Moment_Inertia.pdf + assessment wording", "assessment": "Q17"}, {"kicker": "Assessment Q17", "title": "Substitute b = 1 m And h = 2 m", "subtitle": "Now turn the symbolic result into a numerical answer.", "sections": [{"heading": "Substitute", "items": ["Iₓ = bh³/12", "Iₓ = 1 × 2³ / 12", "Iₓ = 8/12 = 2/3 m⁴"], "kind": "formula"}, {"heading": "Important note", "items": ["If the assessor means the centroidal horizontal axis instead, the formula becomes bh³/36.", "Students should clearly state the axis they are using."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Teacher judgement</div>\n      <div class=\"figure-body\">The wording is slightly ambiguous, so modelling how to state the axis clearly is valuable.</div>\n    </div>\n    ", "cue": "If you want, discuss both base-axis and centroidal-axis forms so students can adapt safely.", "source": "Moment_Inertia.pdf", "assessment": "Q17"}, {"kicker": "Assessment Ready", "title": "How To Present A Strong Moment Of Inertia Solution", "subtitle": "Students need the steps arranged logically to earn full confidence.", "sections": [{"heading": "Strong answer structure", "items": ["Draw the shape and axis.", "Choose a strip and write dA.", "Write dI = y² dA.", "Express width in terms of y.", "Integrate over the correct limits.", "Substitute dimensions and units."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">High-value habit</div>\n      <div class=\"figure-body\">Engineering answers look stronger when the geometry and the calculus are both shown.</div>\n    </div>\n    ", "cue": "Tell students that clear structure matters especially on applied questions.", "source": "Moment_Inertia.pdf + assessment pack", "assessment": "Q17"}, {"kicker": "Class 3 Check", "title": "Exit Check For Class 3", "subtitle": "Students should now be able to integrate basic functions and solve area applications.", "sections": [{"heading": "Ask students", "items": ["What is the difference between indefinite and definite integrals?", "Why did Q14 need a split at x = -4?", "What is dI for a thin strip in moment of inertia work?"], "kind": "list"}, {"heading": "Success signal", "items": ["They can explain the area setup before doing the algebra."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Homework idea</div>\n      <div class=\"figure-body\">Assign one antiderivative, one area, and one strip-method setup question.</div>\n    </div>\n    ", "cue": "Use whiteboards or quick notebooks for a rapid confidence check.", "source": "Class 3 summary", "assessment": "Q11-Q17 readiness"}, {"kicker": "Class 4", "title": "Differential Equations, Probability, Partial Derivatives, And Final Review", "subtitle": "Today’s target: students can close the last assessment gaps and feel ready for the full unit test.", "sections": [{"heading": "Assessment focus", "items": ["Q16 initial value problem", "Q18 piecewise pdf question", "Q19 partial derivatives", "Full-unit revision strategy"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Slope field\">\n      <rect x=\"60\" y=\"30\" width=\"500\" height=\"200\" rx=\"16\" fill=\"#fbfcff\" stroke=\"#dbe8f2\" stroke-width=\"3\"/>\n      <line x1=\"90\" y1=\"210\" x2=\"530\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"120\" y1=\"50\" x2=\"120\" y2=\"230\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <g stroke=\"#0f8b8d\" stroke-width=\"4\">\n        <line x1=\"150\" y1=\"180\" x2=\"170\" y2=\"172\"/>\n        <line x1=\"210\" y1=\"180\" x2=\"230\" y2=\"168\"/>\n        <line x1=\"270\" y1=\"180\" x2=\"290\" y2=\"164\"/>\n        <line x1=\"330\" y1=\"180\" x2=\"350\" y2=\"156\"/>\n        <line x1=\"390\" y1=\"180\" x2=\"410\" y2=\"148\"/>\n        <line x1=\"150\" y1=\"130\" x2=\"170\" y2=\"122\"/>\n        <line x1=\"210\" y1=\"130\" x2=\"230\" y2=\"118\"/>\n        <line x1=\"270\" y1=\"130\" x2=\"290\" y2=\"114\"/>\n        <line x1=\"330\" y1=\"130\" x2=\"350\" y2=\"106\"/>\n        <line x1=\"390\" y1=\"130\" x2=\"410\" y2=\"98\"/>\n      </g>\n      <path d=\"M150 210 C210 180, 260 150, 300 120 S390 80, 470 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"430\" y=\"90\" fill=\"#ef6f51\" font-size=\"18\">solution curve</text>\n    </svg>\n    ", "cue": "Tell students this class is about finishing strong and connecting the remaining topics.", "source": "differential-equations.pdf + assessment pack", "assessment": "Q16, Q18, Q19"}, {"kicker": "Differential Equations", "title": "What A Differential Equation Tells Us", "subtitle": "A differential equation links a function to one or more of its derivatives.", "sections": [{"heading": "Simple idea", "items": ["Instead of giving y directly, the equation tells us how y changes.", "The solution is a function that satisfies that rate rule."], "kind": "list"}, {"heading": "Why engineers care", "items": ["Growth and decay", "Motion and response", "Heat transfer and system behaviour"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Slope field\">\n      <rect x=\"60\" y=\"30\" width=\"500\" height=\"200\" rx=\"16\" fill=\"#fbfcff\" stroke=\"#dbe8f2\" stroke-width=\"3\"/>\n      <line x1=\"90\" y1=\"210\" x2=\"530\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"120\" y1=\"50\" x2=\"120\" y2=\"230\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <g stroke=\"#0f8b8d\" stroke-width=\"4\">\n        <line x1=\"150\" y1=\"180\" x2=\"170\" y2=\"172\"/>\n        <line x1=\"210\" y1=\"180\" x2=\"230\" y2=\"168\"/>\n        <line x1=\"270\" y1=\"180\" x2=\"290\" y2=\"164\"/>\n        <line x1=\"330\" y1=\"180\" x2=\"350\" y2=\"156\"/>\n        <line x1=\"390\" y1=\"180\" x2=\"410\" y2=\"148\"/>\n        <line x1=\"150\" y1=\"130\" x2=\"170\" y2=\"122\"/>\n        <line x1=\"210\" y1=\"130\" x2=\"230\" y2=\"118\"/>\n        <line x1=\"270\" y1=\"130\" x2=\"290\" y2=\"114\"/>\n        <line x1=\"330\" y1=\"130\" x2=\"350\" y2=\"106\"/>\n        <line x1=\"390\" y1=\"130\" x2=\"410\" y2=\"98\"/>\n      </g>\n      <path d=\"M150 210 C210 180, 260 150, 300 120 S390 80, 470 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"430\" y=\"90\" fill=\"#ef6f51\" font-size=\"18\">solution curve</text>\n    </svg>\n    ", "cue": "Keep it intuitive: a differential equation is a law of change.", "source": "differential-equations.pdf", "assessment": "Q16"}, {"kicker": "Differential Equations", "title": "Slope Fields And Families Of Solutions", "subtitle": "A slope field shows the direction of solutions even before we write the final function.", "sections": [{"heading": "Student takeaway", "items": ["Short line segments show the local slope.", "A solution curve follows those local directions.", "An initial condition selects one specific curve from the family."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Slope field\">\n      <rect x=\"60\" y=\"30\" width=\"500\" height=\"200\" rx=\"16\" fill=\"#fbfcff\" stroke=\"#dbe8f2\" stroke-width=\"3\"/>\n      <line x1=\"90\" y1=\"210\" x2=\"530\" y2=\"210\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <line x1=\"120\" y1=\"50\" x2=\"120\" y2=\"230\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <g stroke=\"#0f8b8d\" stroke-width=\"4\">\n        <line x1=\"150\" y1=\"180\" x2=\"170\" y2=\"172\"/>\n        <line x1=\"210\" y1=\"180\" x2=\"230\" y2=\"168\"/>\n        <line x1=\"270\" y1=\"180\" x2=\"290\" y2=\"164\"/>\n        <line x1=\"330\" y1=\"180\" x2=\"350\" y2=\"156\"/>\n        <line x1=\"390\" y1=\"180\" x2=\"410\" y2=\"148\"/>\n        <line x1=\"150\" y1=\"130\" x2=\"170\" y2=\"122\"/>\n        <line x1=\"210\" y1=\"130\" x2=\"230\" y2=\"118\"/>\n        <line x1=\"270\" y1=\"130\" x2=\"290\" y2=\"114\"/>\n        <line x1=\"330\" y1=\"130\" x2=\"350\" y2=\"106\"/>\n        <line x1=\"390\" y1=\"130\" x2=\"410\" y2=\"98\"/>\n      </g>\n      <path d=\"M150 210 C210 180, 260 150, 300 120 S390 80, 470 60\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <text x=\"430\" y=\"90\" fill=\"#ef6f51\" font-size=\"18\">solution curve</text>\n    </svg>\n    ", "cue": "Even a rough visual explanation helps students understand why initial conditions matter.", "source": "differential-equations.pdf", "assessment": "Q16"}, {"kicker": "Assessment Q16", "title": "Solve dy/dx = 2x, y(0) = 2", "subtitle": "This is a clean initial value problem.", "sections": [{"heading": "Integrate both sides", "items": ["dy/dx = 2x", "Integrate with respect to x", "y = x² + C"], "kind": "formula"}, {"heading": "Use the initial condition", "items": ["y(0) = 2", "2 = 0² + C, so C = 2"], "kind": "list"}, {"heading": "Final answer", "items": ["y = x² + 2"], "kind": "formula"}], "image": "assets/image7.png", "cue": "Show that the initial condition is what turns a family of curves into one answer.", "source": "Assessment image", "assessment": "Q16"}, {"kicker": "Applied DEs", "title": "Where Differential Equations Show Up In Engineering", "subtitle": "Students remember better when they see why the topic exists.", "sections": [{"heading": "Examples", "items": ["Vibration of a structure", "Charging and discharging in circuits", "Cooling and heating processes", "Population or demand models"], "kind": "list"}, {"heading": "Assessment transfer", "items": ["Even a simple IVP trains the idea of change law + starting condition."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Project link</div>\n      <div class=\"figure-body\">These examples can be used in the real-life calculus presentation task near the end of the assessment.</div>\n    </div>\n    ", "cue": "Ask students which example feels most familiar to their trade or technical area.", "source": "differential-equations.pdf", "assessment": "Q16 + project"}, {"kicker": "Probability Density", "title": "A Quick Refresher On Probability Density Functions", "subtitle": "Q18 blends calculus with a simple probability model.", "sections": [{"heading": "Rules for a pdf", "items": ["f(x) ≥ 0 on its domain", "The total area under the graph is 1"], "kind": "list"}, {"heading": "Why calculus appears", "items": ["Probability on an interval is area under the density curve."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Piecewise probability density graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"35\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M110 220 L230 120 L350 220\" fill=\"rgba(15,139,141,0.12)\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <line x1=\"350\" y1=\"220\" x2=\"470\" y2=\"220\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <line x1=\"230\" y1=\"120\" x2=\"230\" y2=\"220\" stroke=\"#ef6f51\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"350\" y1=\"220\" x2=\"350\" y2=\"120\" stroke=\"#ef6f51\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"216\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">1</text>\n      <text x=\"340\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">2</text>\n      <text x=\"84\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">f(x)</text>\n      <text x=\"545\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n    </svg>\n    ", "cue": "Students do not need deep statistics here. Keep it focused on the area interpretation.", "source": "Assessment pack", "assessment": "Q18"}, {"kicker": "Assessment Q18", "title": "The Piecewise Pdf In The Assessment", "subtitle": "This is the function given for elevator waiting time.", "sections": [{"heading": "Given density", "items": ["f(x) = x for 0 ≤ x ≤ 1", "f(x) = 2 - x for 1 < x ≤ 2", "f(x) = 0 otherwise"], "kind": "formula"}, {"heading": "Visual meaning", "items": ["The density rises to a peak at x = 1 and then falls symmetrically."], "kind": "list"}], "image": "assets/image8.png", "cue": "Students should recognise this as a triangular distribution shape even if the term is not required.", "source": "Assessment image", "assessment": "Q18"}, {"kicker": "Assessment Q18", "title": "Check That The Total Probability Is 1", "subtitle": "This is the first thing students should verify with a pdf question.", "sections": [{"heading": "Area on [0,1]", "items": ["∫ from 0 to 1 of x dx = 1/2"], "kind": "formula"}, {"heading": "Area on (1,2]", "items": ["∫ from 1 to 2 of (2 - x) dx = 1/2"], "kind": "formula"}, {"heading": "Total", "items": ["1/2 + 1/2 = 1", "So the function is a valid pdf."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Piecewise probability density graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"110\" y1=\"35\" x2=\"110\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M110 220 L230 120 L350 220\" fill=\"rgba(15,139,141,0.12)\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <line x1=\"350\" y1=\"220\" x2=\"470\" y2=\"220\" stroke=\"#0f8b8d\" stroke-width=\"5\"/>\n      <line x1=\"230\" y1=\"120\" x2=\"230\" y2=\"220\" stroke=\"#ef6f51\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"350\" y1=\"220\" x2=\"350\" y2=\"120\" stroke=\"#ef6f51\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"216\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">1</text>\n      <text x=\"340\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">2</text>\n      <text x=\"84\" y=\"55\" fill=\"#0d2b45\" font-size=\"16\">f(x)</text>\n      <text x=\"545\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x</text>\n    </svg>\n    ", "cue": "A lot of students gain confidence when they see the two triangular halves add neatly to 1.", "source": "Assessment pack", "assessment": "Q18"}, {"kicker": "Assessment Q18", "title": "A Useful Extension: Expected Waiting Time", "subtitle": "Even if not explicitly asked, this is excellent practice with a pdf.", "sections": [{"heading": "Set up", "items": ["E(X) = ∫ x f(x) dx over the full domain", "= ∫ from 0 to 1 of x² dx + ∫ from 1 to 2 of x(2 - x) dx"], "kind": "formula"}, {"heading": "Result", "items": ["E(X) = 1/3 + 2/3 = 1 minute"], "kind": "formula"}, {"heading": "Why this helps", "items": ["It reminds students that calculus can summarise real waiting-time behaviour."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Teacher choice</div>\n      <div class=\"figure-body\">Use this as extension if the class is moving well; skip if you want to keep revision tight.</div>\n    </div>\n    ", "cue": "This is optional but powerful if you want one richer application example.", "source": "Assessment pack", "assessment": "Q18 extension"}, {"kicker": "Partial Derivatives", "title": "What A Partial Derivative Means", "subtitle": "A partial derivative measures change with respect to one variable while holding the other variable constant.", "sections": [{"heading": "Interpretation", "items": ["∂r/∂x: change in r as x changes, with y fixed", "∂r/∂y: change in r as y changes, with x fixed"], "kind": "list"}, {"heading": "Why engineers care", "items": ["Many outputs depend on more than one input variable.", "Partial derivatives measure sensitivity one direction at a time."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Partial derivatives\">\n      <path d=\"M130 190 C180 120, 260 70, 340 95 S470 170, 520 115\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M140 210 L140 70
