
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MEM23007A Interactive Teaching Deck</title>
  <style>
    :root {
      --ink: #0d2b45;
      --ink-soft: #274b63;
      --sky: #e9f5fb;
      --cream: #fff8ef;
      --teal: #0f8b8d;
      --gold: #f7b44c;
      --coral: #ef6f51;
      --panel: rgba(255, 255, 255, 0.82);
      --shadow: 0 24px 60px rgba(13, 43, 69, 0.18);
      --line: rgba(13, 43, 69, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(247, 180, 76, 0.28), transparent 28%),
        radial-gradient(circle at top right, rgba(15, 139, 141, 0.20), transparent 24%),
        linear-gradient(180deg, #f4fbff 0%, #fff8ef 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(13, 43, 69, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(13, 43, 69, 0.025) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
    }

    .deck-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: 20px 22px 24px;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 24px rgba(13, 43, 69, 0.08);
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 0.93rem;
      color: var(--ink-soft);
    }

    .top-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      font-size: 0.9rem;
      color: var(--ink-soft);
    }

    .slide-stage {
      display: grid;
      place-items: center;
    }

    .slide {
      width: min(100%, 1480px);
      height: min(calc(100vh - 180px), 840px);
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 22px;
      padding: 28px;
      border-radius: 34px;
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.80)),
        linear-gradient(135deg, rgba(15, 139, 141, 0.10), rgba(247, 180, 76, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      animation: slideIn 320ms ease;
    }

    .slide::after {
      content: "";
      position: absolute;
      right: -120px;
      bottom: -120px;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 139, 141, 0.12), transparent 72%);
      pointer-events: none;
    }

    .left-col,
    .right-col {
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .left-col::-webkit-scrollbar,
    .right-col::-webkit-scrollbar {
      width: 10px;
    }

    .left-col::-webkit-scrollbar-thumb,
    .right-col::-webkit-scrollbar-thumb {
      background: rgba(13, 43, 69, 0.16);
      border-radius: 999px;
    }

    .kicker {
      display: inline-flex;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(15, 139, 141, 0.10);
      color: var(--teal);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.84rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 3.4vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 14px;
      font-size: 1.06rem;
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 60ch;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip {
      padding: 10px 13px;
      border-radius: 14px;
      background: rgba(247, 180, 76, 0.16);
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .sections {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .section-card {
      background: var(--panel);
      border: 1px solid rgba(13, 43, 69, 0.09);
      border-radius: 22px;
      padding: 18px 18px 16px;
      box-shadow: 0 10px 26px rgba(13, 43, 69, 0.06);
    }

    .section-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .section-card ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      color: var(--ink-soft);
      line-height: 1.45;
    }

    .formula-list li {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      font-size: 1.02rem;
    }

    .right-stack {
      display: grid;
      gap: 14px;
    }

    .media-card,
    .meta-card,
    .figure-card {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(13, 43, 69, 0.09);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(13, 43, 69, 0.07);
    }

    .media-card {
      min-height: 260px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .media-card img {
      max-width: 100%;
      max-height: 380px;
      border-radius: 18px;
      object-fit: contain;
      box-shadow: 0 14px 32px rgba(13, 43, 69, 0.12);
    }

    .svg-figure {
      width: 100%;
      height: auto;
      max-height: 360px;
    }

    .meta-grid {
      display: grid;
      gap: 12px;
    }

    .meta-card h4 {
      margin: 0 0 8px;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .meta-card p {
      margin: 0;
      line-height: 1.5;
      color: var(--ink);
    }

    .figure-card {
      border-left: 6px solid var(--teal);
    }

    .accent-gold { border-left-color: var(--gold); }
    .accent-coral { border-left-color: var(--coral); }
    .accent-teal { border-left-color: var(--teal); }

    .figure-title {
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .figure-body {
      line-height: 1.52;
      color: var(--ink);
    }

    .footerbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(14px);
    }

    .progress-wrap {
      flex: 1;
      min-width: 180px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(13, 43, 69, 0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      border-radius: inherit;
      transition: width 220ms ease;
    }

    .progress-label {
      margin-top: 6px;
      font-size: 0.88rem;
      color: var(--ink-soft);
    }

    button,
    select {
      border: none;
      outline: none;
      font: inherit;
    }

    .nav-btn,
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--ink), #173a56);
      color: white;
      cursor: pointer;
      transition: transform 150ms ease, opacity 150ms ease, box-shadow 150ms ease;
      box-shadow: 0 8px 18px rgba(13, 43, 69, 0.18);
    }

    .nav-btn.secondary,
    .action-btn.secondary {
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border: 1px solid rgba(13, 43, 69, 0.12);
      box-shadow: none;
    }

    .nav-btn:hover,
    .action-btn:hover {
      transform: translateY(-1px);
    }

    .jump-select {
      padding: 11px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(13, 43, 69, 0.12);
      min-width: 220px;
      color: var(--ink);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 1200px) {
      .slide {
        grid-template-columns: 1fr;
        height: auto;
        max-height: none;
      }

      .sections {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .deck-shell {
        padding: 14px;
      }

      .topbar,
      .footerbar {
        flex-direction: column;
        align-items: stretch;
      }

      .top-controls,
      .actions {
        justify-content: stretch;
      }

      .jump-select,
      .nav-btn,
      .action-btn {
        width: 100%;
      }

      .slide {
        padding: 18px;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="deck-shell">
    <div class="topbar">
      <div class="brand-block">
        <div class="brand-title">MEM23007A Interactive HTML PPT</div>
        <div class="brand-subtitle">Generated teaching deck | Separate project folder | Built for local browser use</div>
      </div>
      <div class="top-controls">
        <div class="pill" id="slideIndicator">Slide 1</div>
        <div class="pill" id="classIndicator">Class overview</div>
        <button class="action-btn secondary" id="fullscreenBtn" type="button">Full Screen</button>
      </div>
    </div>

    <main class="slide-stage" aria-live="polite">
      <section class="slide" id="slideRoot"></section>
    </main>

    <div class="footerbar">
      <div class="progress-wrap">
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel"></div>
      </div>
      <div class="actions">
        <label class="sr-only" for="jumpSelect">Jump to slide</label>
        <select id="jumpSelect" class="jump-select"></select>
        <button class="nav-btn secondary" id="prevBtn" type="button">Previous</button>
        <button class="nav-btn" id="nextBtn" type="button">Next Slide</button>
      </div>
    </div>
  </div>

ability density functions", "Partial derivatives and final assessment review"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Target outcome</div>\n      <div class=\"figure-body\">By the end of Class 4, students should be able to recognise the question type quickly, pick the right calculus tool, and write a complete method.</div>\n    </div>\n    ", "cue": "Use this slide to set expectations: each class covers a full topic block plus question practice.", "source": "Assessment pack + MEM23007_Complete_R1.pdf", "assessment": "Unit planning"}, {"kicker": "Assessment Lens", "title": "What The Assessment Is Really Testing", "subtitle": "The knowledge test asks students to show method, not just final answers.", "sections": [{"heading": "Core skill families", "items": ["Differentiate standard, composite, product, and quotient functions.", "Find and classify turning points using derivative tests.", "Evaluate integrals and use them in area or engineering contexts.", "Solve a simple initial value problem.", "Apply integration to structural properties such as moment of inertia.", "Handle applied questions with piecewise functions and partial derivatives."], "kind": "list"}, {"heading": "What students often miss", "items": ["Choosing the wrong rule", "Stopping after f'(x) = 0 without classifying the point", "Forgetting + C in indefinite integrals", "Skipping units or interpretation in engineering questions"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Assessment advice</div>\n      <div class=\"figure-body\">Train students to write: rule chosen -> derivative or integral steps -> simplified answer -> short interpretation.</div>\n    </div>\n    ", "cue": "Tell students that neat method lines earn confidence. Even when arithmetic slips, a strong method still matters.", "source": "MEM23007A_Asessment.docx", "assessment": "Knowledge test + project"}, {"kicker": "Source Pack", "title": "How The Supplied Documents Feed This Deck", "subtitle": "Every source in your folder has been mapped into the teaching flow.", "sections": [{"heading": "Assessment and unit documents", "items": ["MEM23007A_Asessment.docx drives the assessment-first structure.", "MEM23007_Complete_R1.pdf informs the competency and evidence focus."], "kind": "list"}, {"heading": "Derivative references", "items": ["The_derivative.pdf", "final0203-ltsn-basicdiff.pdf", "calculus_03_Rules_for_Finding_Derivatives.pdf", "calculus_cheat_sheet_derivatives.pdf"], "kind": "list"}, {"heading": "Max/min and integration references", "items": ["PlymouthUniversity_MathsandStats_maxima_and_minima.pdf", "mc-ty-maxmin-2009-1.pdf", "common_derivatives_integrals.pdf", "13_1_basics_integration ... .pdf", "C7_AreasbyIntegration_BP_9_22_14.pdf", "mc-ty-areas-2009-1.pdf"], "kind": "list"}, {"heading": "Applied calculus references", "items": ["Moment_Inertia.pdf", "differential-equations.pdf"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Why this matters</div>\n      <div class=\"figure-body\">The deck is not generic. It is organised to mirror the question types and support materials in your actual unit folder.</div>\n    </div>\n    ", "cue": "This reassures students that the slides are aligned with their unit resources, not random outside content.", "source": "All supplied files", "assessment": "Whole unit"}, {"kicker": "Quick Toolkit", "title": "Formula Memory Starter Pack", "subtitle": "Put these six ideas in long-term memory early.", "sections": [{"heading": "Derivatives", "items": ["d/dx (x^n) = n x^(n-1)", "d/dx (sin x) = cos x", "d/dx (cos x) = -sin x", "d/dx (e^x) = e^x", "d/dx (ln x) = 1/x"], "kind": "formula"}, {"heading": "Integrals", "items": ["∫ x^n dx = x^(n+1)/(n+1) + C, for n ≠ -1", "∫ e^(ax) dx = e^(ax)/a + C", "∫ 1/x dx = ln|x| + C"], "kind": "formula"}], "figureHtml": "\n    <d
