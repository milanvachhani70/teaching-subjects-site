eading": "Answer", "items": ["∂r/∂x = 2x + y + 9x²"], "kind": "formula"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Partial derivatives\">\n      <path d=\"M130 190 C180 120, 260 70, 340 95 S470 170, 520 115\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M140 210 L140 70 M140 210 L520 210\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M140 210 L85 240\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M290 170 C340 140, 390 125, 470 140\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <path d=\"M240 125 C245 155, 250 180, 255 205\" fill=\"none\" stroke=\"#f7b44c\" stroke-width=\"5\"/>\n      <text x=\"475\" y=\"145\" fill=\"#ef6f51\" font-size=\"16\">hold y constant</text>\n      <text x=\"260\" y=\"210\" fill=\"#f7b44c\" font-size=\"16\">hold x constant</text>\n    </svg>\n    ", "cue": "This is a good slide to show how constants behave in partial differentiation.", "source": "Assessment pack", "assessment": "Q19"}, {"kicker": "Assessment Q19", "title": "Find ∂r/∂y", "subtitle": "Now treat x as a constant while differentiating with respect to y.", "sections": [{"heading": "Term by term", "items": ["∂/∂y (x²) = 0", "∂/∂y (y²) = 2y", "∂/∂y (xy) = x", "∂/∂y (3x³) = 0", "∂/∂y (8) = 0"], "kind": "list"}, {"heading": "Answer", "items": ["∂r/∂y = 2y + x"], "kind": "formula"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Partial derivatives\">\n      <path d=\"M130 190 C180 120, 260 70, 340 95 S470 170, 520 115\" fill=\"none\" stroke=\"#0f8b8d\" stroke-width=\"6\"/>\n      <path d=\"M140 210 L140 70 M140 210 L520 210\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M140 210 L85 240\" stroke=\"#0d2b45\" stroke-width=\"3\"/>\n      <path d=\"M290 170 C340 140, 390 125, 470 140\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"5\"/>\n      <path d=\"M240 125 C245 155, 250 180, 255 205\" fill=\"none\" stroke=\"#f7b44c\" stroke-width=\"5\"/>\n      <text x=\"475\" y=\"145\" fill=\"#ef6f51\" font-size=\"16\">hold y constant</text>\n      <text x=\"260\" y=\"210\" fill=\"#f7b44c\" font-size=\"16\">hold x constant</text>\n    </svg>\n    ", "cue": "Contrast this slide with the previous one so students see exactly what changed and what stayed constant.", "source": "Assessment pack", "assessment": "Q19"}, {"kicker": "Connections", "title": "How The Unit Topics Connect To Each Other", "subtitle": "Students feel less overloaded when they can see the whole structure.", "sections": [{"heading": "Connections", "items": ["Derivatives help locate turning points.", "Turning-point logic helps identify maxima in optimisation and beam behaviour.", "Integrals reverse derivatives and accumulate area or properties.", "Differential equations depend on derivative ideas.", "Partial derivatives extend derivative thinking to several variables."], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 220\" class=\"svg-figure\" aria-label=\"Derivative flow\">\n      <rect x=\"40\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e9f5fb\"/>\n      <rect x=\"235\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#fff2de\"/>\n      <rect x=\"430\" y=\"70\" width=\"150\" height=\"80\" rx=\"20\" fill=\"#e7f7f4\"/>\n      <text x=\"75\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f(x)</text>\n      <text x=\"265\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f'(x)</text>\n      <text x=\"457\" y=\"118\" font-size=\"26\" fill=\"#0d2b45\" font-weight=\"700\">f''(x)</text>\n      <text x=\"60\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">shape / output</text>\n      <text x=\"255\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">slope / rate</text>\n      <text x=\"450\" y=\"150\" font-size=\"16\" fill=\"#0d2b45\">curvature / test</text>\n      <path d=\"M190 110 H235\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <path d=\"M385 110 H430\" stroke=\"#ef6f51\" stroke-width=\"5\" marker-end=\"url(#arrowHead)\"/>\n      <defs>\n        <marker id=\"arrowHead\" markerWidth=\"12\" markerHeight=\"12\" refX=\"10\" refY=\"6\" orient=\"auto\">\n          <path d=\"M0,0 L12,6 L0,12 z\" fill=\"#ef6f51\"/>\n        </marker>\n      </defs>\n    </svg>\n    ", "cue": "This is a powerful reassurance slide for students who think the unit is a list of unrelated chapters.", "source": "Whole unit synthesis", "assessment": "Whole unit"}, {"kicker": "Exam Strategy", "title": "A Smart Plan For The Knowledge Test", "subtitle": "Students do better when they classify the question type before solving.", "sections": [{"heading": "Fast classification", "items": ["Derivative rule question", "Turning point / optimisation question", "Indefinite or definite integral question", "Applied calculus question"], "kind": "list"}, {"heading": "Suggested approach", "items": ["Underline the function.", "Name the method.", "Do the calculus cleanly.", "Check whether a final interpretation is required."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Teaching mantra</div>\n      <div class=\"figure-body\">Question type first, method second, algebra third.</div>\n    </div>\n    ", "cue": "This is a strong meta-skill slide for weak students.", "source": "Assessment-led structure", "assessment": "Whole knowledge test"}, {"kicker": "Exam Strategy", "title": "Most Likely Assessment Mistakes", "subtitle": "Warn students about these before the test, not after.", "sections": [{"heading": "Watch for", "items": ["Wrong derivative rule", "No classification after finding a critical point", "Missing + C on indefinite integrals", "Not splitting the interval in area questions", "Using the wrong axis interpretation in moment of inertia", "Forgetting to hold one variable constant in partial derivatives"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n compare the logic, not just the final point.", "sections": [{"heading": "Answers", "items": ["f'(x) = 2x - 4, so critical point at x = 2", "f''(x) = 2 > 0, so it is a local minimum", "f(2) = 4 - 8 + 1 = -3, so the point is (2, -3)", "For y = x³, x = 0 is neither max nor min; it is a stationary point of inflection"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Teacher note</div>\n      <div class=\"figure-body\">This is a good slide for confronting the misconception that every stationary point is a turning point.</div>\n    </div>\n    ", "cue": "Pause on the x³ example and ask why the graph keeps increasing through x = 0.", "source": "Revision drill", "assessment": "Max/min fluency"}, {"kicker": "Mini Quiz 3", "title": "Integration And Area Drill", "subtitle": "Use this to check if students can distinguish basic antiderivatives from area questions.", "sections": [{"heading": "Questions", "items": ["Find ∫ 4x³ dx.", "Find ∫ from 0 to 2 of x dx.", "What is the area under y = x from x = 0 to x = 2?", "Why do indefinite integrals include + C?"], "kind": "list"}], "figureHtml": "\n    <svg viewBox=\"0 0 620 260\" class=\"svg-figure\" aria-label=\"Absolute value area graph\">\n      <line x1=\"70\" y1=\"220\" x2=\"560\" y2=\"220\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <line x1=\"260\" y1=\"30\" x2=\"260\" y2=\"235\" stroke=\"#0d2b45\" stroke-width=\"4\"/>\n      <path d=\"M90 160 L260 220 L430 80\" fill=\"none\" stroke=\"#ef6f51\" stroke-width=\"6\"/>\n      <path d=\"M90 160 L260 220 L430 80 L430 220 L90 220 Z\" fill=\"#f7b44c\" opacity=\"0.18\"/>\n      <line x1=\"145\" y1=\"220\" x2=\"145\" y2=\"120\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <line x1=\"430\" y1=\"220\" x2=\"430\" y2=\"80\" stroke=\"#0f8b8d\" stroke-dasharray=\"8 8\" stroke-width=\"3\"/>\n      <text x=\"135\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -6</text>\n      <text x=\"245\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = -4</text>\n      <text x=\"420\" y=\"245\" fill=\"#0d2b45\" font-size=\"16\">x = 0</text>\n    </svg>\n    ", "cue": "Encourage students to answer the conceptual question in words, not just symbols.", "source": "Revision drill", "assessment": "Integration fluency"}, {"kicker": "Mini Quiz 3 Answers", "title": "Integration And Area Drill Answers", "subtitle": "Link the symbolic answers to geometric meaning.", "sections": [{"heading": "Answers", "items": ["∫ 4x³ dx = x⁴ + C", "∫ from 0 to 2 of x dx = [x²/2] from 0 to 2 = 2", "The area under y = x from 0 to 2 is also 2", "+ C is needed because an indefinite integral represents a family of antiderivatives"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Nice teaching point</div>\n      <div class=\"figure-body\">For y = x on [0,2], the integral and the geometric triangle area agree exactly.</div>\n    </div>\n    ", "cue": "Let students see that geometry and calculus tell the same story.", "source": "Revision drill", "assessment": "Integration fluency"}, {"kicker": "Project Task", "title": "The Case Study Presentation Requirement", "subtitle": "Students are asked to prepare a 15-20 slide presentation on calculus in real life.", "sections": [{"heading": "What the task wants", "items": ["Gather examples where calculus is used in everyday life or engineering practice.", "Explain how calculus helps solve problems.", "Present clearly and logically."], "kind": "list"}, {"heading": "Best strategy", "items": ["Choose one theme instead of listing random examples.", "Use simple visuals and one worked example.", "End with why the application matters."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Teacher support</div>\n      <div class=\"figure-body\">The next few slides can be used to help students build that case study presentation.</div>\n    </div>\n    ", "cue": "This helps students see that the project is achievable and connected to the unit content.", "source": "Assessment pack case study brief", "assessment": "Project"}, {"kicker": "Project Support", "title": "Real-Life Calculus Themes Students Could Present", "subtitle": "Give students options so they can choose a topic that feels concrete.", "sections": [{"heading": "Possible themes", "items": ["Bridge or beam design: moment, shear, and load", "Road and ramp design: gradients and rates of change", "Manufacturing optimisation: maximise output, minimise waste", "Motion and braking: velocity, acceleration, stopping distance", "Water tank or pipe flow: rate of change and accumulation", "Waiting times and demand modelling: probability and calculus"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Best pick for this unit</div>\n      <div class=\"figure-body\">Beam design is especially strong because it directly matches the assessment content.</div>\n    </div>\n    ", "cue": "If time is short, steer students toward beam design or optimisation because the calculus is already familiar.", "source": "Case study brief + unit topics", "assessment": "Project"}, {"kicker": "Project Support", "title": "A Strong 15-20 Slide Outline For Student Presentations", "subtitle": "Students often need structure more than more theory.", "sections": [{"heading": "Suggested flow", "items": ["1. Title and topic", "2. What problem is being solved?", "3. Why calculus is relevant", "4-6. Core concept explanation", "7-10. Worked example or model", "11-14. Real-life impact or engineering interpretation", "15. Summary and conclusion"], "kind": "list"}, {"heading": "Presentation advice", "items": ["Use one big idea per slide.", "Keep formulas visible but explained in words."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-gold\">\n      <div class=\"figure-title\">Teacher move</div>\n      <div class=\"figure-body\">You can screenshot or adapt this slide directly when briefing students for their project.</div>\n    </div>\n    ", "cue": "This slide helps weaker students start instead of freezing at the blank-page stage.", "source": "Case study brief", "assessment": "Project"}, {"kicker": "Teaching Plan", "title": "Suggested Timing Across Your Four One-Hour Classes", "subtitle": "Use this to keep the pacing realistic in class.", "sections": [{"heading": "Class 1 timing", "items": ["10 min: meaning of derivatives and notation", "20 min: chain, product, quotient rule", "20 min: Q2-Q4 worked examples", "10 min: beam calculus introduction"], "kind": "list"}, {"heading": "Class 2 timing", "items": ["15 min: turning points and tests", "20 min: Q5-Q8", "15 min: Q9-Q10", "10 min: optimisation recap"], "kind": "list"}, {"heading": "Class 3 timing", "items": ["15 min: antiderivatives and definite integrals", "20 min: Q11-Q15", "20 min: moment of inertia", "5 min: recap"], "kind": "list"}, {"heading": "Class 4 timing", "items": ["15 min: differential equations", "15 min: pdf and Q18", "10 min: partial derivatives and Q19", "20 min: full assessment review + project briefing"], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-coral\">\n      <div class=\"figure-title\">Practical note</div>\n      <div class=\"figure-body\">If a class runs short, reduce extension examples before cutting the assessment-worked examples.</div>\n    </div>\n    ", "cue": "This keeps the highest-value assessment material protected if time gets tight.", "source": "Teaching design based on your 4 x 1-hour delivery plan", "assessment": "Whole unit pacing"}, {"kicker": "Finish Strong", "title": "Final Assessment Readiness Checklist", "subtitle": "Students are ready when they can do the following without heavy prompting.", "sections": [{"heading": "Readiness checks", "items": ["Choose the correct derivative rule quickly.", "Find and classify local maxima and minima.", "Evaluate both indefinite and definite integrals correctly.", "Set up and solve area problems with the right interval split.", "Explain the strip method for moment of inertia.", "Solve a simple initial value problem.", "Interpret and differentiate a multivariable expression partially."], "kind": "list"}, {"heading": "Teacher close", "items": ["Use the mini quizzes and worked assessment slides as your final revision cycle."], "kind": "list"}], "figureHtml": "\n    <div class=\"figure-card accent-teal\">\n      <div class=\"figure-title\">Closing message for students</div>\n      <div class=\"figure-body\">You do not need every question to look identical. You need to recognise the method family and apply it clearly.</div>\n    </div>\n    ", "cue": "End with confidence and method recognition, not fear of memorising everything perfectly.", "source": "Whole deck synthesis", "assessment": "Whole unit"}];
    let currentIndex = 0;

    const slideRoot = document.getElementById("slideRoot");
    const slideIndicator = document.getElementById("slideIndicator");
    const classIndicator = document.getElementById("classIndicator");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const jumpSelect = document.getElementById("jumpSelect");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    function renderSection(section) {
      const listClass = section.kind === "formula" ? "formula-list" : "";
      return `
        <article class="section-card ${listClass}">
          <h3>${section.heading}</h3>
          <ul>
            ${section.items.map(item => `<li>${item}</li>`).join("")}
          </ul>
        </article>
      `;
    }

    function renderSlide(index) {
      const slide = slides[index];
      const chips = [
        slide.assessment ? `Assessment: ${slide.assessment}` : "",
        slide.source ? `Source: ${slide.source}` : ""
      ].filter(Boolean);

      const mediaBlock = slide.image
        ? `<div class="media-card"><img src="${slide.image}" alt="${slide.title} supporting visual"></div>`
        : slide.figureHtml
        ? `<div class="media-card">${slide.figureHtml}</div>`
        : "";

      slideRoot.innerHTML = `
        <div class="left-col">
          <div class="kicker">${slide.kicker}</div>
          <h1>${slide.title}</h1>
          <div class="subtitle">${slide.subtitle || ""}</div>
          ${chips.length ? `<div class="chips">${chips.map(chip => `<div class="chip">${chip}</div>`).join("")}</div>` : ""}
          <div class="sections">
            ${slide.sections.map(renderSection).join("")}
          </div>
        </div>
        <div class="right-col">
          <div class="right-stack">
            ${mediaBlock}
            ${slide.image && slide.figureHtml ? `<div class="media-card">${slide.figureHtml}</div>` : ""}
            <div class="meta-grid">
              <div class="meta-card">
                <h4>Teaching Cue</h4>
                <p>${slide.cue || "Use this slide to pause, question, and check student understanding."}</p>
              </div>
              <div class="meta-card">
                <h4>Slide Outcome</h4>
                <p>${slide.assessment || "Concept reinforcement"} | Slide ${index + 1} of ${slides.length}</p>
              </div>
            </div>
          </div>
        </div>
      `;

      slideIndicator.textContent = `Slide ${index + 1} of ${slides.length}`;
      classIndicator.textContent = slide.kicker;
      progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
      progressLabel.textContent = `${Math.round(((index + 1) / slides.length) * 100)}% complete`;
      jumpSelect.value = String(index);
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === slides.length - 1;
    }

    function populateJumpMenu() {
      jumpSelect.innerHTML = slides
        .map((slide, index) => `<option value="${index}">${index + 1}. ${slide.title}</option>`)
        .join("");
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, index));
      renderSlide(currentIndex);
    }

    prevBtn.addEventListener("click", () => goTo(currentIndex - 1));
    nextBtn.addEventListener("click", () => goTo(currentIndex + 1));
    jumpSelect.addEventListener("change", (event) => goTo(Number(event.target.value)));

    document.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex + 1);
      }
      if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        goTo(currentIndex - 1);
      }
      if (event.key.toLowerCase() === "f") {
        fullscreenBtn.click();
      }
    });

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    populateJumpMenu();
    renderSlide(currentIndex);
  </script>
